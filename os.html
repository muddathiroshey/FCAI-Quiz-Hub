  {
    id:8,
    title:"Memory Management Part 3",
    mc:[
      {q:"Before virtual memory was developed, how did programmers deal with programs that were too big to fit in the available memory?",opts:["By installing more CPU cache","By splitting the program into pieces called overlays, which they had to manage manually","By running the program purely in the BIOS","By disabling the operating system entirely"],ans:1,hints:["Incorrect because CPU cache is small and cannot hold large programs. The correct answer is B because programmers had to manually split programs into overlays","","Incorrect because BIOS is firmware for hardware startup, not an execution environment for large programs. The correct answer is B because overlays were the original manual solution","Incorrect because an OS is required to run the computer. The correct answer is B because manual overlays were used to swap pieces of the program in and out"]},
      {q:"What is the fundamental concept behind Virtual Memory?",opts:["The program is permanently stored and executed in the CPU cache","The operating system compresses the program size to 10% of its original size","The combined size of the program, data, and stack may exceed physical memory, so the OS keeps only parts currently in use in main memory and the rest on disk","The system relies entirely on a network server to execute the program"],ans:2,hints:["Incorrect because cache is too small and volatile to hold entire programs. The correct answer is C because virtual memory manages execution by keeping active parts in RAM and the rest on disk","Incorrect because virtual memory doesn\'t compress the code, it maps it to disk. The correct answer is C because it allows programs larger than physical memory to run","","Incorrect because virtual memory uses local disk storage, not network execution. The correct answer is C because it swaps pieces between memory and the local disk"]},
      {q:"In a paging system, physical memory is broken down into fixed-sized blocks called what?",opts:["Pages","Frames","Sectors","Clusters"],ans:1,hints:["Incorrect because \"Pages\" refer to the blocks of logical memory. The correct answer is B because physical memory blocks are called frames","","Incorrect because sectors are physical divisions on a hard disk platter. The correct answer is B because fixed-sized blocks of physical memory are frames","Incorrect because clusters are groupings of disk sectors. The correct answer is B because physical memory is divided into frames"]},
      {q:"In a paging system, logical memory is broken down into fixed-sized blocks called what?",opts:["Pages","Frames","Tracks","Overlays"],ans:0,hints:["","Incorrect because frames are blocks of physical memory. The correct answer is A because logical memory blocks of the same size are called pages","Incorrect because tracks are circular paths on a disk. The correct answer is A because logical memory is divided into pages","Incorrect because overlays were the manual predecessor to virtual memory. The correct answer is A because logical memory is broken into pages"]},
      {q:"Every logical address generated by the CPU is divided into which two parts?",opts:["IP address and port number","Base register and limit register","Page number (p) and page offset (d)","MAC address and PID"],ans:2,hints:["Incorrect because this relates to network sockets. The correct answer is C because a CPU-generated address consists of a page number and an offset","Incorrect because these are hardware registers for dynamic relocation, not the split of a paging address. The correct answer is C because the address is split into page number (p) and page offset (d)","","Incorrect because MAC is for networking and PID is for processes. The correct answer is C because logical addresses use page numbers and offsets"]},
      {q:"What component maps virtual addresses onto physical memory addresses?",opts:["The Hard Disk Controller","The ALU (Arithmetic Logic Unit)","The MMU (Memory Management Unit)","The BIOS"],ans:2,hints:["Incorrect because the controller manages disk I/O, not memory addressing. The correct answer is C because the MMU (Memory Management Unit) translates virtual addresses to physical ones","Incorrect because the ALU performs mathematical operations. The correct answer is C because the MMU handles the virtual-to-physical address mapping","","Incorrect because the BIOS initializes hardware on startup. The correct answer is C because the MMU handles memory mapping"]},
      {q:"In a virtual memory system, transfers between RAM and the disk are always done in units of what?",opts:["Bits","Bytes","A Page","A Gigabyte"],ans:2,hints:["Incorrect because a bit is too small for efficient I/O. The correct answer is C because transfers between RAM and disk are always in units of a page","Incorrect because transferring byte-by-byte would be incredibly slow. The correct answer is C because the system moves entire pages at a time","","Incorrect because a gigabyte is far larger than standard paging sizes. The correct answer is C because data is transferred in page units"]},
      {q:"If a system has a 64 KB virtual address space and 32 KB of physical memory, using 4 KB pages, how many virtual pages and physical page frames does it have?",opts:["8 virtual pages and 16 page frames","16 virtual pages and 8 page frames","64 virtual pages and 32 page frames","4 virtual pages and 4 page frames"],ans:1,hints:["Incorrect because the numbers are reversed. The correct answer is B because 64KB / 4KB = 16 virtual pages, and 32KB / 4KB = 8 physical frames","","Incorrect because you must divide the total memory size by the page size. The correct answer is B because the math yields 16 virtual pages and 8 page frames","Incorrect because the math is wrong. The correct answer is B because 64/4 = 16 and 32/4 = 8"]},
      {q:"What bit in a page table entry keeps track of whether a page is currently physically present in memory?",opts:["The Modified bit","The Present/Absent bit","The Referenced bit","The Read/Write bit"],ans:1,hints:["Incorrect because the modified bit tracks if the page has been changed (is \"dirty\"). The correct answer is B because the present/absent bit tracks if it is in memory","","Incorrect because the referenced bit tracks recent usage. The correct answer is B because the present/absent bit dictates if the page is currently in RAM","Incorrect because this dictates protection permissions. The correct answer is B because the present/absent bit indicates physical presence in memory"]},
      {q:"What happens when a program attempts to use an unmapped page (a page where the present/absent bit is 0)?",opts:["The CPU automatically crashes and reboots","The program successfully reads the data from the disk directly","The MMU causes a trap to the OS known as a page fault","The MMU permanently deletes the page"],ans:2,hints:["Incorrect because the OS handles the issue gracefully without crashing the whole machine. The correct answer is C because it triggers a trap called a page fault, prompting the OS to fetch the page","Incorrect because the CPU cannot execute directly from disk; the page must be loaded into RAM first. The correct answer is C because the MMU triggers a page fault","","Incorrect because the MMU doesn\'t delete data. The correct answer is C because an unmapped page access causes a page fault"]},
      {q:"What is the most important field in a Page Table Entry (PTE)?",opts:["The virtual page number","The Page frame number","The Caching disabled bit","The disk sector number"],ans:1,hints:["Incorrect because the virtual page number is usually just the index, not a field stored inside the main table entry. The correct answer is B because the primary goal of the mapping is to locate the physical Page frame number","","Incorrect because caching is an auxiliary feature. The correct answer is B because finding the page frame number is the main purpose of the table","Incorrect because PTEs point to RAM frames, not disk sectors. The correct answer is B because it holds the page frame number"]},
      {q:"When is the \"Modified\" (or \"dirty\") bit set to 1 by the hardware?",opts:["Every time the page is read","When the page is first loaded into memory","When the page is written to (modified)","When the system boots up"],ans:2,hints:["Incorrect because reading doesn\'t change the data. The correct answer is C because it is set when the page is written to (making it \"dirty\")","Incorrect because a newly loaded page matches the disk perfectly and is \"clean\". The correct answer is C because it only changes when the page is actively written to","","Incorrect because it tracks active page changes. The correct answer is C because it flags that the page data has been modified"]},
      {q:"Why is the Modified (dirty) bit useful to the operating system?",opts:["It encrypts the page for security","It tells the OS that the page must be written back to the disk before it can be evicted","It speeds up the CPU clock","It converts the page to read-only mode"],ans:1,hints:["Incorrect because it is a status flag, not an encryption tool. The correct answer is B because if the page is \"dirty\", its changes must be saved to disk; if it is \"clean\", it can just be abandoned","","Incorrect because it has no effect on hardware speed. The correct answer is B because it dictates whether a disk write is necessary during eviction","Incorrect because protection bits control read-only status. The correct answer is B because it prevents modified data from being lost upon eviction"]},
      {q:"What are the three standard protection bits found in a Page Table Entry?",opts:["Open, Close, Delete","Create, Read, Update","Read (R), Write (W), Execute (X)","Static, Dynamic, Virtual"],ans:2,hints:["Incorrect because these are file system operations. The correct answer is C because memory protection uses Read, Write, and Execute bits","Incorrect because these are database concepts (CRUD). The correct answer is C because the bits are R, W, and X","","Incorrect because these are memory allocation concepts. The correct answer is C because protection bits specify Read, Write, and Execute"]},
      {q:"Which of the following is typically placed in a \"Read-Only\" page (R=1, W=0)?",opts:["Program code (text segment) and Shared libraries","The Stack segment","The Heap","Dynamically allocated variables"],ans:0,hints:["","Incorrect because the stack must be writable to store local variables. The correct answer is A because program code and shared libraries should not be modified while running","Incorrect because the heap is specifically for dynamic read/write data. The correct answer is A because code and shared libraries are marked read-only to prevent corruption","Incorrect because dynamic variables must be writable. The correct answer is A because execution code and shared libraries use read-only pages"]},
      {q:"What occurs if a process attempts to write to a page that is marked as Read-Only?",opts:["The data is written to the hard drive instead","The MMU automatically grants write access","A protection fault (segmentation fault) is raised by the MMU, and the OS terminates the program","The CPU switches to 16-bit mode"],ans:2,hints:["Incorrect because the OS prevents the write entirely. The correct answer is C because writing to a read-only page triggers a protection fault, often leading to a segmentation fault","Incorrect because this would defeat the purpose of protection bits. The correct answer is C because the MMU traps the illegal access","","Incorrect because it does not alter processor architecture modes. The correct answer is C because it raises a protection fault"]},
      {q:"What is the purpose of the \"Referenced bit\" (R-bit) in the Page Table Entry?",opts:["To track the physical location of the hard drive","To track if a page has been recently accessed, helping the OS choose an unused page to evict during a page fault","To completely prevent caching","To permanently lock a page in memory so it can never be swapped"],ans:1,hints:["Incorrect because the page table tracks RAM frames, not physical drive sectors. The correct answer is B because the referenced bit helps the OS identify recently used pages so it can evict unused ones instead","","Incorrect because there is a separate bit for disabling caching. The correct answer is B because it tracks recent usage","Incorrect because the referenced bit does not lock memory. The correct answer is B because it helps the eviction algorithm choose wisely"]},
      {q:"Why is there a specific bit to \"disable caching\" on certain pages?",opts:["Because caching causes computers to crash randomly","It is used for pages that map to hardware device registers (memory-mapped I/O) to ensure the CPU always fetches the live, current status rather than a stale cached value","To save space on the hard drive","Because cache memory is slower than main memory"],ans:1,hints:["Incorrect because caching is normally highly stable and desirable. The correct answer is B because hardware devices update their registers constantly, so caching those addresses would give the CPU old, stale data","","Incorrect because caching doesn\'t impact disk storage space. The correct answer is B because memory-mapped I/O requires live data reads","Incorrect because cache is significantly faster than main memory. The correct answer is B because caching hardware registers would cause the CPU to miss live hardware updates"]},
      {q:"What are the two major issues that must be faced regarding Page Tables in virtual memory systems?",opts:["They use too much CPU cache, and they require manual programmer updates","The page table can be extremely large, and the virtual-to-physical mapping must be extremely fast","They are limited to 16-bit systems, and they cannot map to SSDs","They only work with FAT32, and they require a constant internet connection"],ans:1,hints:["Incorrect because the OS updates them automatically. The correct answer is B because modern systems have massive address spaces (making tables large), and mapping happens on every instruction (requiring speed)","","Incorrect because modern systems are 64-bit and map perfectly to SSDs. The correct answer is B because size and speed are the two major hurdles","Incorrect because they are independent of file systems and networks. The correct answer is B because the two issues are the massive size and the need for speed"]},
      {q:"If an instruction takes 1 nanosecond (nsec) to execute, roughly how fast must the page table lookup be to avoid becoming a bottleneck?",opts:["1 millisecond","Under 250 picoseconds (psec)","5 seconds","10 nanoseconds"],ans:1,hints:["Incorrect because 1 millisecond is 1,000,000 times slower than 1 nanosecond. The correct answer is B because the slides note the lookup must be done in under 250 psec","","Incorrect because 5 seconds is an eternity for a CPU. The correct answer is B because it must be a fraction of the instruction time (<250 psec)","Incorrect because 10ns is 10 times slower than the instruction itself. The correct answer is B because the lookup must take less than 250 psec"]},
      {q:"What hardware component is specifically used to solve the problem of making virtual-to-physical address mapping fast?",opts:["The Master Boot Record (MBR)","The Translation Lookaside Buffer (TLB)","The CMOS Battery","The Hard Disk Controller"],ans:1,hints:["Incorrect because MBR is for booting. The correct answer is B because the TLB acts as a fast cache for recently used address translations","","Incorrect because the CMOS battery maintains BIOS settings. The correct answer is B because the TLB speeds up the mapping process","Incorrect because this handles disk transfers. The correct answer is B because the TLB stores recent memory mappings"]},
      {q:"What is another name for the Translation Lookaside Buffer (TLB)?",opts:["Associative memory","Virtual Partition","Magnetic Core","BIOS memory"],ans:0,hints:["","Incorrect because a partition is a storage division. The correct answer is A because the slides note the TLB is sometimes called an associative memory","Incorrect because magnetic core is an obsolete main memory technology. The correct answer is A because TLB is also known as associative memory","Incorrect because BIOS memory is firmware storage. The correct answer is A because it\'s called associative memory"]},
      {q:"Where is the TLB (Translation Lookaside Buffer) usually located?",opts:["On the hard disk drive","Inside the CPU\'s Memory Management Unit (MMU)","Inside the computer\'s power supply","On the network interface card"],ans:1,hints:["Incorrect because disk drives are far too slow for address translation. The correct answer is B because the TLB is a fast hardware cache usually located inside the MMU","","Incorrect because power supplies just provide electricity. The correct answer is B because the TLB is part of the MMU","Incorrect because NICs handle networking. The correct answer is B because it resides in the MMU to intercept virtual addresses"]},
      {q:"How many entries does a typical TLB contain?",opts:["Millions of entries","Exactly 1 entry","A small number, usually 8 to rarely more than 256","It depends on the size of the hard drive"],ans:2,hints:["Incorrect because a TLB must be extremely fast hardware, so millions of entries would be impossible to search instantly. The correct answer is C because it typically holds a small number of entries (8 to 256)","Incorrect because one entry would result in massive miss rates. The correct answer is C because it holds a small cache of recent translations","","Incorrect because it is a fixed hardware limit. The correct answer is C because it rarely holds more than 256 entries"]},
      {q:"How does the MMU hardware search the TLB for a virtual page number?",opts:["It searches the hard drive sequentially","It compares it to all the entries simultaneously (in parallel)","It sends a request to the operating system and waits for a response","It asks the user to manually input the frame"],ans:1,hints:["Incorrect because the TLB is inside the CPU chip, not on disk. The correct answer is B because it checks all TLB entries simultaneously for ultra-fast matching","","Incorrect because involving the OS would be far too slow for every memory reference. The correct answer is B because the hardware searches in parallel","Incorrect because memory mapping is invisible to the user. The correct answer is B because the hardware does parallel comparison"]},
      {q:"What happens during a \"TLB Miss\"?",opts:["The computer immediately crashes with a Blue Screen of Death","The page is permanently deleted from RAM","The MMU detects it, does an ordinary page table lookup in RAM, and then replaces a TLB entry with the newly found mapping","The MMU creates a new virtual page"],ans:2,hints:["Incorrect because a miss is a normal, recoverable event. The correct answer is C because a miss just forces the MMU to do a slower RAM lookup and update the TLB cache","Incorrect because a TLB miss just means the translation isn\'t cached; the data is still in RAM. The correct answer is C because it triggers a standard page table lookup","","Incorrect because the virtual pages already exist. The correct answer is C because it fetches the mapping from the main page table"]},
      {q:"Unlike a standard Page Table Entry, what additional field MUST an entry in the TLB contain to function properly?",opts:["The MAC address of the server","The Virtual Page Number","The BIOS password","The CPU temperature"],ans:1,hints:["Incorrect because MAC addresses are for networking. The correct answer is B because while regular page tables use the virtual page number as an implicitly ordered index, the TLB is a scattered cache and must explicitly store the Virtual Page Number to match against","","Incorrect because passwords are for security. The correct answer is B because it must store the Virtual Page Number","Incorrect because thermals are irrelevant to memory mapping. The correct answer is B because the TLB explicitly stores the Virtual Page Number"]},
      {q:"If a TLB hit takes 10 nanoseconds, and a TLB miss requires an additional 10 nanoseconds (total 20ns), what is the Effective Access Time if the hit ratio is 80%?",opts:["12 nanoseconds","10 nanoseconds","20 nanoseconds","8 nanoseconds"],ans:0,hints:["","Incorrect because misses take 20ns, increasing the average above 10ns. The correct answer is A because (0.80 * 10) + (0.20 * 20) = 8 + 4 = 12 nanoseconds","Incorrect because 20ns assumes a 0% hit ratio. The correct answer is A because the formula yields exactly 12ns","Incorrect because it ignores the penalty of misses entirely. The correct answer is A because the math calculates to 12 nanoseconds"]},
      {q:"If the hit ratio improves to 99% (with 10ns for a hit and 20ns for a miss), what is the new Effective Access Time?",opts:["15.5 nanoseconds","10.1 nanoseconds","19.9 nanoseconds","9.9 nanoseconds"],ans:1,hints:["Incorrect because 99% of requests take only 10ns, bringing the average very close to 10. The correct answer is B because (0.99 * 10) + (0.01 * 20) = 9.9 + 0.2 = 10.1 nanoseconds","","Incorrect because this would be closer to a 1% hit ratio. The correct answer is B because the calculation results in 10.1ns","Incorrect because the misses add a tiny bit of time above 10ns. The correct answer is B because 10.1ns is the exact result"]},
      {q:"How do modern computers solve the problem of storing extremely large page tables continuously in memory?",opts:["By printing the page tables to physical paper","By using a Multi-level (Hierarchical) Page Table algorithm","By eliminating virtual memory entirely","By storing the page tables in the CPU\'s L1 cache"],ans:1,hints:["Incorrect because memory must be accessed by the hardware electronically. The correct answer is B because multi-level page tables page the page table itself, avoiding massive contiguous RAM usage","","Incorrect because modern systems rely heavily on virtual memory. The correct answer is B because hierarchical multi-level page tables reduce the memory footprint","Incorrect because L1 cache is far too small for large page tables. The correct answer is B because they use Multi-level Page Tables"]},
      {q:"In a Single-level (Flat) Page Table on a 32-bit system with 4 KB pages, approximately how large is the page table per process?",opts:["4 KB","1 MB","4 MB","4 GB"],ans:2,hints:["Incorrect because this is the size of a single page, not the whole table. The correct answer is C because 2^20 entries (1,048,576) multiplied by 4 bytes per entry equals approximately 4 MB","Incorrect because the math yields 4MB. The correct answer is C because 1 million entries times 4 bytes equals 4 MB","","Incorrect because 4GB is the entire virtual address space size, not the table size. The correct answer is C because the table size is ~4 MB"]},
      {q:"What is the major problem with using a Single-level (Flat) Page Table for a large address space?",opts:["Even a small program using only a few pages still requires the entire massive page table (e.g., 4 M","to be allocated in memory. B) It limits the system to MS-DOS","It prevents the use of the CPU cache","It encrypts the hard drive accidentally"],ans:0,hints:["","Incorrect because MS-DOS didn\'t use advanced paging. The correct answer is A because the flat structure demands a full memory allocation for the table regardless of how much memory the program actually uses","Incorrect because paging does not disable cache. The correct answer is A because it wastes a massive amount of RAM for mostly empty page tables","Incorrect because memory tracking has no connection to accidental disk encryption. The correct answer is A because of the massive mandatory memory overhead"]},
      {q:"In a Two-Level Page Table on a 32-bit architecture with 4 KB pages, how is the 20-bit Virtual Page Number (VPN) typically split?",opts:["1 bit for the directory, 19 bits for the table","10 bits for the Page Directory, and 10 bits for the Page Table","5 bits for the outer table, 15 for the inner","20 bits are kept together as one flat table"],ans:1,hints:["Incorrect because a 1-bit directory would only allow 2 entries. The correct answer is B because the slides explicitly split it into 10 bits for the Page Directory and 10 bits for the Page Table","","Incorrect because the standard example uses an even 10/10 split. The correct answer is B because the 20 bits are divided into 10 and 10","Incorrect because that describes a single-level flat table. The correct answer is B because it splits 10 + 10"]},
      {q:"In a Two-Level Page Table, what does each entry in the \"Page Directory\" point to?",opts:["Directly to the physical page frame","To a Page Table (or indicates \"not present\")","To the hard disk Master Boot Record","To the computer\'s BIOS"],ans:1,hints:["Incorrect because that is what the inner Page Table does. The correct answer is B because the outer Page Directory points to the inner Page Tables","","Incorrect because the MBR is for booting. The correct answer is B because the directory entry points to a specific Page Table","Incorrect because the BIOS is firmware. The correct answer is B because it points to an inner Page Table"]},
      {q:"What is another name for the Two-Level page-table architecture that works from the outer page table inward?",opts:["A backward-mapped page table","A flat mapped page table","A forward-mapped page table","An inverted page table"],ans:2,hints:["Incorrect because it maps from the outside inward (forward). The correct answer is C because the slides state this scheme is known as a forward-mapped page table","Incorrect because a flat table is single-level. The correct answer is C because working from the outer table inward is a forward-mapped architecture","","Incorrect because an inverted page table tracks physical frames, not virtual pages. The correct answer is C because it is called a forward-mapped page table"]},
      {q:"In the Two-Level Page Table translation process, after the MMU finds the correct Page Table Entry (PTE), what does the PTE contain?",opts:["The physical page frame number","The IP address of the server","The name of the file on the hard drive","The source code of the program"],ans:0,hints:["","Incorrect because IP addresses are for networking. The correct answer is A because the final PTE contains the physical page frame number where the data resides","Incorrect because memory management uses physical frame addresses, not file names. The correct answer is A because it yields the frame number","Incorrect because the table just points to where the code is; it doesn\'t hold the code itself. The correct answer is A because it contains the physical page frame number"]},
      {q:"How is the final absolute physical address calculated once the physical page frame number is found?",opts:["(Frame number × Page size) + Offset","Frame number + Base Register","Frame number × Offset","(Page number + Frame number) × 2"],ans:0,hints:["","Incorrect because base registers are used in simple dynamic relocation without paging. The correct answer is A because the physical address is the (Frame number × Page size) + the offset","Incorrect because multiplying by the offset gives a nonsensical address. The correct answer is A because you must multiply the frame by the page size and add the specific byte offset","Incorrect because this formula is fabricated. The correct answer is A because physical address = (frame number × page size) + offset"]},
      {q:"What is the fundamental advantage of a Two-Level Page Table over a Flat Page Table?",opts:["It makes the hard drive run faster","It allows page tables to be swapped to disk, saving RAM because only the necessary inner page tables need to be allocated in memory","It permanently disables all CPU interrupts","It limits memory usage to exactly 4 MB for every program"],ans:1,hints:["Incorrect because page tables do not alter hardware disk speed. The correct answer is B because a hierarchical structure means empty directories don\'t need inner page tables allocated, saving massive amounts of RAM","","Incorrect because OSs require interrupts to function. The correct answer is B because it saves memory by not allocating empty page tables","Incorrect because 4 MB is the problem with flat tables that multi-level tables avoid. The correct answer is B because it saves memory space"]},
      {q:"Under virtual memory, what happens to a process while it is waiting for a page to be brought in from the disk (after a page fault)?",opts:["The CPU halts completely until the disk finishes","The computer reboots","The process is waiting for I/O and cannot run, so the CPU is given to another process in the multiprogramming system","The process bypasses the MMU and reads directly from the RAM"],ans:2,hints:["Incorrect because halting the CPU would freeze the system and waste time. The correct answer is C because the OS simply context switches to another ready process while the disk I/O completes","Incorrect because a page fault is a routine event, not a fatal error. The correct answer is C because the CPU schedules a different process","","Incorrect because the data isn\'t in RAM yet. The correct answer is C because the CPU does other work while waiting"]},
      {q:"If a system is using 4 KB pages, how many bits are required for the \"page offset\" to address every byte within that page?",opts:["4 bits","8 bits","12 bits","20 bits"],ans:2,hints:["Incorrect because 4 bits can only address 16 bytes. The correct answer is C because 2 12 =4096 , so 12 bits are needed to address all 4096 bytes (4 KB) inside a page","Incorrect because 8 bits address 256 bytes. The correct answer is C because 12 bits are required for a 4096-byte offset","","Incorrect because 20 bits are used for the Page Number in a 32-bit address. The correct answer is C because 12 bits are used for the offset"]}
    ],
    tf:[
      {q:"In a system without virtual memory, if a programmer wrote a program that was larger than the available physical memory, they had to manually split it into pieces called \"overlays\" to make it run",ans:true,hint:"Incorrect. The slides explicitly state that before virtual memory, programmers had to manually split programs into overlays, which were swapped in and out dynamically"},
      {q:"Virtual memory requires that a program be completely loaded into main memory in its entirety before it can begin executing",ans:false,hint:"Incorrect. The defining feature of virtual memory is that it allows programs to run even when they are only partially in main memory, with the rest stored on disk"},
      {q:"In a paging system, physical memory is broken into fixed-sized blocks called \"pages,\" and logical memory is broken into blocks called \"frames.\"",ans:false,hint:"Incorrect. The terminology is reversed. Physical memory is broken into frames, and logical (virtual) memory is broken into pages"},
      {q:"When the MMU notices that a virtual page is unmapped (its present/absent bit is 0), it causes the CPU to trap to the operating system, an event known as a \"page fault.\"",ans:true,hint:"Incorrect. The slides provide exactly this definition: an unmapped page access traps to the OS, and this trap is called a page fault"},
      {q:"A Page Table Entry (PTE) typically contains a \"Modified\" (or dirty) bit, which the hardware sets to 1 whenever a page is written to",ans:true,hint:"Incorrect. The slides specify that when a page is written to, the hardware automatically sets the modified (dirty) bit to track that it must be written back to the disk if evicted"},
      {q:"Program code (text segments) and Shared libraries are typically placed in read/write pages because they must be constantly modified by the user during execution",ans:false,hint:"Incorrect. The slides explicitly state that program code and shared libraries are examples of Read-Only pages (R=1, W=0) to prevent modification and corruption"},
      {q:"The Translation Lookaside Buffer (TLB) is a small, fast hardware cache inside the MMU that stores recently used virtual-to-physical address translations",ans:true,hint:"Incorrect. The slides define the TLB exactly this way: a small, fast hardware cache storing recently used virtual-to-physical translations to speed up mapping"},
      {q:"If a virtual page number is found in the TLB (a TLB hit), the MMU must still perform an ordinary page table lookup in main memory before it can proceed",ans:false,hint:"Incorrect. If a valid match is found in the TLB (a hit), the page frame is taken directly from the TLB, bypassing the page table entirely and saving significant time"},
      {q:"Setting the \"caching disabled\" bit on a page is important for memory-mapped I/O devices (like network cards) because it forces the CPU to fetch live status data rather than reading old, stale data from the cache",ans:true,hint:"Incorrect. The slides state that disabling caching for device registers is essential so the hardware keeps fetching the live data instead of using an old cached copy"},
      {q:"A major advantage of a Two-Level Page Table over a Single-Level (Flat) Page Table is that it avoids allocating memory for inner page tables if those specific address ranges are completely unused",ans:true,hint:"Incorrect. A flat page table requires the full table to be allocated (e.g., 4MB) regardless of use. A Two-Level table gets around this problem by only allocating inner page tables when the outer directory entry points to active memory space"}
    ]
  }
];
const state=lectures.map(l=>({mcAnswered:{},tfAnswers:{},mcScores:0,tfScores:0}));
let activeLec=0;
function totalForLec(li){return lectures[li].mc.length+lectures[li].tf.length;}
function answeredForLec(li){return Object.keys(state[li].mcAnswered).length+Object.keys(state[li].tfAnswers).length;}
function updateProgress(){
  const total=totalForLec(activeLec);
  const answered=answeredForLec(activeLec);
  const pct=total>0?Math.round(answered/total*100):0;
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-text').textContent=answered+' / '+total+' answered — Lecture '+activeLec;
  document.getElementById('prog-pct').textContent=pct+'%';
}
function getGrade(pct){
  if(pct>=90)return'A+';if(pct>=85)return'A';if(pct>=80)return'B+';
  if(pct>=75)return'B';if(pct>=70)return'C+';if(pct>=65)return'C';
  if(pct>=60)return'D+';if(pct>=50)return'D';return'F';
}
function revealMC(li,qi){
  const item=lectures[li].mc[qi];
  const chosen=state[li].mcAnswered[qi];
  const card=document.getElementById('l'+li+'-mc-card-'+qi);
  item.opts.forEach((_,j)=>{
    const opt=document.getElementById('l'+li+'-mc-opt-'+qi+'-'+j);
    opt.style.pointerEvents='none';
    if(j===item.ans)opt.classList.add('correct-opt');
    else if(j===chosen&&chosen!==item.ans){opt.classList.add('wrong-opt');opt.classList.remove('selected');}
  });
  const fb=document.getElementById('l'+li+'-mc-fb-'+qi);
  if(chosen===item.ans){
    state[li].mcScores++;
    card.classList.add('correct-card');
    fb.textContent='✓ Correct!';fb.className='q-feedback show-correct';
  }else{
    card.classList.add('wrong-card');
    fb.textContent='✗ Incorrect — correct: '+letters[item.ans]+') '+item.opts[item.ans];
    fb.className='q-feedback show-wrong';
    const hintText=(item.hints&&item.hints[chosen])||'';
    if(hintText){
      const btn=document.getElementById('l'+li+'-mc-hint-'+qi);
      const panel=document.getElementById('l'+li+'-mc-hpanel-'+qi);
      if(btn)btn.classList.add('visible');
      if(panel)panel.innerHTML='<div class="hint-why">💡 '+hintText+'</div>';
    }
  }
  updateScoreCard(li);
}
function revealTF(li,i){
  const item=lectures[li].tf[i];
  const chosen=state[li].tfAnswers[i];
  const card=document.getElementById('l'+li+'-tf-card-'+i);
  const tBtn=document.getElementById('l'+li+'-tf-t-'+i);
  const fBtn=document.getElementById('l'+li+'-tf-f-'+i);
  tBtn.style.pointerEvents='none';fBtn.style.pointerEvents='none';
  const correctBtn=item.ans?tBtn:fBtn;
  correctBtn.classList.add('correct-tf');
  if(chosen!==item.ans)(chosen?tBtn:fBtn).classList.add('wrong-tf');
  const fb=document.getElementById('l'+li+'-tf-fb-'+i);
  if(chosen===item.ans){
    state[li].tfScores++;
    card.classList.add('correct-card');
    fb.textContent='✓ Correct!';fb.className='q-feedback show-correct';
  }else{
    card.classList.add('wrong-card');
    fb.textContent='✗ Incorrect — correct: '+(item.ans?'True':'False');
    fb.className='q-feedback show-wrong';
    if(item.hint){
      const btn=document.getElementById('l'+li+'-tf-hint-'+i);
      const panel=document.getElementById('l'+li+'-tf-hpanel-'+i);
      if(btn)btn.classList.add('visible');
      if(panel)panel.innerHTML='<div class="hint-why">💡 '+item.hint+'</div>';
    }
  }
  updateScoreCard(li);
}
function toggleHint(id){
  const panel=document.getElementById(id);
  if(!panel)return;
  const btn=panel.previousElementSibling;
  const isOpen=panel.classList.contains('visible');
  panel.classList.toggle('visible',!isOpen);
  if(btn)btn.textContent=isOpen?'💡 Hint':'✕ Close';
}
function selectMC(li,qi,oi){
  if(state[li].mcAnswered[qi]!==undefined)return;
  state[li].mcAnswered[qi]=oi;
  document.getElementById('l'+li+'-mc-opt-'+qi+'-'+oi).classList.add('selected');
  document.getElementById('l'+li+'-mc-card-'+qi).classList.add('answered');
  updateProgress();revealMC(li,qi);
}
function selectTF(li,i,val){
  if(state[li].tfAnswers[i]!==undefined)return;
  state[li].tfAnswers[i]=val;
  document.getElementById('l'+li+'-tf-'+(val?'t':'f')+'-'+i).classList.add('selected');
  document.getElementById('l'+li+'-tf-card-'+i).classList.add('answered');
  updateProgress();revealTF(li,i);
}
function updateScoreCard(li){
  const total=totalForLec(li);
  const answered=answeredForLec(li);
  const totalCorrect=state[li].mcScores+state[li].tfScores;
  const pct=answered>0?Math.round(totalCorrect/answered*100):0;
  const sc=document.getElementById('l'+li+'-score');
  sc.style.display='block';
  document.getElementById('l'+li+'-sc-pct').textContent=pct+'%';
  document.getElementById('l'+li+'-sc-sub').textContent=totalCorrect+' correct out of '+answered+' answered';
  document.getElementById('l'+li+'-sc-grade').textContent=getGrade(pct);
  const mcAns=Object.keys(state[li].mcAnswered).length;
  const tfAns=Object.keys(state[li].tfAnswers).length;
  document.getElementById('l'+li+'-sc-mc').textContent=state[li].mcScores+' / '+mcAns;
  document.getElementById('l'+li+'-sc-mc-pct').textContent=mcAns>0?Math.round(state[li].mcScores/mcAns*100)+'% accuracy':'—';
  document.getElementById('l'+li+'-sc-tf').textContent=state[li].tfScores+' / '+tfAns;
  document.getElementById('l'+li+'-sc-tf-pct').textContent=tfAns>0?Math.round(state[li].tfScores/tfAns*100)+'% accuracy':'—';
  document.getElementById('l'+li+'-sc-skip').textContent=total-answered;
}
function resetLecture(li){
  state[li].mcAnswered={};state[li].tfAnswers={};
  state[li].mcScores=0;state[li].tfScores=0;
  buildLecture(li);updateProgress();
}
function scrollToScore(li){
  document.getElementById('l'+li+'-score').scrollIntoView({behavior:'smooth',block:'center'});
}
function buildLecture(li){
  const lec=lectures[li];
  const container=document.getElementById('lec-'+li+'-content');
  container.innerHTML='';
  const mcHeader=document.createElement('div');
  mcHeader.className='section-header';
  mcHeader.innerHTML='<div class="section-icon mc">MC</div><div><div class="section-title">Multiple Choice</div><div class="section-meta">'+lec.mc.length+' questions — select the best answer</div></div>';
  container.appendChild(mcHeader);
  lec.mc.forEach((item,i)=>{
    const card=document.createElement('div');
    card.className='q-card';card.id='l'+li+'-mc-card-'+i;
    const opts=item.opts.map((o,j)=>`<label class="option" id="l${li}-mc-opt-${i}-${j}" onclick="selectMC(${li},${i},${j})"><input type="radio" name="l${li}-mc-${i}" value="${j}"><div class="option-dot"></div><span class="option-letter">${letters[j]})</span><span class="option-text">${o}</span></label>`).join('');
    const hintHtml=`<button class="btn-hint" id="l${li}-mc-hint-${i}" onclick="toggleHint('l${li}-mc-hpanel-${i}')">💡 Hint</button><div class="hint-panel" id="l${li}-mc-hpanel-${i}"></div>`;
    card.innerHTML=`<div class="q-header"><span class="q-badge">${i+1}</span><span class="q-text">${item.q}</span></div><div class="options">${opts}</div><div class="q-feedback" id="l${li}-mc-fb-${i}"></div>${hintHtml}`;
    container.appendChild(card);
  });
  const div=document.createElement('div');div.className='divider';container.appendChild(div);
  const tfHeader=document.createElement('div');
  tfHeader.className='section-header';
  tfHeader.innerHTML='<div class="section-icon tf">T/F</div><div><div class="section-title">True or False</div><div class="section-meta">'+lec.tf.length+' questions</div></div>';
  container.appendChild(tfHeader);
  lec.tf.forEach((item,i)=>{
    const card=document.createElement('div');
    card.className='q-card';card.id='l'+li+'-tf-card-'+i;
    const hintHtml=item.hint?`<button class="btn-hint" id="l${li}-tf-hint-${i}" onclick="toggleHint('l${li}-tf-hpanel-${i}')">💡 Hint</button><div class="hint-panel" id="l${li}-tf-hpanel-${i}"></div>`:'';
    card.innerHTML=`<div class="q-header"><span class="q-badge">${i+1}</span><span class="q-text">${item.q}</span></div><div class="tf-wrap"><button class="tf-btn" id="l${li}-tf-t-${i}" onclick="selectTF(${li},${i},true)"><div class="tf-dot"></div>True</button><button class="tf-btn" id="l${li}-tf-f-${i}" onclick="selectTF(${li},${i},false)"><div class="tf-dot"></div>False</button></div><div class="q-feedback" id="l${li}-tf-fb-${i}"></div>${hintHtml}`;
    container.appendChild(card);
  });
  const actions=document.createElement('div');
  actions.className='actions';
  actions.innerHTML=`<button class="btn-primary" onclick="scrollToScore(${li})">View Score</button><button class="btn-secondary" onclick="resetLecture(${li})">Reset</button>`;
  container.appendChild(actions);
  const sc=document.createElement('div');
  sc.className='score-card';sc.id='l'+li+'-score';
  sc.innerHTML=`<div class="score-card-inner"><div class="score-top"><div><div class="score-label">Score</div><div class="score-big" id="l${li}-sc-pct">—</div><div class="score-sub" id="l${li}-sc-sub">—</div></div><div style="text-align:right"><div class="score-label">Grade</div><div class="score-grade" id="l${li}-sc-grade">—</div></div></div><div class="score-breakdown"><div class="score-section"><div class="score-section-label">Multiple Choice</div><div class="score-section-val" id="l${li}-sc-mc">—</div><div class="score-section-pct" id="l${li}-sc-mc-pct">—</div></div><div class="score-section"><div class="score-section-label">True / False</div><div class="score-section-val" id="l${li}-sc-tf">—</div><div class="score-section-pct" id="l${li}-sc-tf-pct">—</div></div><div class="score-section"><div class="score-section-label">Remaining</div><div class="score-section-val" id="l${li}-sc-skip">—</div><div class="score-section-pct" style="color:rgba(255,255,255,.35)">not yet answered</div></div></div></div>`;
  container.appendChild(sc);
}
function buildNav(){
  const tabs=document.getElementById('lec-tabs');
  const main=document.getElementById('main-content');
  lectures.forEach((lec,li)=>{
    const tab=document.createElement('button');
    tab.className='lec-tab'+(li===0?' active':'');
    tab.textContent='Lec '+li;
    tab.onclick=()=>switchLecture(li);
    tab.id='tab-'+li;
    tabs.appendChild(tab);
    const section=document.createElement('div');
    section.className='lec-section'+(li===0?' active':'');
    section.id='lec-section-'+li;
    const total=lec.mc.length+lec.tf.length;
    section.innerHTML=`<div class="lec-header"><div class="lec-num">Lecture ${li}</div><div class="lec-title">${lec.title}</div><div class="lec-stats"><span class="lec-stat">${total} total questions</span><span class="lec-stat">${lec.mc.length} multiple choice</span><span class="lec-stat">${lec.tf.length} true / false</span></div></div><div id="lec-${li}-content"></div>`;
    main.appendChild(section);
    buildLecture(li);
  });
}
function switchLecture(li){
  document.getElementById('lec-section-'+activeLec).classList.remove('active');
  document.getElementById('tab-'+activeLec).classList.remove('active');
  activeLec=li;
  document.getElementById('lec-section-'+li).classList.add('active');
  document.getElementById('tab-'+li).classList.add('active');
  updateProgress();
  window.scrollTo({top:0,behavior:'smooth'});
}
window.addEventListener('scroll',()=>{
  document.getElementById('scroll-btn').classList.toggle('visible',window.scrollY>400);
});

function toggleTheme(){
  const isDark=document.documentElement.getAttribute('data-theme')==='dark';
  const newTheme=isDark?'light':'dark';
  document.documentElement.setAttribute('data-theme',newTheme);
  localStorage.setItem('fchai_theme',newTheme);
  const btn=document.getElementById('theme-toggle');
  btn.textContent=isDark?'☀️':'🌙';
}
(function(){
  const saved=localStorage.getItem('fchai_theme')||
    (window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');
  document.documentElement.setAttribute('data-theme',saved);
  const btn=document.getElementById('theme-toggle');
  if(btn){
    btn.textContent=saved==='dark'?'☀️':'🌙';
    btn.addEventListener('click',toggleTheme);
  }
})();
buildNav();
updateProgress();
</script>
</body>
</html>
