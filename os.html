<script>
const letters=['a','b','c','d','e'];
const lectures = [
  {
    id:0,
    title:"Course Introduction & Plan",
    mc:[
      {q:"What is an Operating System?",opts:["Software that acts as an interface between hardware components and the user","A programming language used to write applications","A type of computer hardware","A network protocol"],ans:0,hints:["","","",""]},
      {q:"Which company implemented the first OS in the early 1950s?",opts:["Microsoft","IBM","General Motors Research Lab","Apple"],ans:2,hints:["","","",""]},
      {q:"In what year was the first version of Unix OS developed?",opts:["Late 1950s","Early 1960s","Late 1960s","Early 1980s"],ans:2,hints:["","","",""]},
      {q:"MS-DOS was built by Microsoft in which year?",opts:["1975","1981","1985","1990"],ans:1,hints:["","","",""]},
      {q:"Windows first came into existence in which year when a GUI was created and paired with MS-DOS?",opts:["1981","1983","1985","1990"],ans:2,hints:["","","",""]},
      {q:"In the mid-1960s, operating systems started to use what?",opts:["Networks","Disks","Virtual memory","Threads"],ans:1,hints:["","","",""]},
      {q:"What does OS stand for?",opts:["Open Software","Operating System","Output Service","Original Software"],ans:1,hints:["","","",""]}
    ],
    tf:[
      {q:"An Operating System acts as an interface between computer hardware and the user.",ans:true,hint:""},
      {q:"Every computer system must have at least one operating system to run other programs.",ans:true,hint:""},
      {q:"MS-DOS was the first OS built by Apple.",ans:false,hint:""},
      {q:"The first version of Unix was developed in the early 1950s.",ans:false,hint:""},
      {q:"Windows first appeared in 1985 when a GUI was paired with MS-DOS.",ans:true,hint:""},
      {q:"It is possible for a user to use a mobile device without an operating system.",ans:false,hint:""}
    ]
  },
  {
    id:1,
    title:"Introduction & OS Components",
    mc:[
      {q:"What is the fundamental definition of an Operating System according to the slides?",opts:["Hardware that executes user tasks","Software that helps the users to interact with the computer hardware","A specialized device driver for graphical interfaces","A programming language used to build applications"],ans:1,hints:["Incorrect because the OS is software, not hardware. The correct answer is B because the OS is defined as software that helps users interact with computer hardware","","Incorrect because a device driver is only a small component of an OS, not its definition. The correct answer is B because the OS acts as a general software interface between the user and the hardware","Incorrect because an OS is not a programming language. The correct answer is B because the OS provides the software platform for users to interact with hardware"]},
      {q:"Which of the following is NOT one of the main goals of an operating system?",opts:["Execute user programs and make solving user problems easier","Make the computer system convenient to use","Ensure all computer hardware is manufactured by the same vendor","Use the computer hardware in an efficient manner"],ans:2,hints:["Incorrect because executing programs is a stated goal. The correct answer is C because OS goals relate to execution, convenience, and efficiency, not hardware manufacturing","Incorrect because making the system convenient is an explicitly stated goal. The correct answer is C because standardizing hardware manufacturing is not an OS goal","","Incorrect because efficient hardware use is a primary goal. The correct answer is C because the OS does not govern who manufactures the hardware"]},
      {q:"In modern computer-system operation, how do CPUs and device controllers access shared memory?",opts:["Through independent isolated buses","Through a common bus","Exclusively via the command line interface","Through user-mode applications only"],ans:1,hints:["Incorrect because they do not use isolated buses. The correct answer is B because CPUs and controllers connect through a common bus to provide access to shared memory","","Incorrect because memory access is a hardware-level operation, not a command line function. The correct answer is B because the hardware organization uses a common bus","Incorrect because memory access is handled at a much lower level than user apps. The correct answer is B because the CPU and controllers use a common bus for shared memory access"]},
      {q:"From a high-level view, what sits directly between the Operating System and the User?",opts:["The Hardware","The Application(s)","The Command Line Interface","The CPU"],ans:1,hints:["Incorrect because hardware sits below the OS. The correct answer is B because the user runs applications, which then interact directly with the operating system","","Incorrect because the CLI is a feature of the OS, not the layer between user and OS. The correct answer is B because applications act as the intermediary between the user and the OS","Incorrect because the CPU is part of the hardware layer. The correct answer is B because users interact with apps (App 1, App 2, etc.), which communicate with the OS"]},
      {q:"What allows users to run more than one application at the same time, such as chatting while watching videos?",opts:["Device formatting","Command Interpreter System Management","Multitasking","Fragmentation"],ans:2,hints:["Incorrect because formatting prepares a disk for data. The correct answer is C because multitasking is the specific OS feature that allows multiple apps to run concurrently","Incorrect because the command interpreter handles CLI commands. The correct answer is C because multitasking allows running things like chatting and video simultaneously","","Incorrect because fragmentation is wasted disk space. The correct answer is C because multitasking enables simultaneous application execution"]},
      {q:"For a programmer using C, how does the OS assist with functions like printf and scanf?",opts:["It requires the programmer to define exact console display logic","It manages how the input-output operation is internally processed","It translates the C code directly into Python","It bypasses the CPU and sends code straight to the monitor"],ans:1,hints:["Incorrect because the OS prevents the programmer from needing to define this. The correct answer is B because the OS manages console display/retrieval internally","","Incorrect because the OS does not translate C to Python. The correct answer is B because the OS internally manages the I/O operations triggered by these functions","Incorrect because the CPU is still used. The correct answer is B because the OS internally processes how input and output operations behave for the programmer"]},
      {q:"Which of the following components operates in User Mode?",opts:["Process Management","Memory Management","Security Management","Command Interpreter System Management"],ans:3,hints:["Incorrect because process management is a kernel mode component. The correct answer is D because Command Interpreter System Management (and I/O Management) operates in user mode","Incorrect because memory management operates in kernel mode. The correct answer is D because Command Interpreter System Management is explicitly listed under User Mode","Incorrect because security management operates in kernel mode. The correct answer is D because Command Interpreter System Management is followed in User Mode",""]},
      {q:"Which of the following components operates in Kernel Mode?",opts:["I/O Management","File System & Device Management","Graphical User Interface","Command Interpreter System Management"],ans:1,hints:["Incorrect because I/O Management operates in User Mode. The correct answer is B because File System & Device Management is explicitly listed as a Kernel Mode component","","Incorrect because GUIs operate at the user level. The correct answer is B because File System & Device Management is a core kernel mode function","Incorrect because the Command Interpreter operates in User Mode. The correct answer is B because File System & Device Management handles hardware-level disk operations in kernel mode"]},
      {q:"What is the correct sequence of mode switches when an input is given to the OS?",opts:["Kernel Mode -> Processing -> User Mode","User Mode -> Switch to Kernel Mode -> Processing -> Switch to User Mode -> Display","User Mode -> Display -> Kernel Mode -> Processing","Kernel Mode -> Switch to User Mode -> Processing -> Switch to Kernel Mode"],ans:1,hints:["Incorrect because it misses the initial user input phase. The correct answer is B because the OS recognizes input in user mode, switches to kernel mode for processing, and switches back to user mode to display","","Incorrect because processing must happen before the display. The correct answer is B because the OS processes in the backend (kernel mode) before switching to user mode to display the result","Incorrect because backend processing happens in Kernel Mode, not User Mode. The correct answer is B because processing happens in Kernel Mode, sandwiched between User Mode transitions"]},
      {q:"Which interface mode allows inputs to be given in the form of commands like cd, mkdir, and cls?",opts:["GUI (Graphical User Interface)","API (Application Programming Interface)","CLI (Command Line Interface)","PCB (Process Control Block)"],ans:2,hints:["Incorrect because GUI uses graphical screens and cursors. The correct answer is C because CLI accepts text-based commands like cd and mkdir","Incorrect because an API is for software-to-software communication. The correct answer is C because the CLI is the mode where users type command inputs","","Incorrect because a PCB stores process states. The correct answer is C because the Command Line Interface processes user command texts"]},
      {q:"When does a program officially become a \"process\"?",opts:["When it is saved onto the Hard Disk Drive","When the OS loads the program into memory and it is ready for execution","When the compiler finishes compiling the source code","When the user clicks the application icon"],ans:1,hints:["Incorrect because a program on a disk is not currently executing. The correct answer is B because a process is defined as a program loaded into memory and ready for CPU execution","","Incorrect because compiled code is still just a passive program. The correct answer is B because a program must be loaded into memory to become an active process","Incorrect because clicking the icon is just the request; the OS must act first. The correct answer is B because the OS must load it into memory for it to become a process"]},
      {q:"What does PCB stand for in Process Management?",opts:["Program Counter Block","Process Control Block","Peripheral Connection Bus","Process Command Buffer"],ans:1,hints:["Incorrect because the Program Counter is just one register inside it. The correct answer is B because PCB stands for Process Control Block, a table storing process attributes","","Incorrect because this relates to hardware wiring. The correct answer is B because PCB stands for Process Control Block in the context of operating systems","Incorrect because it is a control block, not a buffer. The correct answer is B because PCB stands for Process Control Block, which stores states like PID and registers"]},
      {q:"Which of the following is considered a \"CPU Related\" attribute stored in the PCB?",opts:["Process Identification Number (PID)","Memory limits","Program Counter and General purpose registers","Files required to access on disk"],ans:2,hints:["Incorrect because PID is a \"Process Related\" attribute. The correct answer is C because registers like the Program Counter are strictly CPU Related attributes","Incorrect because memory limits are \"Memory Related\" attributes. The correct answer is C because CPU registers directly deal with CPU state","","Incorrect because these are \"Files related\" attributes. The correct answer is C because the Program Counter and general purpose registers are categorized as CPU related"]},
      {q:"What state does a process enter immediately after it is created and waiting in the queue to be executed by the CPU?",opts:["Terminated State","Block/Wait State","Running State","Ready State"],ans:3,hints:["Incorrect because Terminated means it has finished execution. The correct answer is D because a newly converted process waits in the Ready State queue","Incorrect because Block/Wait is for processes waiting for unavailable resources or I/O. The correct answer is D because a new process ready for the CPU goes to the Ready State","Incorrect because it hasn\'t been given to the CPU yet. The correct answer is D because processes wait in the queue in the Ready State before execution",""]},
      {q:"Why do processes transition through various states (Ready, Running, Wait, etc.)?",opts:["Because the OS is trying to waste CPU cycles","Because the OS tries to achieve higher throughput and performance","Because memory requires constant refreshing","Because users type commands too slowly"],ans:1,hints:["Incorrect because the OS aims to be efficient, not wasteful. The correct answer is B because transitioning states allows the OS to maximize CPU usage and achieve higher throughput","","Incorrect because memory refreshing is a hardware function, not the reason for process states. The correct answer is B because the OS uses states to optimize performance and throughput","Incorrect because human speed is irrelevant to the overall scheduling goal. The correct answer is B because state transitions help the OS achieve higher throughput"]},
      {q:"What OS process governs multiple programs communicating with each other to make it safer and faster?",opts:["Scheduling","Concurrency","Deadlock","Inter-Process Communication"],ans:3,hints:["Incorrect because Scheduling organizes the execution queue. The correct answer is D because Inter-Process Communication governs protocols for programs communicating with each other","Incorrect because Concurrency refers to executing multiple threads simultaneously. The correct answer is D because Inter-Process Communication safely manages communication between programs","Incorrect because Deadlock is a negative situation where processes are stuck. The correct answer is D because Inter-Process Communication facilitates safe sharing of data",""]},
      {q:"How does the Operating System avoid Deadlock?",opts:["By deleting the waiting processes","By using process synchronization techniques like Semaphores","By turning off multitasking","By formatting the hard drive"],ans:1,hints:["Incorrect because deleting processes causes data loss and crashing. The correct answer is B because the OS uses process synchronization (like Semaphores) to resolve inconsistencies and avoid deadlock","","Incorrect because multitasking is a core OS feature that remains active. The correct answer is B because synchronization techniques like Semaphores allow processes to communicate before accessing resources","Incorrect because formatting destroys all data. The correct answer is B because Deadlock is avoided through careful process synchronization"]},
      {q:"What is the definition of \"Deadlock\"?",opts:["When a process executes faster than the CPU can handle","When the CLI crashes","When multiple processes try to access the same resources, depend on each other, and none gets the resources","When memory is fully deallocated"],ans:2,hints:["Incorrect because processes cannot execute faster than the CPU. The correct answer is C because deadlock is a mutual waiting situation where no process can proceed","Incorrect because a CLI crash is just an application failure. The correct answer is C because deadlock specifically involves processes stuck waiting on dependent resources","","Incorrect because deallocated memory is a normal memory management function. The correct answer is C because deadlock is when multiple processes are permanently stuck waiting for resources"]},
      {q:"What is the purpose of Memory Deallocation?",opts:["To assign memory to a newly created process","To protect memory from malicious programs","To free up memory occupied by a process that has completed its execution","To swap data from the hard drive to the CPU cache"],ans:2,hints:["Incorrect because this describes Memory Allocation. The correct answer is C because Deallocation frees memory after a process finishes so it can be used again","Incorrect because protection is handled by security management. The correct answer is C because Deallocation is specifically about freeing up used memory","","Incorrect because swapping is for active processes, not completed ones. The correct answer is C because Deallocation frees memory once a process is done"]},
      {q:"Which of the following prevents Process 1 from accessing the memory block assigned to Process 2?",opts:["Deadlock","Memory Protection","Disk Scheduling","Inter-Process Communication"],ans:1,hints:["Incorrect because Deadlock is a resource-blocking error. The correct answer is B because Memory Protection is the OS feature that prevents unauthorized access between memory blocks","","Incorrect because Disk Scheduling manages disk drive access, not RAM. The correct answer is B because Memory Protection explicitly isolates process memory","Incorrect because IPC allows safe communication, but doesn\'t inherently prevent raw memory snooping. The correct answer is B because Memory Protection restricts access rights"]},
      {q:"What is the method or technique an operating system uses to store files on a disk (e.g., FAT32, NTFS)?",opts:["File System","Device Driver","Fragmentation","Process Control Block"],ans:0,hints:["","Incorrect because Device Drivers are software for hardware, not storage methods. The correct answer is A because the File System is defined as the technique used to store files on disk","Incorrect because Fragmentation is wasted disk space. The correct answer is A because FAT32 and NTFS are explicitly given as examples of a File System","Incorrect because the PCB manages processes, not disk files. The correct answer is A because File Systems dictate how files are structured on storage"]},
      {q:"What is a \"Device Driver\"?",opts:["A piece of hardware that spins the hard disk","A piece of software written in the context of particular hardware","The port that directly connects to the hardware","An algorithm used to schedule CPU time"],ans:1,hints:["Incorrect because device drivers are software, not physical hardware. The correct answer is B because Device Drivers are software meant to communicate with specific hardware","","Incorrect because the port is the \"H/W Interface\". The correct answer is B because drivers are software code","Incorrect because CPU scheduling uses algorithms like Round Robin. The correct answer is B because Device Drivers interface the OS with hardware"]},
      {q:"What is the first thing done after formatting a disk to store actual files?",opts:["Compiling","Swapping","Partitioning","Fragmentation"],ans:2,hints:["Incorrect because compiling relates to programming code. The correct answer is C because the slides state the first thing done after formatting is Partitioning","Incorrect because swapping moves active memory to disk. The correct answer is C because Partitioning divides the formatted disk into multiple drives","","Incorrect because Fragmentation is a negative side-effect of file storage, not a deliberate first step. The correct answer is C because Partitioning sets up the disk volumes"]},
      {q:"Which of the following describes \"Fragmentation\" in a disk?",opts:["Deleting a file permanently from the system","Dividing the disk into multiple drives","Left-over, unused space in a data block frame that becomes wasted","Scheduling disk access sequentially"],ans:2,hints:["Incorrect because file deletion is a standard file operation. The correct answer is C because fragmentation occurs when left-over space in a block cannot be used for new data","Incorrect because dividing a disk is called Partitioning. The correct answer is C because Fragmentation wastes storage space within data blocks","","Incorrect because scheduling is handled by algorithms like FCFS. The correct answer is C because Fragmentation refers to inefficiently used space inside data frames"]},
      {q:"Which two algorithms are explicitly mentioned as being used for Disk Scheduling?",opts:["Round Robin and SJF","FCFS and SSTF","FAT32 and NTFS","GUI and CLI"],ans:1,hints:["Incorrect because these are primarily CPU scheduling algorithms. The correct answer is B because First Come First Serve (FCFS) and Shortest Seek Time First (SSTF) are listed for Disk Scheduling","","Incorrect because FAT32 and NTFS are File Systems. The correct answer is B because FCFS and SSTF manage the order of disk access requests","Incorrect because GUI and CLI are User Interfaces. The correct answer is B because FCFS and SSTF are disk scheduling algorithms"]},
      {q:"Why do disks require a scheduling process?",opts:["Because any resource can be accessed by only one process at a time","Because disks spin too slowly for modern CPUs","Because files must be encrypted before being written","Because memory constantly swaps data out"],ans:0,hints:["","Incorrect because while disks are slower, scheduling is strictly needed for concurrency control. The correct answer is A because resources can only be accessed by one process at a time, requiring a queue","Incorrect because encryption relates to Security Management. The correct answer is A because disks, like CPUs, must schedule processes one at a time","Incorrect because while swapping occurs, the fundamental need for scheduling is single-access limitations. The correct answer is A because resources process one request at a time"]},
      {q:"At what two levels is Security managed by the Operating System?",opts:["User Level and Program Level","Kernel Level and Hardware Level","Disk Level and Memory Level","CLI Level and GUI Level"],ans:0,hints:["","Incorrect because these are structural layers, not the defined security levels. The correct answer is A because security is managed at the User Level (pins/passwords) and Program Level (memory boundaries)","Incorrect because the slides categorize security differently. The correct answer is A because User Level and Program Level are the two security tiers","Incorrect because these are command interpreters. The correct answer is A because security applies to the User Level and Program Level"]},
      {q:"Applying a PIN, pattern, or password to a system is an example of security at which level?",opts:["Kernel Level","Device Level","Program Level","User Level"],ans:3,hints:["Incorrect because kernel-level security deals with backend memory/processes. The correct answer is D because PINs and passwords restrict unauthenticated persons at the User Level","Incorrect because device security involves hardware encryption. The correct answer is D because user authentication is explicitly a User Level security feature","Incorrect because Program Level security stops processes from crashing each other. The correct answer is D because passwords are a User Level lock",""]},
      {q:"What is a specific example given of User-Level authorization restriction?",opts:["Allowing any process to read the password file","Guest users are not allowed to access system files or install applications","The Calculator app accessing disk files","The CPU bypassing the BIOS"],ans:1,hints:["Incorrect because this would be a massive security flaw. The correct answer is B because OS authorization restricts Guest users from accessing system files or installing apps","","Incorrect because the slides explicitly note that a Calculator is not allowed to access disk files. The correct answer is B because Guest user restriction is a prime example of authorization","Incorrect because the CPU and BIOS do not fall under User-Level authorization. The correct answer is B because Guest accounts are restricted from modifying the system"]},
      {q:"Application-specific security restrictions (like a video player not accessing messages) are designed to provide:",opts:["Disk Fragmentation","Threat protection","Command Interpretation","Faster CPU scheduling"],ans:1,hints:["Incorrect because fragmentation is a disk storage issue. The correct answer is B because restricting app permissions is a main security feature for threat protection","","Incorrect because command interpretation translates text to commands. The correct answer is B because isolating app permissions protects against malicious threats","Incorrect because restricting app permissions does not speed up the CPU. The correct answer is B because isolating apps is part of threat protection"]},
      {q:"What happens at the \"Program Level\" of security if a process accesses the memory block of another process?",opts:["The OS encrypts the data automatically","The processes merge into a single thread","It may corrupt data and crash the whole system","The OS simply ignores the intrusion"],ans:2,hints:["Incorrect because encryption doesn\'t happen reactively to a memory breach. The correct answer is C because unauthorized memory access can corrupt data and crash the system","Incorrect because processes do not merge. The correct answer is C because one process modifying another\'s memory leads to crashes and corruption","","Incorrect because the OS actively prevents this. The correct answer is C because unauthorized access is highly dangerous to system stability"]},
      {q:"What specific runtime error is thrown in C programming when a program tries to access an unassigned memory address?",opts:["Null Pointer Exception","Syntax Error","Segmentation Fault: Core Dumped","Stack Overflow"],ans:2,hints:["Incorrect because while related to pointers, the OS throws a specific fault. The correct answer is C because the OS immediately throws a \"Segmentation Fault: Core Dumped\"","Incorrect because syntax errors are caught by the compiler before running. The correct answer is C because accessing unauthorized memory causes a Segmentation Fault during runtime","","Incorrect because stack overflows relate to exceeding memory limits, not necessarily unauthorized addressing. The correct answer is C because the OS throws a Segmentation Fault for this violation"]},
      {q:"The error \"Segmentation Fault\" essentially means the operating system is telling you:",opts:["Your hard drive is full","The memory you are trying to access doesn\'t belong to your program","Your CPU is overheating","You have a typo in your command line interface"],ans:1,hints:["Incorrect because a full hard drive causes a disk space error. The correct answer is B because a Segmentation Fault is triggered by accessing restricted memory areas","","Incorrect because overheating is a hardware thermal issue. The correct answer is B because the OS explicitly throws this error when memory ownership rules are violated","Incorrect because typos cause CLI parsing errors. The correct answer is B because it is a Program Level security enforcement"]},
      {q:"In the component diagram for Memory Management, what operations occur between the CPU and Main Memory (RAM)?",opts:["Create and Delete","Swap In and Swap Out","Formatting and Partitioning","GUI and CLI"],ans:1,hints:["Incorrect because Create and Delete are File System operations. The correct answer is B because the Memory Management diagram illustrates \"Swap In\" and \"Swap Out\" between CPU and RAM","","Incorrect because these are Disk Management operations. The correct answer is B because memory management involves swapping data in and out of RAM","Incorrect because these are User Interfaces. The correct answer is B because the CPU swaps data in and out of Main Memory"]},
      {q:"What does the \"H/W Interface\" do in File System & Device Management?",opts:["It renders graphical icons on the screen","It directly connects to the hardware and is also called an Interface card or Controller","It compiles C programming code","It converts threads back into processes"],ans:1,hints:["Incorrect because the GUI handles graphical icons. The correct answer is B because the H/W interface is the physical port/card connecting to hardware","","Incorrect because compilers handle code. The correct answer is B because the H/W interface (Controller) communicates physically with the device","Incorrect because Concurrency handles threads. The correct answer is B because the H/W Interface directly connects to hardware disks"]},
      {q:"A process is considered a program under execution. What is the passive counterpart to a process?",opts:["The CPU","The Application code stored on a disk","The Command Line","The Main Memory"],ans:1,hints:["Incorrect because the CPU is active hardware. The correct answer is B because a program is just passive code on a disk until it is loaded into memory to become a process","","Incorrect because the command line is an active interface. The correct answer is B because unloaded applications are passive files on the disk","Incorrect because Main Memory holds active processes. The correct answer is B because an unloaded program is not yet an executing process"]},
      {q:"Which of the following attributes is NOT stored in the Process Control Block (PCB)?",opts:["Process Identification Number (PID)","General purpose registers","The full source code of the user\'s application","Files required to access on disk"],ans:2,hints:["Incorrect because the PID is explicitly stored in the PCB. The correct answer is C because the PCB stores attributes and states, not the raw source code of the application","Incorrect because registers are a CPU-related attribute in the PCB. The correct answer is C because the PCB acts as a state table, not a code repository","","Incorrect because file requirements are stored in the PCB. The correct answer is C because the PCB tracks execution state, not the source code text"]},
      {q:"When multiple processes are converted into threads executed by different cores at the same time, this is called:",opts:["Deadlock","Concurrency","Formatting","Segmentation"],ans:1,hints:["Incorrect because Deadlock is a freeze caused by resource contention. The correct answer is B because Concurrency specifically describes multiple threads executing across different CPU cores simultaneously","","Incorrect because Formatting prepares a disk. The correct answer is B because Concurrency involves parallel thread execution","Incorrect because Segmentation relates to memory division and protection. The correct answer is B because Concurrency deals with multithreaded core execution"]},
      {q:"Modern Operating Systems like Windows have inbuilt security applications that primarily detect:",opts:["Missing hardware drivers","Malicious programs","Syntax errors in C","Dust in the disk drive"],ans:1,hints:["Incorrect because while OS can detect missing drivers, the security app specifically targets threats. The correct answer is B because inbuilt security applications detect malicious programs","","Incorrect because compilers detect syntax errors. The correct answer is B because the threat protection feature scans for malware","Incorrect because software cannot detect physical dust. The correct answer is B because modern OS security features detect malicious programs"]},
      {q:"If a process requires additional resources that are NOT currently available, what does the OS do with that process?",opts:["Automatically terminates it","Upgrades its priority to maximum","Keeps the process waiting until the required resources are available","Merges it with the OS kernel"],ans:2,hints:["Incorrect because terminating it would cause programs to crash constantly. The correct answer is C because the OS places it in a Wait/Block state until resources free up","Incorrect because upgrading priority doesn\'t magically create unavailable resources. The correct answer is C because the process must wait in a suspended or blocked state","","Incorrect because user processes never merge with the kernel. The correct answer is C because the process is kept waiting"]}
    ],
    tf:[
      {q:"The Operating System acts as an interface between the user and the computer hardware",ans:true,hint:"Incorrect. The slides explicitly state that an operating system is software that helps users interact with computer hardware and acts as the interface"},
      {q:"Memory Management is a component of the operating system that operates in User Mode",ans:false,hint:"Incorrect. Memory Management is listed as a component followed in the Kernel Mode, not User Mode. User mode handles I/O and Command Interpreters"},
      {q:"In Process Management, a PCB acts like a table in which the attributes related to an individual process are stored",ans:true,hint:"Incorrect. The slides define the Process Control Block (PCB) exactly as a table storing attributes like PID, registers, and memory limits for an individual process"},
      {q:"The OS switches from Kernel Mode to User Mode to process backend I/O tasks",ans:false,hint:"Incorrect. The OS switches from User Mode to Kernel Mode to perform backend processing, and then switches back to User Mode to display the result"},
      {q:"Multitasking allows users to run more than one application at the same time, such as browsing while listening to music",ans:true,hint:"Incorrect. Multitasking is defined in the slides exactly as allowing users to run more than one application concurrently, like browsing and listening to music"},
      {q:"Process Synchronization is used by the OS to avoid Deadlock when multiple processes require common resources",ans:true,hint:"Incorrect. The OS explicitly avoids deadlock by using process synchronization (like Semaphores) so processes can communicate before accessing shared resources"},
      {q:"Fragmentation occurs when a disk is divided into multiple drives or volumes",ans:false,hint:"Incorrect. Dividing a disk into volumes is called Partitioning. Fragmentation is when left-over space in a data block frame is not useful and becomes wasted"},
      {q:"Any resource on a disk can be accessed by multiple processes at the exact same time without scheduling",ans:false,hint:"Incorrect. The slides specify that any resource can be accessed by only one process at a time, which is why Disk Scheduling (like FCFS or SSTF) is required"},
      {q:"At the User Level of security, guest users are generally allowed to access system files and install any application",ans:false,hint:"Incorrect. The slides explicitly state that as part of User Level authorization, Guest users are not allowed to access system files or install applications"},
      {q:"In C Programming, trying to access a memory address that does not belong to your program throws a \"Segmentation Fault: Core Dumped\" error",ans:true,hint:"Incorrect. Program Level security dictates that no process can access another\'s memory. Violating this with pointers in C immediately throws a runtime Segmentation Fault"}

    title:"OS Technology Concepts",
    mc:[
      {q:"What does the acronym BIOS stand for?",opts:["Basic Internet Operations System","Basic Input/Output System","Binary Interoperability Operating System","Boot Initialization and Organization System"],ans:1,hints:["Incorrect because BIOS does not deal with the internet . The correct answer is B because BIOS stands for Basic Input/Output System","","Incorrect because BIOS is not an operating system itself . The correct answer is B because the slides define it as Basic Input/Output System","Incorrect because although it initializes the boot process, this is not the acronym\'s meaning . The correct answer is B because BIOS stands for Basic Input/Output System"]},
      {q:"Where is the BIOS program typically stored on a computer\'s motherboard?",opts:["In the Main Memory (RAM)","On the Hard Disk Drive","In an EEPROM or EPROM chip","Inside the CPU cache"],ans:2,hints:["Incorrect because RAM is volatile and loses data when powered off . The correct answer is C because the BIOS is typically stored in EPROM or Electrically-erasable programmable ROM (EEPROM)","Incorrect because the BIOS must run before the hard disk is even accessed . The correct answer is C because it is stored on an EEPROM chip","","Incorrect because the CPU cache does not permanently store startup programs . The correct answer is C because BIOS is stored in an EPROM/EEPROM"]},
      {q:"What does POST stand for in the context of the BIOS startup procedure?",opts:["Power-On Self Test","Primary Operating System Thread","Partition Optimization and Setup Tool","Peripheral Output Standard Transmission"],ans:0,hints:["","Incorrect because POST occurs before the operating system is loaded . The correct answer is A because POST stands for Power-On Self Test","Incorrect because partitioning is a disk formatting step, not a BIOS startup test . The correct answer is A because POST stands for Power-On Self Test","Incorrect because this is a fabricated term . The correct answer is A because the BIOS begins its work as part of the Power-On Self Test (POST) process"]},
      {q:"Which newer technology was designed in the early 21st century to replace the legacy BIOS?",opts:["MBR (Master Boot Record)","LDM (Logical Disk Manager)","UEFI (Unified Extensible Firmware Interface)","GRUB (GNU GRand Unified Bootloader)"],ans:2,hints:["Incorrect because MBR is a partition scheme, not a firmware interface . The correct answer is C because UEFI was created to replace BIOS and handle larger drives","Incorrect because LDM is used for managing Dynamic Disks . The correct answer is C because UEFI is the firmware interface that replaced BIOS","","Incorrect because GRUB is an operating system bootloader, not the motherboard firmware . The correct answer is C because UEFI replaced BIOS"]},
      {q:"What is the size of the Master Boot Record (MBR) loaded by the BIOS from the hard drive?",opts:["64 Kilobytes","512 Bytes","2 Megabytes","4 Gigabytes"],ans:1,hints:["Incorrect because this is much larger than the MBR . The correct answer is B because the BIOS loads the first 512 bytes, known as the MBR","","Incorrect because 2 Megabytes is far too large for a boot sector record . The correct answer is B because the MBR consists of exactly the first 512 bytes","Incorrect because 4 GB is a file size limit, not a sector record size . The correct answer is B because the MBR is 512 bytes"]},
      {q:"What is the maximum number of primary partitions that the Master Boot Record (MBR) partition scheme can index?",opts:["1","4","32","128"],ans:1,hints:["Incorrect because MBR allows more than a single partition . The correct answer is B because the MBR contains an index of up to four primary partitions","","Incorrect because 32 is the maximum number of disks in a spanned volume, not MBR partitions . The correct answer is B because MBR supports a maximum of 4 primary partitions","Incorrect because 128 is the partition limit for the newer GPT scheme . The correct answer is B because MBR maxes out at 4 primary partitions"]},
      {q:"Which bootloader is the default for the Windows NT, 2000, and XP operating systems?",opts:["NTLDR","BOOTMGR","GRUB","LILO"],ans:0,hints:["","Incorrect because BOOTMGR is used on newer systems like Windows Vista, 7, 8, and 10 . The correct answer is A because NTLDR is the default for Windows NT, 2000, and XP","Incorrect because GRUB is the most popular bootloader for Linux . The correct answer is A because NTLDR is the Windows NT/2000/XP bootloader","Incorrect because LILO is an older Linux bootloader not mentioned in the slides . The correct answer is A because NTLDR is used for Windows NT/2000/XP"]},
      {q:"Which popular bootloader is modular, heavily used in Linux, and stores its settings in a file called grub.cfg or menu.lst?",opts:["NTLDR","NTDETECT.COM","BOOTMGR","GRUB"],ans:3,hints:["Incorrect because NTLDR is for older Windows systems . The correct answer is D because GRUB is the modular bootloader popular for Linux that uses grub.cfg","Incorrect because NTDETECT.COM is a helper program for NTLDR . The correct answer is D because GRUB is the Linux bootloader","Incorrect because BOOTMGR is the newer Windows bootloader . The correct answer is D because GRUB is the Linux bootloader that uses grub.cfg",""]},
      {q:"In what bit-mode does the legacy BIOS operate, which limits the amount of code that can be read and executed?",opts:["8-bit mode","16-bit mode","32-bit mode","64-bit mode"],ans:1,hints:["Incorrect because BIOS operates higher than 8-bit . The correct answer is B because BIOS has been in use since the beginning and works in 16-bit mode","","Incorrect because 32-bit mode is utilized by later operating systems, whereas BIOS uses an older standard . The correct answer is B because legacy BIOS operates in 16-bit mode","Incorrect because 64-bit mode is for modern OS operations, not legacy BIOS . The correct answer is B because BIOS is limited to 16-bit mode"]},
      {q:"Instead of the firmware, where does UEFI store all the information about initialization and startup?",opts:["In the Master Boot Record (MBR)","In the CMOS battery","In an .efi file inside the EFI System Partition (ESP)","In the Windows Registry"],ans:2,hints:["Incorrect because MBR is used by legacy BIOS, not UEFI . The correct answer is C because UEFI stores initialization information in an .efi file in the ESP","Incorrect because the CMOS battery provides power to save settings, it does not store the initialization files . The correct answer is C because UEFI uses an .efi file in the ESP","","Incorrect because the Windows Registry is loaded long after firmware initialization . The correct answer is C because UEFI stores the data in an .efi file inside a special ESP partition"]},
      {q:"What is the maximum partition size supported by the legacy MBR partitioning scheme?",opts:["~2TB","~9 ZetaBytes","4 Gigabytes","Unlimited"],ans:0,hints:["","Incorrect because ~9 ZetaBytes is the massive limit for UEFI/GPT . The correct answer is A because MBR is severely limited to a maximum partition size of ~2TB","Incorrect because 4 GB is the file size limit for FAT32, not the MBR partition limit . The correct answer is A because MBR maxes out at ~2TB","Incorrect because legacy architectures have strict mathematical limits . The correct answer is A because MBR is limited to ~2TB"]},
      {q:"How many partitions can a GUID Partition Table (GPT) support?",opts:["4","32","128","256"],ans:2,hints:["Incorrect because 4 is the limit for the older MBR scheme . The correct answer is C because the comparison chart states GPT can have 128 partitions","Incorrect because 32 is the maximum number of disks in a spanned volume . The correct answer is C because GPT supports 128 partitions","","Incorrect because the architectural limit explicitly stated in the slides is 128 . The correct answer is C because GPT allows 128 partitions"]},
      {q:"Which of the following is a security feature offered by UEFI that is NOT available in legacy BIOS?",opts:["Multi-boot configurations","Secure boot","Device drivers","Direct Cache Access"],ans:1,hints:["Incorrect because legacy BIOS with MBR fully supports multi-boot configurations . The correct answer is B because the comparison chart notes UEFI offers Secure boot while Legacy BIOS does not","","Incorrect because both systems utilize device drivers eventually . The correct answer is B because Secure boot guarantees only verified OS loaders run, a feature unique to UEFI","Incorrect because cache access is a CPU performance feature . The correct answer is B because Secure boot prevents malware from changing boot components in UEFI"]},
      {q:"What programming language is UEFI primarily written in, making it more modern than the assembly language used for Legacy BIOS?",opts:["Java","Python","C-language","PHP"],ans:2,hints:["Incorrect because Java runs in a virtual machine which isn\'t available at the firmware level . The correct answer is C because UEFI is written in C-language","Incorrect because Python is a high-level interpreted language not suited for raw firmware bootloaders . The correct answer is C because UEFI utilizes C-language","","Incorrect because PHP is for web development . The correct answer is C because the comparison chart explicitly lists C-language for UEFI"]},
      {q:"Which hidden database do Dynamic Disks use to track partitions and volumes instead of a normal partition table?",opts:["Master Boot Record (MBR)","GUID Partition Table (GPT)","Logical Disk Manager (LDM) or Virtual Disk Service (VDS)","File Allocation Table (FAT32)"],ans:2,hints:["Incorrect because MBR is a traditional partition table used by Basic Disks . The correct answer is C because Dynamic Disks use a hidden LDM or VDS to track volumes","Incorrect because GPT is a partition table style, whereas Dynamic Disks use a hidden database . The correct answer is C because Dynamic Disks rely on an LDM database","","Incorrect because FAT32 is a file system for storing user files, not a disk manager . The correct answer is C because Dynamic Disks use LDM or VDS"]},
      {q:"Are you able to expand the capacity of a partition on a Basic Disk directly without third-party tools?",opts:["Yes, at any time without restarting","No, the size of a Basic Disk partition cannot be changed directly once created","Yes, but only if you delete the OS first","Yes, but it requires formatting to NTFS"],ans:1,hints:["Incorrect because this describes the capability of a Dynamic Disk . The correct answer is B because Basic Disk capacities cannot be changed directly without third-party tools","","Incorrect because deleting the OS destroys the system . The correct answer is B because extending a partition size natively is a feature of Dynamic Disks, not Basic Disks","Incorrect because the file system type (NTFS) does not grant a Basic Disk the ability to dynamically expand partition boundaries . The correct answer is B because Basic Disks cannot change capacity directly"]},
      {q:"What is a major limitation of using Dynamic Disks regarding operating systems?",opts:["They limit the hard drive to 2TB maximum capacity","They do not support multi-boot configurations (cannot easily switch between OSs)","They are limited to 4 partitions","They only support the MS-DOS operating system"],ans:1,hints:["Incorrect because Dynamic Disks (and GPT) bypass the 2TB MBR limit, allowing unlimited volume sizes . The correct answer is B because Dynamic Disks do not support multi-boot configurations","","Incorrect because Dynamic Disks allow an unlimited number of volumes/partitions . The correct answer is B because you cannot easily switch between OSs on Dynamic Disks","Incorrect because MS-DOS actually does not support Dynamic Disks at all; only Windows 2000 and newer do . The correct answer is B because Dynamic Disks block multi-boot setups"]},
      {q:"What kind of dynamic disk volume is made from free disk space linked together from multiple disks (up to 32 disks) and cannot be mirrored?",opts:["Simple Volume","Spanned Volume","Striped Volume","RAID-5 Volume"],ans:1,hints:["Incorrect because a simple volume uses free space from a single disk . The correct answer is B because a spanned volume links space across multiple disks up to 32","","Incorrect because while striped volumes use multiple disks, they interleave data alternately rather than just linking free space sequentially . The correct answer is B because a spanned volume simply links free space","Incorrect because RAID-5 requires 3 or more disks for fault tolerance via parity . The correct answer is B because a spanned volume links space without interleaving or mirroring"]},
      {q:"Which dynamic volume type provides data redundancy by duplicating all data on two physical disks (also known as RAID-1)?",opts:["Spanned Volume","Mirrored Volume","Striped Volume","Primary Partition"],ans:1,hints:["Incorrect because spanned volumes provide no fault tolerance . The correct answer is B because a mirrored volume copies data to two disks to provide redundancy, known as RAID-1","","Incorrect because striped volumes (RAID-0) improve performance but offer no fault tolerance or duplication . The correct answer is B because mirrored volumes duplicate data (RAID-1)","Incorrect because a primary partition is a Basic Disk feature, not a fault-tolerant dynamic volume . The correct answer is B because mirrored volumes are fault-tolerant duplicates"]},
      {q:"Which dynamic volume interleaves data across two or more physical disks alternately and evenly, and is also known as RAID-0?",opts:["Simple Volume","Mirrored Volume","Striped Volume","RAID-5 Volume"],ans:2,hints:["Incorrect because simple volumes operate on one disk . The correct answer is C because striped volumes interleave data across disks and are known as RAID-0","Incorrect because mirrored volumes duplicate data (RAID-1) rather than interleaving it alternately . The correct answer is C because striped volumes (RAID-0) allocate data evenly across disks","","Incorrect because RAID-5 involves three or more disks and includes fault tolerance . The correct answer is C because striped volumes are RAID-0 and interleave data"]},
      {q:"What happens if you try to convert a Dynamic Disk back to a Basic Disk?",opts:["The conversion happens instantly with no data loss","The MBR automatically upgrades to GPT","All volumes on the dynamic disk must be deleted, causing data loss unless backed up","The computer permanently disables UEFI"],ans:2,hints:["Incorrect because going from Basic to Dynamic is lossless, but the reverse is not . The correct answer is C because converting from Dynamic to Basic requires deleting all volumes","Incorrect because converting disk management models has nothing to do with auto-upgrading to GPT . The correct answer is C because you must delete all dynamic volumes to revert to Basic","","Incorrect because firmware (UEFI) is unaffected by disk partitioning schemes . The correct answer is C because converting back to a Basic Disk destroys all data on the volumes"]},
      {q:"Which specific partition is the only one that can be set \"active\" for the BIOS to locate and boot Windows?",opts:["Logical Drive","Primary Partition","Extended Partition","Spanned Volume"],ans:1,hints:["Incorrect because logical partitions cannot be set active . The correct answer is B because only a Primary Partition can be set active to save boot files","","Incorrect because extended partitions serve as containers for logical drives and cannot be booted directly . The correct answer is B because the Primary Partition must be set active for the BIOS","Incorrect because spanned volumes are on Dynamic Disks, which don\'t use traditional active partition booting . The correct answer is B because only Primary Partitions can be set active"]},
      {q:"How are physical hard disks structurally divided to store files?",opts:["BIOS -> MBR -> ESP","Files -> Folders -> Directories","Tracks -> Sectors -> Clusters","Simple -> Spanned -> Striped"],ans:2,hints:["Incorrect because these are boot components and firmwares . The correct answer is C because disks are divided into tracks, which divide into sectors, which group into clusters","Incorrect because this is a logical user view, not the physical disk structure . The correct answer is C because physically, a disk uses tracks, sectors, and clusters","","Incorrect because these are Dynamic Volume types . The correct answer is C because physical disk storage uses tracks, sectors, and clusters"]},
      {q:"What determines the number of sectors inside a cluster?",opts:["The size of the hard drive and the File allocation system (e.g., FAT32, NTFS)","The amount of RAM installed on the motherboard","The graphics adapter installed","The speed of the CPU"],ans:0,hints:["","Incorrect because RAM has no bearing on hard disk cluster sizing . The correct answer is A because the number of sectors in a cluster is determined by hard drive size and the file system","Incorrect because a graphics adapter handles video, not storage architecture . The correct answer is A because drive size and the file system (FAT32, NTFS) determine cluster size","Incorrect because CPU speed does not format disk storage . The correct answer is A because the file allocation system and hard drive size decide cluster sizing"]},
      {q:"According to the File System comparison table, what is the Maximum File Size supported by FAT32?",opts:["2 GiB","4 GiB","16 TiB","256 TiB"],ans:1,hints:["Incorrect because 2 GiB is the limit for FAT16 . The correct answer is B because the table explicitly lists 4 GiB as the max file size for FAT32","","Incorrect because 16 TiB is the limit for ext4 . The correct answer is B because FAT32 is limited to a maximum file size of 4 GiB","Incorrect because 256 TiB is the max partition size for NTFS . The correct answer is B because FAT32 has a max file size of 4 GiB"]},
      {q:"According to the File System comparison table, what is the Maximum Partition Size supported by NTFS?",opts:["8 TiB","32 TiB","256 TiB","1 EiB"],ans:2,hints:["Incorrect because 8 TiB is the max partition size for FAT32 . The correct answer is C because the table lists 256 TiB as the max partition size for NTFS","Incorrect because 32 TiB is the max partition size for ext2 and ext3 . The correct answer is C because NTFS supports up to 256 TiB","","Incorrect because 1 EiB is the max partition size for ext4 . The correct answer is C because NTFS reaches up to 256 TiB for a partition"]},
      {q:"Which keyboard shortcut is given to quickly open the Task Manager in Windows to check virtualization?",opts:["Alt + F4","Ctrl + Alt + Delete","Ctrl + Shift + Esc","Windows Key + R"],ans:2,hints:["Incorrect because Alt + F4 closes the current window . The correct answer is C because the slides specifically instruct to use Ctrl + Shift + Esc","Incorrect because while this opens a security screen where Task Manager can be selected, the direct shortcut given in the slides is different . The correct answer is C because Ctrl + Shift + Esc opens it directly","","Incorrect because Win + R opens the Run dialog box . The correct answer is C because Ctrl + Shift + Esc is the given shortcut for Task Manager"]},
      {q:"Under which tab in the Windows Task Manager can you check if Virtualization is enabled or disabled?",opts:["Processes","Performance","Startup","Services"],ans:1,hints:["Incorrect because the Processes tab shows active apps and background tasks . The correct answer is B because the Performance tab displays CPU details including the Virtualization status","","Incorrect because Startup handles boot applications . The correct answer is B because Virtualization status is found under the CPU section of the Performance tab","Incorrect because Services shows background system services . The correct answer is B because the Performance tab reveals Virtualization status"]},
      {q:"When looking in the BIOS, what might Intel\'s hardware virtualization technology be named?",opts:["AMD-V","Secure Boot","VT-x or Vanderpool","ESP"],ans:2,hints:["Incorrect because AMD-V is the name for AMD\'s virtualization . The correct answer is C because Intel\'s virtualization is often called VT-x, VT-d, or Vanderpool","Incorrect because Secure Boot is a UEFI security feature, not virtualization . The correct answer is C because Intel uses VT-x or Vanderpool","","Incorrect because ESP is the EFI System Partition used for bootloaders . The correct answer is C because Intel\'s virtualization technology is named VT-x or Vanderpool"]},
      {q:"What command can you type in the Run window (Win key + R) to view detailed system information?",opts:["CMD","MSINFO32","ipconfig","mkdir"],ans:1,hints:["Incorrect because CMD opens the command prompt interface . The correct answer is B because MSINFO32 specifically opens the System Information tool","","Incorrect because ipconfig shows network configurations in the CLI . The correct answer is B because MSINFO32 is explicitly listed in the tips to view system info","Incorrect because mkdir is a directory creation command in Linux/CLI . The correct answer is B because MSINFO32 is the system info command"]},
      {q:"What file contains the boot settings for the popular Linux bootloader GRUB?",opts:["BOOT.INI","NTDETECT.COM","grub.cfg or menu.lst","The BCD file"],ans:2,hints:["Incorrect because BOOT.INI is used by the NTLDR bootloader for old Windows . The correct answer is C because GRUB uses grub.cfg or menu.lst","Incorrect because NTDETECT is a hardware helper for Windows NTLDR . The correct answer is C because Linux\'s GRUB stores settings in grub.cfg or menu.lst","","Incorrect because the BCD file is used by BOOTMGR in modern Windows . The correct answer is C because GRUB uses grub.cfg (GRUB2) or menu.lst"]},
      {q:"Which of the following bootloaders is completely self-contained and does NOT need any helper programs or routines?",opts:["BOOTMGR","NTLDR","GRUB","BIOS"],ans:0,hints:["","Incorrect because NTLDR explicitly requires the NTDETECT.COM helper program . The correct answer is A because BOOTMGR is self-contained","Incorrect because GRUB is modular and loads additional modules from disk . The correct answer is A because BOOTMGR is described as self-contained","Incorrect because BIOS is the firmware, not an OS bootloader . The correct answer is A because BOOTMGR doesn\'t need helper routines"]},
      {q:"What is a key benefit of using a Dynamic Disk over a Basic Disk regarding volume creation?",opts:["It limits partitions to exactly 4 for better security","It allows for the creation of RAID-5 and mirrored fault-tolerant volumes","It forces the disk to use the legacy MBR format","It is required to install MS-DOS"],ans:1,hints:["Incorrect because Dynamic Disks allow an unlimited number of volumes; Basic Disks with MBR are limited to 4 . The correct answer is B because Dynamic Disks allow advanced volumes like RAID-5 and mirrored","","Incorrect because Dynamic Disks are a logical software management model, not a physical mandate for legacy MBR . The correct answer is B because they support advanced fault-tolerant volumes","Incorrect because MS-DOS does not support Dynamic Disks . The correct answer is B because Dynamic Disks support complex RAID volumes"]},
      {q:"Which of the following operating systems completely lacks support for Dynamic Disks?",opts:["Windows 10","Windows 8","Windows XP","Windows 95/98"],ans:3,hints:["Incorrect because Windows 10 supports Dynamic Disks . The correct answer is D because older operating systems like MS-DOS and Windows 95/98 do not support Dynamic Disks","Incorrect because Windows 8 supports Dynamic Disks . The correct answer is D because Windows 95/98 only support Basic Disks","Incorrect because Windows XP explicitly supports Dynamic Disks . The correct answer is D because legacy OSs like Windows 95/98 lack dynamic support",""]},
      {q:"If you wanted to install three different operating systems on a single hard drive (a multi-boot configuration), which disk type MUST you use?",opts:["Spanned Disk","Dynamic Disk","Basic Disk","Striped Disk"],ans:2,hints:["Incorrect because spanned is a volume type, not a base disk management type . The correct answer is C because Basic Disks fully support multi-boot configurations","Incorrect because Dynamic Disks explicitly do not support multi-boot configurations . The correct answer is C because Basic Disks are required for easy multi-boot setups","","Incorrect because a striped disk is a RAID volume type . The correct answer is C because Basic Disks support multi-boot configurations"]},
      {q:"During the boot process, what does the MBR load from the active partition to continue startup?",opts:["The Windows Registry","Code from the bootsector to run the bootloader","The graphics adapter drivers","The Task Manager"],ans:1,hints:["Incorrect because the OS registry is loaded much later by the OS itself . The correct answer is B because the MBR loads code from the bootsector to run the bootloader","","Incorrect because graphics drivers are loaded by the OS, not the MBR . The correct answer is B because the MBR initiates the bootloader","Incorrect because Task Manager is an OS user-space application . The correct answer is B because the MBR runs the bootloader from the active partition\'s bootsector"]},
      {q:"How does legacy BIOS select the boot device?",opts:["It randomly picks a connected hard drive","It reads the first sector of the hard drive which has the next device\'s address to initialize","It relies entirely on the ESP partition","It waits for the user to type a CLI command"],ans:1,hints:["Incorrect because the BIOS follows a strict initialization procedure . The correct answer is B because BIOS works by reading the first sector of the hard drive to find the initialization address","","Incorrect because the ESP partition is used by the modern UEFI system, not legacy BIOS . The correct answer is B because BIOS reads the first sector of the hard drive","Incorrect because the boot process happens automatically without CLI inputs . The correct answer is B because the BIOS reads the first sector"]},
      {q:"What does a \"Logical Drive\" reside inside of?",opts:["An Extended Partition","The CMOS Battery","A Primary Partition","The UEFI Firmware"],ans:0,hints:["","Incorrect because the CMOS battery provides power to the BIOS chip . The correct answer is A because logical drives are created inside an Extended Partition","Incorrect because a Primary Partition is a standalone partition, whereas logical drives exist within an Extended Partition . The correct answer is A because logical drives exist inside extended partitions","Incorrect because UEFI is firmware . The correct answer is A because a logical drive is a hard disk partition created in an extended partition"]},
      {q:"Which feature enables faster resumes from \"S states\" (Sleep / Hibernate)?",opts:["Legacy BIOS","MBR","UEFI BIOS","Basic Disk"],ans:2,hints:["Incorrect because Legacy BIOS takes a time delay to resume from S states . The correct answer is C because the comparison chart notes UEFI offers faster resumes from S states","Incorrect because MBR is a partition table, not the system firmware controlling power states . The correct answer is C because UEFI natively handles faster sleep/hibernate resumes","","Incorrect because Basic Disk is a storage scheme . The correct answer is C because UEFI firmware offers faster S state resumes"]},
      {q:"If a simple volume is extended across multiple physical disks, what does it become?",opts:["A Striped Volume","A Mirrored Volume","A Spanned Volume","An Extended Partition"],ans:2,hints:["Incorrect because striped volumes alternate data evenly rather than just extending a simple volume . The correct answer is C because extending a simple volume across multiple disks converts it into a Spanned Volume","Incorrect because mirrored volumes duplicate data for fault tolerance . The correct answer is C because an extended simple volume spanning disks is a Spanned Volume","","Incorrect because an extended partition is a concept from Basic Disks used to hold logical drives . The correct answer is C because dynamic simple volumes extending across disks become Spanned Volumes"]}
