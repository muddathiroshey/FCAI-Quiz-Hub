  {
    id:3,
    title:"Processes",
    mc:[
      {q:"What is the fundamental difference between a program and a process?",opts:["A program is an active entity executing concurrently, while a process is a passive entity","A program is a passive entity stored on disk, while a process is an active entity loaded into memory","A program manages the hardware, while a process provides the graphical user interface","There is no difference; the terms represent the exact same concept"],ans:1,hints:["Incorrect because a program is not active; a program is a passive entity stored on disk, making B the correct answer because a process is active when loaded into memory","","Incorrect because hardware management is the OS\'s job, not a program\'s definition. The correct answer is B because a process is an active executable loaded into memory","Incorrect because they are distinct states. The correct answer is B because a program is a passive file on disk, whereas a process is actively executing in memory"]},
      {q:"Which section of a process\'s memory layout contains temporary data storage such as function parameters, return addresses, and local variables?",opts:["The Text section","The Heap","The Data section","The Stack"],ans:3,hints:["Incorrect because the text section contains the executable code . The correct answer is D because the stack specifically holds temporary data when invoking functions","Incorrect because the heap contains memory dynamically allocated during run time . The correct answer is D because the stack handles function parameters and local variables","Incorrect because the data section contains global variables . The correct answer is D because the stack is designated for temporary execution data",""]},
      {q:"In a C program\'s memory layout, where is the memory that is dynamically allocated during run time stored?",opts:["The Stack","The Heap","The Uninitialized data section","The Text section"],ans:1,hints:["Incorrect because the stack stores temporary local variables . The correct answer is B because the heap is designed to contain memory dynamically allocated during run time","","Incorrect because the uninitialized data section is for global data . The correct answer is B because dynamic memory uses the heap","Incorrect because the text section holds the program\'s code . The correct answer is B because the heap handles run-time dynamic allocation"]},
      {q:"When a process is waiting to be assigned to a processor, what state is it in?",opts:["New","Running","Ready","Waiting"],ans:2,hints:["Incorrect because \"New\" means the process is just being created . The correct answer is C because \"Ready\" specifies the process is waiting to be assigned to a processor","Incorrect because \"Running\" means instructions are actively being executed . The correct answer is C because a process waiting for a processor sits in the \"Ready\" state","","Incorrect because \"Waiting\" means it is waiting for an event like I/O . The correct answer is C because \"Ready\" is the state before processor assignment"]},
      {q:"What is another name for the Process Control Block (PCB)?",opts:["Program Counter","Task Control Block","Memory-Management Unit","Process Status Word"],ans:1,hints:["Incorrect because the Program Counter is just one piece of data stored inside the PCB . The correct answer is B because the slides note the PCB is also called a task control block","","Incorrect because the MMU handles memory addresses. The correct answer is B because task control block is an explicit synonym for PCB","Incorrect because the Process Status Word relates to permissions/protection. The correct answer is B because the PCB is also referred to as the task control block"]},
      {q:"Which component of the PCB indicates the address of the next instruction to be executed for a process?",opts:["CPU registers","Accounting information","Program counter","Process state"],ans:2,hints:["Incorrect because CPU registers save general states like accumulators and stack pointers . The correct answer is C because the program counter specifically indicates the address of the next instruction","Incorrect because accounting info tracks CPU time used . The correct answer is C because the program counter holds the next instruction\'s address","","Incorrect because process state indicates if the process is ready, running, or waiting . The correct answer is C because the program counter handles instruction addresses"]},
      {q:"In the Linux operating system, what C structure represents the process control block?",opts:["pcb_struct","task_struct","process_block","list_head"],ans:1,hints:["Incorrect because Linux does not use this generic name. The correct answer is B because the slides explicitly state the Linux PCB is represented by the C structure task_struct","","Incorrect because this is a fabricated term. The correct answer is B because Linux uses the task_struct structure","Incorrect because list_head is a field within the structure used for children, not the structure itself . The correct answer is B because the full structure is task_struct"]},
      {q:"What pointer does the Linux kernel maintain to keep track of the process currently executing on the system?",opts:["parent","active","current","state"],ans:2,hints:["Incorrect because parent points to the process that created it . The correct answer is C because the kernel maintains a pointer named current to the currently executing process","Incorrect because there is no such pointer mentioned. The correct answer is C because the pointer to the executing process is current","","Incorrect because state is a field indicating process status . The correct answer is C because the pointer is called current"]},
      {q:"What is the primary goal of the process scheduler?",opts:["To maximize CPU use and quickly switch processes onto the CPU core","To compile programs sequentially","To permanently store processes onto the hard disk","To avoid cascading termination"],ans:0,hints:["","Incorrect because compilers handle compilation. The correct answer is A because the scheduler\'s stated goal is to maximize CPU use and switch processes quickly","Incorrect because the scheduler manages RAM queues, not permanent disk storage . The correct answer is A because its goal is maximizing CPU utilization","Incorrect because cascading termination is a process deletion event, not the scheduler\'s goal. The correct answer is A because the scheduler aims to maximize CPU use"]},
      {q:"Which queue holds the set of all processes residing in main memory that are ready and waiting to execute?",opts:["The Wait queue","The I/O queue","The Ready queue","The Device queue"],ans:2,hints:["Incorrect because the wait queue holds processes waiting for an event like I/O . The correct answer is C because the ready queue holds processes residing in main memory ready to execute","Incorrect because an I/O queue is a specific wait queue. The correct answer is C because processes ready for execution wait in the ready queue","","Incorrect because device queues are for specific hardware waits. The correct answer is C because the ready queue manages processes waiting for the CPU"]},
      {q:"What happens if a running process issues an I/O request?",opts:["It is placed in the ready queue","It is placed in an I/O wait queue","It is immediately terminated","It creates a new child process"],ans:1,hints:["Incorrect because the ready queue is for processes ready to use the CPU. The correct answer is B because a process issuing an I/O request is placed in an I/O wait queue","","Incorrect because I/O is a normal operation, not a fatal error. The correct answer is B because the process transitions to a wait queue","Incorrect because I/O requests do not inherently spawn children. The correct answer is B because the process moves to an I/O wait queue"]},
      {q:"Why is context switch time considered \"pure overhead\"?",opts:["Because it speeds up the processor","Because the system does no useful work while switching","Because it clears the system cache permanently","Because it forces the user to log out"],ans:1,hints:["Incorrect because overhead slows things down. The correct answer is B because during a context switch, the system does no useful work","","Incorrect because it does not clear caches permanently; it saves and restores state. The correct answer is B because the system does no useful work while performing the switch","Incorrect because context switching happens continuously in the background. The correct answer is B because the time spent switching yields no useful computation"]},
      {q:"In UNIX, which system call is used to replace a process\'s memory space with a new program?",opts:["fork()","wait()","exec()","exit()"],ans:2,hints:["Incorrect because fork() creates a new process that is a duplicate of the parent . The correct answer is C because exec() replaces the memory space with a new program","Incorrect because wait() is used by a parent waiting for a child to terminate . The correct answer is C because exec() handles loading the new program into the memory space","","Incorrect because exit() deletes the process . The correct answer is C because exec() replaces the process\'s memory space with a new program"]},
      {q:"What occurs during \"cascading termination\"?",opts:["The CPU overheats and shuts down","A single process gracefully closes its files one by one","If a process terminates, all its children, grandchildren, etc., are also terminated by the operating system","The operating system restarts entirely"],ans:2,hints:["Incorrect because this is a hardware failure. The correct answer is C because cascading termination means all descendant processes are terminated if the parent terminates","Incorrect because it describes standard file deallocation, not cascading termination. The correct answer is C because cascading termination destroys the entire tree of children","","Incorrect because it is a process management action, not a system crash. The correct answer is C because cascading termination kills all children when a parent dies"]},
      {q:"Which of the following is NOT listed as a reason for processes to cooperate?",opts:["Information sharing","Computation speedup","Context switch elimination","Modularity"],ans:2,hints:["Incorrect because information sharing via global variables is a stated reason. The correct answer is C because eliminating context switches is not listed as a reason for process cooperation","Incorrect because computation speedup (breaking tasks into sub-tasks) is a stated reason. The correct answer is C because cooperation does not eliminate context switches","","Incorrect because modularity (dividing systems into modules) is a stated reason. The correct answer is C because context switch elimination is impossible and not a reason for cooperation"]},
      {q:"In the Producer-Consumer problem, what defines an \"unbounded-buffer\"?",opts:["The producer must always wait for the consumer","The buffer has a fixed size","It places no practical limit on the size of the buffer, so the producer never waits","The consumer never waits"],ans:2,hints:["Incorrect because in an unbounded buffer, the producer never waits. The correct answer is C because unbounded means no practical limit, allowing the producer to produce continuously without waiting","Incorrect because a bounded-buffer assumes a fixed size . The correct answer is C because an unbounded-buffer places no limit on size","","Incorrect because the consumer must still wait if there is no buffer to consume . The correct answer is C because unbounded buffers place no practical limit, freeing the producer from waiting"]},
      {q:"In which Interprocess Communication (IPC) model is communication strictly under the control of user processes rather than the operating system?",opts:["Shared memory","Message passing","Sockets","Remote Procedure Calls (RPC)"],ans:0,hints:["","Incorrect because message passing is managed through the OS via send/receive facilities. The correct answer is A because shared memory communication is under the control of the user processes, not the OS","Incorrect because sockets require OS network stack intervention. The correct answer is A because shared memory is directly controlled by user processes","Incorrect because RPCs are abstracted procedure calls routed through the kernel . The correct answer is A because shared memory is exclusively user-controlled"]},
      {q:"What are the two primitive operations provided by the IPC Message Passing facility?",opts:["read() and write()","send(message) and receive(message)","fork() and exec()","wait() and abort()"],ans:1,hints:["Incorrect because these are file or pipe operations . The correct answer is B because the message passing facility explicitly provides send(message) and receive(message)","","Incorrect because these are process creation operations . The correct answer is B because message passing relies on send and receive","Incorrect because these handle process termination/waiting . The correct answer is B because send and receive are the specific message passing primitives"]},
      {q:"Under Direct Communication, what is a key property of the communication link?",opts:["A link may be associated with many processes","Processes direct messages to mailboxes","A link is associated with exactly one pair of communicating processes","The sender never explicitly names the receiver"],ans:2,hints:["Incorrect because this describes Indirect Communication . The correct answer is C because Direct Communication links are associated with exactly one pair","Incorrect because mailboxes are used in Indirect Communication . The correct answer is C because Direct Communication establishes a link for exactly one pair","","Incorrect because in Direct Communication, processes must explicitly name each other . The correct answer is C because exactly one link exists between one pair"]},
      {q:"What is another term used to refer to \"mailboxes\" in Indirect Communication?",opts:["Sockets","Ports","Threads","Pipes"],ans:1,hints:["Incorrect because asynchronous describes non-blocking operations . The correct answer is D because blocking is considered synchronous, specifically a blocking send","","Incorrect because a rendezvous only occurs if both send and receive are blocking . The correct answer is D because waiting until receipt is a synchronous, blocking send","Incorrect because pipes are a different conduit communication mechanism . The correct answer is B because mailboxes are also called ports . **21. When a sender is blocked until the message is received, this is considered: ** A) Asynchronous B) A Non-blocking send C) A rendezvous (if receive is not blocking) D) A Blocking send (synchronous) Correct Answer: D"]},
      {q:"Which buffering implementation means that no messages are queued on a link, forcing the sender to wait for the receiver?",opts:["Bounded capacity","Zero capacity","Unbounded capacity","Direct capacity"],ans:1,hints:["Incorrect because bounded capacity allows a finite length of queued messages . The correct answer is B because zero capacity means no messages are queued, causing a rendezvous","","Incorrect because unbounded capacity allows infinite queuing, so the sender never waits . The correct answer is B because zero capacity forces the sender to wait","Incorrect because \"direct capacity\" is a fabricated term. The correct answer is B because zero capacity creates a rendezvous where no messages queue"]},
      {q:"Which of the following is true about Ordinary Pipes?",opts:["They allow bidirectional communication","They can be accessed without a parent-child relationship","They are treated by UNIX as a special type of file","They are heavily used to communicate across large external networks"],ans:2,hints:["Incorrect because ordinary pipes are strictly unidirectional . The correct answer is C because UNIX treats ordinary pipes as a special type of file accessed via read() and write()","Incorrect because ordinary pipes require a parent-child relationship . The correct answer is C because UNIX treats them as files","","Incorrect because pipes are interprocess tools, while sockets are used over networks . The correct answer is C because ordinary pipes are special files in UNIX"]},
      {q:"What does the Windows operating system call \"ordinary pipes\"?",opts:["Named pipes","Sockets","Mailboxes","Anonymous pipes"],ans:3,hints:["Incorrect because named pipes are a different, more powerful bidirectional structure . The correct answer is D because Windows explicitly calls ordinary pipes \"anonymous pipes\"","Incorrect because sockets are endpoints for network communication . The correct answer is D because Windows refers to ordinary pipes as anonymous pipes","Incorrect because mailboxes refer to indirect message passing . The correct answer is D because Windows uses the term anonymous pipes",""]},
      {q:"A socket is defined as an endpoint for communication. It is formed by concatenating which two elements?",opts:["MAC address and PID","IP address and port","Hostname and memory limit","Process ID and mailbox ID"],ans:1,hints:["Incorrect because sockets do not use MAC addresses or PIDs for their logical definition. The correct answer is B because a socket is the concatenation of an IP address and a port","","Incorrect because hostnames must resolve to IP addresses, and memory limits are irrelevant to sockets. The correct answer is B because sockets combine IP addresses and ports","Incorrect because processes communicate over sockets, but the socket itself uses IP and port . The correct answer is B because it is a concatenation of an IP address and port"]},
      {q:"In socket communication, what is the special IP address 127.0.0.1 used for?",opts:["Broadcasting to all networks","Connecting to the DNS server","Loopback, to refer to the system on which the process is running","Authenticating Remote Procedure Calls"],ans:2,hints:["Incorrect because broadcasting uses different IP ranges. The correct answer is C because 127.0.0.1 is the special loopback address referring to the local system","Incorrect because DNS servers have unique IPs. The correct answer is C because 127.0.0.1 is the loopback address for the local system","","Incorrect because RPCs use matchmakers and ports, not a single universal authentication IP . The correct answer is C because 127.0.0.1 provides a loopback to the running system"]},
      {q:"In Remote Procedure Calls (RPC), what is the function of the \"client-side stub\"?",opts:["It allocates shared memory between client and server","It locates the server and marshals the parameters","It unpacks the marshaled parameters on the server side","It formats the hard drive for execution"],ans:1,hints:["Incorrect because RPCs abstract procedure calls over a network, not shared memory . The correct answer is B because the client-side stub serves as a proxy that locates the server and marshals parameters","","Incorrect because unpacking is performed by the server-side stub . The correct answer is B because the client-side stub marshals the parameters to send","Incorrect because RPCs deal with communication, not disk formatting. The correct answer is B because the stub marshals parameters for the server"]},
      {q:"How does a single process theoretically execute instructions?",opts:["By executing multiple instructions in parallel across different memory arrays","Execution must progress in a sequential fashion, with no parallel execution of instructions within a single process","By executing purely from the hard disk to avoid memory limits","By permanently residing in the CPU\'s general purpose registers"],ans:1,hints:["Incorrect because the slides explicitly state there is no parallel execution of instructions of a single process . The correct answer is B because execution progresses sequentially","","Incorrect because an active process must be loaded into memory to execute . The correct answer is B because a single process executes sequentially","Incorrect because processes reside in memory, not permanently in registers . The correct answer is B because a single process runs sequentially"]},

      {q:"Which of the following is true regarding Process Creation resource sharing?",opts:["The parent and child must always share all resources perfectly","The child always receives absolutely no resources from the parent","The parent and children can share all resources, share a subset, or share no resources at all","Children permanently steal all resources from the parent"],ans:2,hints:["Incorrect because sharing all resources is only one of the three options . The correct answer is C because the slides list three options: share all, share subset, or share none","Incorrect because sharing a subset or all resources is possible . The correct answer is C because there are three different sharing options available","","Incorrect because processes share, they do not permanently steal all resources. The correct answer is C because the OS allows flexible resource sharing options"]},
      {q:"In the tree of processes in Linux, what process sits at the very top (pid = 1)?",opts:["bash","sshd","logind","systemd"],ans:3,hints:["Incorrect because bash is lower down in the tree as a child process . The correct answer is D because the diagram explicitly shows systemd with pid = 1 at the root","Incorrect because sshd is a child of systemd . The correct answer is D because systemd is the root process with pid = 1","Incorrect because logind is a child of systemd . The correct answer is D because systemd has pid = 1",""]},
      {q:"What occurs when a parent process calls the wait() system call?",opts:["It pauses the entire operating system","It replaces its memory space with a new program","It waits for its child to terminate and receives status data from it","It creates an unbounded buffer"],ans:2,hints:["Incorrect because a user process cannot pause the OS. The correct answer is C because wait() allows the parent to wait for the child to terminate and retrieve its status data","Incorrect because exec() replaces the memory space . The correct answer is C because wait() suspends the parent until the child terminates","","Incorrect because buffers relate to IPC . The correct answer is C because wait() retrieves status data from a terminating child"]},
      {q:"If multiple users are executing the exact same program (like a web browser), how does the operating system handle it?",opts:["It creates only one process to save memory","It merges the users into a single login session","It creates several distinct processes for the one program","It throws a cascading termination error"],ans:2,hints:["Incorrect because each user\'s execution has its own distinct state and must be separate. The correct answer is C because the slides note one program can be several processes when multiple users execute it","Incorrect because user sessions remain independent. The correct answer is C because the OS spins up several processes from the one passive program","","Incorrect because cascading termination happens when a parent is deleted . The correct answer is C because one program spawns several processes"]},
      {q:"What state does a process enter if it is removed from the CPU core due to its time slice expiring?",opts:["Waiting state","Ready state","Terminated state","New state"],ans:1,hints:["Incorrect because the waiting state is for processes waiting on an event or I/O . The correct answer is B because a process whose time slice expires is put back into the ready queue","","Incorrect because the process has not finished execution . The correct answer is B because the scheduler simply puts it back in the ready queue to await another turn","Incorrect because it is already an established process. The correct answer is B because time slice expiration returns it to the ready state"]},
      {q:"How is a process\'s Address Space handled during Process Creation?",opts:["The child\'s address space is randomly generated","The child either duplicates the parent\'s address space or has a new program loaded into it","The child shares the exact same memory pointer without duplication","The child is forced to store its address space on the hard drive permanently"],ans:1,hints:["Incorrect because an address space must contain structured code. The correct answer is B because the slides state the child is a duplicate of the parent or has a new program loaded","","Incorrect because while they can share resources, the address space itself is either duplicated or entirely new . The correct answer is B because the OS either clones the parent or loads a new app via exec()","Incorrect because the address space must reside in memory to be an active process . The correct answer is B because it either duplicates the parent or loads a new program"]},
      {q:"In the diagram showing Context Switch from process to process, what happens while the operating system is saving state into PCB_0 and reloading state from PCB_1?",opts:["Process P_0 and Process P_1 execute simultaneously","Process P_0 continues executing normally","Both Process P_0 and Process P_1 are idle","Process P_1 deletes Process P_0"],ans:2,hints:["Incorrect because the CPU is occupied by the OS routine, not the processes. The correct answer is C because the diagram explicitly labels the periods during the context switch as \"idle\" for both processes","Incorrect because P_0 is interrupted and stops executing . The correct answer is C because both user processes are idle while the OS works","","Incorrect because a context switch is just a swap, not a termination. The correct answer is C because the context switch represents pure overhead where both processes are idle"]},
      {q:"Which hardware feature can significantly speed up context switching?",opts:["Multiple sets of registers provided by the processor","A larger hard disk drive","A slower memory bus","Removing the PCB"],ans:0,hints:["","Incorrect because hard disk size does not affect CPU switching speed. The correct answer is A because processors with multiple sets of registers can simply change the pointer, avoiding copying data","Incorrect because slower memory would drastically slow down the switch. The correct answer is A because multiple register sets allow the OS to just change a pointer","Incorrect because the PCB is mandatory to save process states . The correct answer is A because hardware with multiple register sets makes context switching much faster"]},

      {q:"According to the slides, what is a major motivation for using threads instead of creating new processes?",opts:["Process creation is light-weight while thread creation is heavy-weight","Process creation is heavy-weight while thread creation is light-weight","Threads bypass the need for an operating system entirely","Threads eliminate the need for CPU scheduling"],ans:1,hints:["Incorrect because the roles are reversed; the slides state process creation is heavy-weight . The correct answer is B because thread creation is explicitly described as light-weight compared to process creation","","Incorrect because threads run within an application managed by the OS, not bypassing it . The correct answer is B because the primary motivational difference in creation overhead is that threads are light-weight","Incorrect because the CPU still schedules threads/processes . The correct answer is B because the efficiency comes from thread creation being light-weight"]},
      {q:"Which of the following is an example given in the slides of a specific task within an application that could be implemented by a separate thread?",opts:["Compiling C code into assembly","Partitioning the hard drive","Spell checking","Booting the operating system"],ans:2,hints:["Incorrect because compiling is not listed as an in-app thread example. The correct answer is C because \"Spell checking\" is explicitly listed as a task that can be implemented by a separate thread within an application","Incorrect because partitioning is a disk management task . The correct answer is C because spell checking is a standard multithreaded application task","","Incorrect because booting is handled by the BIOS/UEFI, not an application thread . The correct answer is C because spell checking operates as a thread within an app"]},
      {q:"How do operating system kernels generally handle execution regarding threads?",opts:["They strictly use single-threaded processes","They rely only on user-level threads","Kernels are generally multithreaded","They disable multithreading to ensure security"],ans:2,hints:["Incorrect because modern kernels utilize multiple threads . The correct answer is C because the motivation slides explicitly state that \"Kernels are generally multithreaded\"","Incorrect because kernels manage their own kernel threads . The correct answer is C because kernels themselves are generally multithreaded","","Incorrect because multithreading is actively used by the kernel, not disabled . The correct answer is C because kernel multithreading is a standard practice"]},
      {q:"In a multithreaded server architecture, what does a web server accept from clients?",opts:["Requests for web pages, images, sound, and so forth","Raw CPU registers","Master Boot Records","BIOS initialization codes"],ans:0,hints:["","Incorrect because CPU registers are internal process components . The correct answer is A because the slides state a web server accepts client requests for web pages, images, and sound","Incorrect because the MBR is used for booting physical disks . The correct answer is A because web servers handle web page/image requests","Incorrect because BIOS is firmware . The correct answer is A because servers accept web pages, images, and sound requests"]},
      {q:"What is the main problem if a busy web server runs as a traditional single-threaded process?",opts:["It will delete the client\'s data","It would be able to service only one client at a time, causing long waits","It will automatically trigger a cascading termination","It forces the server to format its hard drive"],ans:1,hints:["Incorrect because single-threading limits speed, it doesn\'t delete data . The correct answer is B because a single-threaded server can only handle one client at a time, making others wait","","Incorrect because cascading termination relates to a parent process dying . The correct answer is B because the primary issue is the bottleneck of servicing one client at a time","Incorrect because formatting is a disk operation . The correct answer is B because single-threading causes severe waiting times for multiple clients"]},
      {q:"Before threads became popular, what was the common solution for a server to handle multiple client requests?",opts:["Create a separate process to service each new request","Shut down the server after every request","Ask the user to compile the server manually","Route all requests through the BIOS"],ans:0,hints:["","Incorrect because shutting down would halt the service . The correct answer is A because the slides note that creating a separate process for each request was in common use before threads","Incorrect because compiling is not a runtime request handling method . The correct answer is A because the historical solution was full process creation","Incorrect because the BIOS handles hardware startup, not web requests . The correct answer is A because a separate process was created for each request"]},
      {q:"Why is the older method of creating a new process for every server request considered inefficient?",opts:["Because it causes a segmentation fault","Because process creation is time consuming and resource intensive","Because it skips the ready queue entirely","Because it forces the use of IPv6"],ans:1,hints:["Incorrect because process creation is a legal OS function, not a memory fault . The correct answer is B because the slides explicitly state process creation is time consuming and resource intensive","","Incorrect because new processes still enter the ready queue . The correct answer is B because the overhead of creating a full process uses too much time and resources","Incorrect because it has nothing to do with IP protocols . The correct answer is B because creating processes takes too much time and resources"]},
      {q:"In a modern multithreaded server architecture, what does the server do when a new request is made?",opts:["It duplicates its entire address space on the hard drive","It creates another full process to handle the load","It creates a new thread to service the request and resumes listening for additional requests","It blocks all other clients until the request is completely finished"],ans:2,hints:["Incorrect because this is closer to how a heavy process behaves, not a thread . The correct answer is C because the server creates a separate thread to handle the request while it continues to listen","Incorrect because creating a full process is the outdated, resource-intensive method . The correct answer is C because it creates a lightweight thread to service it","","Incorrect because this describes a single-threaded server\'s limitation . The correct answer is C because it creates a new thread and immediately resumes listening"]},
      {q:"Which benefit of multithreading allows an interactive application to continue running even if part of it is blocked or performing a lengthy operation?",opts:["Resource Sharing","Economy","Scalability","Responsiveness"],ans:3,hints:["Incorrect because Resource Sharing refers to sharing memory and data . The correct answer is D because Responsiveness is defined as allowing a program to continue running when part of it is blocked","Incorrect because Economy refers to the lower overhead of creation and context switching . The correct answer is D because it specifically addresses interactive responsiveness","Incorrect because Scalability refers to running on multiple processing cores . The correct answer is D because Responsiveness keeps the app interactive during lengthy operations",""]},
      {q:"How do threads inherently handle resource sharing within an application?",opts:["They must use explicit message passing configured by the programmer","They share the memory and the resources of the process to which they belong by default","They require the OS to create shared memory mailboxes","They are strictly isolated and share absolutely nothing"],ans:1,hints:["Incorrect because explicit message passing is required for separate processes, not threads . The correct answer is B because threads share memory and resources of their process by default","","Incorrect because mailboxes are for Inter-Process Communication (IPC) . The correct answer is B because threads natively share the process\'s resources","Incorrect because threads natively share memory . The correct answer is B because threads within the same process share its resources by default"]},
      {q:"Which two techniques must be explicitly arranged by a programmer for separate processes to share resources?",opts:["Shared memory and message passing","Threading and scheduling","Formatting and partitioning","Paging and swapping"],ans:0,hints:["","Incorrect because these are CPU execution concepts, not IPC resource sharing . The correct answer is A because processes can only share resources through techniques like shared memory and message passing","Incorrect because these are disk management operations . The correct answer is A because shared memory and message passing are the required IPC methods for processes","Incorrect because these are memory management functions . The correct answer is A because processes require explicit shared memory or message passing"]},
      {q:"Why does the \"Economy\" benefit state that multithreading is cheaper than multi-processing?",opts:["Because thread switching has a lower overhead than context switching between processes","Because threads do not require any RAM to run","Because threads bypass the CPU entirely","Because the compiler automatically deletes redundant threads"],ans:0,hints:["","Incorrect because threads still reside in memory . The correct answer is A because thread creation is cheaper and thread switching has a lower overhead than full process context switching","Incorrect because threads are execution paths run by the CPU cores . The correct answer is A because the overhead for switching threads is much lower than context switching","Incorrect because this is not a feature of economy; economy relates to OS overhead . The correct answer is A because thread switching has lower overhead"]},

      {q:"What is a strict limitation of a single-threaded process regarding modern processors?",opts:["It cannot be executed by the CPU","It can run on only one processor, regardless of how many are available","It constantly creates deadlocks","It must be stored in the BIOS"],ans:1,hints:["Incorrect because a single-threaded process is a normal program and will be executed . The correct answer is B because a single-threaded process can only utilize one core, wasting any other available cores","","Incorrect because deadlocks require multiple processes competing for resources . The correct answer is B because it can only run on a single processor","Incorrect because processes run in RAM . The correct answer is B because single-threaded processes cannot scale across multiple cores"]},

      {q:"What is the specific definition of \"Parallelism\" according to the slides?",opts:["When a system supports more than one task making progress by quickly switching between them","When a system can perform more than one task simultaneously","When data is stored sequentially on a disk","When multiple users log into a system at different times"],ans:1,hints:["Incorrect because this is the definition of Concurrency . The correct answer is B because Parallelism implies performing more than one task at the exact same time (simultaneously)","","Incorrect because this relates to disk tracks and sectors . The correct answer is B because Parallelism performs tasks simultaneously","Incorrect because this is just general multiuser access . The correct answer is B because Parallelism means simultaneous execution"]},

      {q:"According to the Amdahl\'s Law example in the slides, if an application is 75% parallel and 25% serial, what is the calculated speedup when using 2 processing cores?",opts:["1.6 times","2.28 times","4.0 times","0.5 times"],ans:0,hints:["","Incorrect because 2.28 times is the speedup for 4 cores . The correct answer is A because the slides calculate the 2-core speedup as 1.6 times","Incorrect because 4.0 would imply perfect 100% parallelism on 4 cores . The correct answer is A because the formula yields exactly 1.6","Incorrect because speedup is generally greater than 1 . The correct answer is A because the slides explicitly state 1.6 times for 2 cores"]},

      {q:"Who or what performs the management of \"User Threads\"?",opts:["The CPU hardware exclusively","The BIOS firmware","The user-level threads library","The operating system\'s kernel"],ans:2,hints:["Incorrect because hardware executes instructions, but the library manages the threads . The correct answer is C because management is done by the user-level threads library","Incorrect because BIOS manages boot procedures . The correct answer is C because user threads are managed by the user-level threads library","","Incorrect because the kernel manages \"Kernel Threads,\" not user threads . The correct answer is C because user threads are managed in user space by the library"]},
      {q:"Which of the following is listed as one of the three primary thread libraries for User Threads?",opts:["Linux Native Threads","POSIX Pthreads","Android Threads","BIOS Threads"],ans:1,hints:["Incorrect because Linux is listed under Kernel threads . The correct answer is B because POSIX Pthreads is listed as one of the three primary user thread libraries","","Incorrect because Android is an OS that supports kernel threads . The correct answer is B because POSIX Pthreads is a primary user thread library","Incorrect because BIOS does not provide an application thread library . The correct answer is B because POSIX Pthreads, Windows threads, and Java threads are the primary libraries"]},

      {q:"In the Many-to-One multithreading model, what happens if one user thread makes a blocking system call?",opts:["Only that specific thread blocks, the others continue","The kernel automatically spawns a new thread to take its place","One thread blocking causes all threads to block","The process terminates immediately"],ans:2,hints:["Incorrect because this is an advantage of the One-to-One model, not Many-to-One . The correct answer is C because in Many-to-One, all user threads map to a single kernel thread, so a block stops everything","Incorrect because the kernel is unaware of the other user threads in this model . The correct answer is C because a single kernel thread blockage halts all mapped user threads","","Incorrect because blocking is a normal state, not a termination event . The correct answer is C because one thread blocking causes all to block"]},

      {q:"In the One-to-One multithreading model, what occurs when a user-level thread is created?",opts:["It connects to an existing generic thread pool","It creates a corresponding kernel thread","It deletes the parent process","It causes all other threads to block"],ans:1,hints:["Incorrect because the One-to-One model maps each user thread to its own kernel thread . The correct answer is B because creating a user-level thread explicitly creates a kernel thread","","Incorrect because thread creation is a normal addition to a process, not a destructive one . The correct answer is B because it maps 1:1, creating a kernel thread","Incorrect because blocking all threads is a flaw of the Many-to-One model . The correct answer is B because each gets its own kernel thread"]},

      {q:"What is a common restriction found in systems using the One-to-One model?",opts:["The number of threads per process is sometimes restricted due to overhead","They can only run on single-core processors","They cannot be used with Java","They force the entire OS to run in 16-bit mode"],ans:0,hints:["","Incorrect because they benefit greatly from multicore processors . The correct answer is A because creating a kernel thread for each user thread has overhead, restricting max thread counts","Incorrect because Java can run on Windows/Linux which use One-to-One . The correct answer is A because the high overhead sometimes forces restrictions on thread numbers","Incorrect because 16-bit mode relates to legacy BIOS . The correct answer is A because of the overhead of creating many kernel threads"]},

      {q:"How does the Many-to-Many multithreading model function?",opts:["It maps exactly one user thread to one kernel thread","It allows many user level threads to be mapped to many kernel threads","It maps all kernel threads to a single user thread","It disables kernel threads entirely"],ans:1,hints:["Incorrect because this describes the One-to-One model . The correct answer is B because Many-to-Many maps many user threads to many kernel threads","","Incorrect because this is an inverted, non-existent model . The correct answer is B because Many-to-Many allows flexible mapping between multiple threads of both types","Incorrect because kernel threads are essential for the OS scheduling . The correct answer is B because it maps many user threads to many kernel threads"]},

      {q:"What is the definition of \"Burst Time\" or \"Execution Time\"?",opts:["The time it takes a process to enter the ready state","The time required by the process to complete execution","The exact time a process exits the system","The time spent waiting for user input"],ans:1,hints:["Incorrect because this describes Arrival Time. The correct answer is B because Burst Time is defined as the time required by the process to complete execution","","Incorrect because this describes Finish/Completion Time. The correct answer is B because Burst Time (or running time) is the duration of execution","Incorrect because waiting for input is part of the I/O burst, not the total execution burst time concept. The correct answer is B because burst time is the required execution time"]},
      {q:"How does the course characterize the cycle of process execution?",opts:["It strictly uses only the CPU without interruptions","It alternates between RAM swapping and ROM flashing","It alternates between CPU activity and I/O activity","It relies entirely on continuous I/O waits"],ans:2,hints:["Incorrect because processes also require I/O. The correct answer is C because process execution consists of a cycle of CPU execution and I/O wait","Incorrect because RAM/ROM swapping is a memory management concept. The correct answer is C because execution alternates between CPU bursts and I/O bursts","","Incorrect because a process must use the CPU to execute. The correct answer is C because it cycles between CPU activity and I/O wait"]},
      {q:"In a typical CPU-I/O burst cycle, which times are usually shorter?",opts:["CPU times are usually shorter than the time of I/O","I/O times are usually shorter than CPU times","CPU and I/O times are exactly equal","Dispatch latency times are the longest"],ans:0,hints:["","Incorrect because the slides state the opposite. The correct answer is A because CPU times are explicitly noted as usually being shorter than the time of I/O","Incorrect because they are generally unequal. The correct answer is A because CPU times are generally shorter than I/O times","Incorrect because dispatch latency is pure overhead, not a process burst. The correct answer is A because CPU times are shorter than I/O times"]},
      {q:"What is the primary function of the CPU Scheduler?",opts:["To safely terminate malicious processes","To select from among the processes in the ready queue and allocate a CPU core to one of them","To manage the virtual memory page tables","To format the disk for faster I/O"],ans:1,hints:["Incorrect because termination is handled by process management/security. The correct answer is B because the CPU scheduler selects processes from the ready queue to allocate to the CPU core","","Incorrect because this is the job of the Memory Management Unit. The correct answer is B because the scheduler manages CPU core allocation","Incorrect because formatting is a disk operation. The correct answer is B because the scheduler picks processes from the ready queue for execution"]},
      {q:"Which of the following is a circumstance where a CPU scheduling decision takes place and the OS has no choice but to select a new process?",opts:["When a process switches from running to ready state","When a process switches from waiting to ready state","When a process terminates","When a user moves their mouse"],ans:2,hints:["Incorrect because the OS has a choice (preemptive) in this situation. The correct answer is C because when a process terminates (Situation 4), the OS has no choice but to select a new process","Incorrect because the OS has a choice to continue the current process or switch. The correct answer is C because termination strictly requires selecting a new process","","Incorrect because hardware interrupts don\'t force a permanent new process selection. The correct answer is C because termination forces a mandatory new scheduling choice"]},
      {q:"If scheduling takes place only when a process switches from running to waiting, or when it terminates, what type of scheduling is this?",opts:["Preemptive","Nonpreemptive","Round Robin","Priority"],ans:1,hints:["Incorrect because preemptive allows interrupting a running process. The correct answer is B because scheduling only on voluntary yields or termination is defined as Nonpreemptive scheduling","","Incorrect because Round Robin is preemptive (uses time slices). The correct answer is B because Nonpreemptive scheduling relies on the process releasing the CPU itself","Incorrect because Priority can be preemptive or nonpreemptive. The correct answer is B because these exact conditions define Nonpreemptive scheduling"]},
      {q:"Virtually all modern operating systems (Windows, MacOS, Linux) use which type of scheduling?",opts:["Nonpreemptive scheduling","First-Come, First-Served exclusively","Preemptive scheduling","Manual scheduling"],ans:2,hints:["Incorrect because nonpreemptive would cause systems to freeze if a process loops. The correct answer is C because modern OSs use preemptive scheduling algorithms","Incorrect because FCFS is highly inefficient for modern multitasking. The correct answer is C because modern systems rely on preemptive scheduling","","Incorrect because the OS handles it automatically. The correct answer is C because Windows, MacOS, and Linux use preemptive scheduling"]},
      {q:"What specific issue can Preemptive scheduling cause when data is shared among several processes?",opts:["The Convoy Effect","Race Conditions","Hard Drive Fragmentation","CPU Overheating"],ans:1,hints:["Incorrect because the Convoy Effect is caused by FCFS, not preemption. The correct answer is B because preempting a process while it is updating shared data leads to inconsistent states known as race conditions","","Incorrect because fragmentation is a memory/disk issue. The correct answer is B because preemptive scheduling can cause race conditions","Incorrect because this is a hardware issue. The correct answer is B because shared data interrupted by preemption causes race conditions"]},
      {q:"What is \"Dispatch Latency\"?",opts:["The time a process waits for I/O completion","The time it takes for the dispatcher to stop one process and start another running","The time it takes to boot the operating system","The time required to compile the source code"],ans:1,hints:["Incorrect because this is the I/O burst/wait time. The correct answer is B because dispatch latency is explicitly defined as the time to stop one process and start another","","Incorrect because booting is handled by BIOS/Bootloaders. The correct answer is B because it is the context switch overhead time of the dispatcher","Incorrect because compilers handle source code. The correct answer is B because dispatch latency is the time taken to switch processes"]},
      {q:"Which of the following is an action performed by the Dispatcher module?",opts:["Formatting the hard disk","Switching to user mode","Creating virtual memory pages","Assigning IP addresses"],ans:1,hints:["Incorrect because formatting is a file system task. The correct answer is B because the dispatcher switches context, switches to user mode, and jumps to the proper location in the program","","Incorrect because the MMU handles paging. The correct answer is B because switching to user mode is a core dispatcher function","Incorrect because network interfaces assign IPs. The correct answer is B because the dispatcher handles the mechanics of handing over the CPU"]},
      {q:"Which CPU scheduling criteria should the operating system seek to Maximize?",opts:["Waiting time and Response time","Turnaround time and Dispatch latency","CPU Utilization and Throughput","Convoy effect and Aging"],ans:2,hints:["Incorrect because these represent delays and should be minimized. The correct answer is C because the OS wants to maximize CPU Utilization and Throughput","Incorrect because Turnaround time and latency should be minimized. The correct answer is C because Utilization and Throughput measure efficiency and should be maximized","","Incorrect because the Convoy effect is a negative outcome. The correct answer is C because Maximize criteria are CPU Utilization and Throughput"]},
      {q:"How is \"Throughput\" defined in the scheduling criteria?",opts:["The total time a process spends waiting in the ready queue","The number of processes that finish their execution per unit time","The time it takes to format a dynamic disk","The percentage of time the CPU is busy"],ans:1,hints:["Incorrect because this defines Waiting Time. The correct answer is B because throughput is the number of processes completed per unit of time","","Incorrect because this is a disk management metric. The correct answer is B because throughput measures completed work over time","Incorrect because this defines CPU Utilization. The correct answer is B because throughput counts completed processes per unit time"]},
      {q:"According to the formula in the slides, how do you calculate Waiting Time?",opts:["Turn Around Time – Burst Time","Completion Time – Arrival Time","First Time Process Gets CPU − Arrival Time","Burst Time + Response Time"],ans:0,hints:["","Incorrect because this is the formula for Turn Around Time. The correct answer is A because Waiting Time = Turn Around Time – Burst Time","Incorrect because this is the formula for Response Time. The correct answer is A because Waiting Time = Turn Around Time – Burst Time","Incorrect because this is a fabricated formula. The correct answer is A because Waiting Time is the Turn Around Time minus the actual Execution (Burst) Time"]},
      {q:"What is Turnaround Time?",opts:["The amount of time from when a request was submitted until the first response is produced","The time spent moving a process from RAM to the hard drive","The period between the time of process submission to the completion time","The time taken by the dispatcher to switch context"],ans:2,hints:["Incorrect because this describes Response Time. The correct answer is C because Turnaround Time is the total time to execute a specific process from submission to completion","Incorrect because this is swap time. The correct answer is C because Turnaround time covers the whole span from submission to completion","","Incorrect because this is dispatch latency. The correct answer is C because Turnaround time is the time between submission and completion"]},
      {q:"In First-Come, First-Served (FCFS) scheduling, how does the OS decide which process to execute?",opts:["It executes the process with the shortest burst time first","It executes processes in the exact order they arrive","It gives every process a small time slice in a circle","It asks the user to manually select the priority"],ans:1,hints:["Incorrect because this describes Shortest-Job-First (SJF). The correct answer is B because FCFS simply executes processes in the order they arrive","","Incorrect because this describes Round Robin (RR). The correct answer is B because FCFS acts as a strict queue based on arrival","Incorrect because FCFS requires no manual priority. The correct answer is B because FCFS processes in arrival order"]},
      {q:"In the FCFS example where P1(24), P2(3), and P3(3) arrive at time 0, what is the waiting time for P2?",opts:["0","3","24","27"],ans:2,hints:["Incorrect because P1 arrives first and takes 24 units. The correct answer is C because P2 must wait for P1 to finish, making its waiting time 24","Incorrect because 3 is P2\'s burst time. The correct answer is C because it waits 24 units for P1","","Incorrect because 27 is the waiting time for P3. The correct answer is C because P2 waits 24 units"]},
      {q:"What is the \"Convoy Effect\" in FCFS scheduling?",opts:["When processes share resources efficiently","When a short process is stuck waiting behind a long process","When the OS groups processes together by priority","When multiple processes terminate simultaneously"],ans:1,hints:["Incorrect because the Convoy Effect is a negative inefficiency. The correct answer is B because it happens when a CPU-bound long process holds up many short I/O-bound processes","","Incorrect because FCFS does not use priority. The correct answer is B because the convoy effect describes short processes stuck behind a long one","Incorrect because termination is unrelated. The correct answer is B because short processes wait behind long ones"]},
      {q:"Which scheduling algorithm is considered \"optimal\" because it gives the minimum average waiting time for a given set of processes?",opts:["FCFS (First-Come, First-Served)","RR (Round Robin)","SJF (Shortest-Job-First)","Non-preemptive Priority"],ans:2,hints:["Incorrect because FCFS often has high waiting times (Convoy Effect). The correct answer is C because SJF schedules the shortest jobs first, mathematically minimizing average wait time","Incorrect because RR focuses on response time, not minimizing average wait time. The correct answer is C because SJF is optimal for minimum average waiting time","","Incorrect because priority doesn\'t inherently minimize wait time. The correct answer is C because SJF specifically minimizes waiting times"]},
      {q:"What is the preemptive version of the Shortest-Job-First (SJF) algorithm called?",opts:["Preemptive Priority","Shortest-Remaining-Time-First (SRTF)","Round Robin with Time Quantum","Exponential Averaging"],ans:1,hints:["Incorrect because SJF is a specific type of priority, but its preemptive name is different. The correct answer is B because the preemptive version of SJF is explicitly called Shortest-Remaining-Time-First","","Incorrect because RR uses time slices, not shortest burst predictions. The correct answer is B because SRTF evaluates the remaining time to preempt","Incorrect because Exponential Averaging is a prediction formula, not the algorithm name. The correct answer is B because it is called Shortest-Remaining-Time-First"]},
      {q:"What is the main fundamental challenge with the Shortest-Job-First (SJF) scheduling algorithm?",opts:["The OS cannot handle time quantums","The length of the next CPU burst is generally unknown","It causes the CPU to overheat","It limits the hard drive to 2TB"],ans:1,hints:["Incorrect because SJF doesn\'t use time quantums (RR does). The correct answer is B because the exact length of a program\'s next CPU burst is unknown since programs are dynamic","","Incorrect because software algorithms do not directly overheat CPUs. The correct answer is B because knowing the future burst time is impossible","Incorrect because this is an MBR partition limit. The correct answer is B because the burst time is unknown"]},
      {q:"How does the Operating System resolve the challenge of not knowing the next CPU burst length in SJF?",opts:["It forces the user to input the time manually before every task","It uses Exponential Averaging to predict the future burst based on past behavior","It simply formats the disk to clear the queue","It switches the CPU to 16-bit mode"],ans:1,hints:["Incorrect because this is impractical for modern computing. The correct answer is B because the OS uses Exponential Averaging to predict the next burst length","","Incorrect because formatting destroys data. The correct answer is B because Exponential Averaging predicts future bursts","Incorrect because bit-mode relates to BIOS/UEFI. The correct answer is B because it uses exponential averaging predictions"]},
      {q:"In the Exponential Averaging formula τ n+1 ​ =αt n ​ +(1−α)τ n ​ , what does t n ​ represent?",opts:["The predicted value for the next CPU burst","The time quantum allocated to the process","The actual length of the n th CPU burst","The total turnaround time"],ans:2,hints:["Incorrect because the predicted value is represented by τ n+1 ​ . The correct answer is C because t n ​ represents the actual length of the past CPU burst","Incorrect because time quantums belong to Round Robin. The correct answer is C because t n ​ is the actual length of the n th CPU burst","","Incorrect because turnaround time is a performance metric. The correct answer is C because t n ​ is the actual burst length"]},

      {q:"In Round Robin (RR) scheduling, what happens after a process\'s \"time quantum\" elapses?",opts:["The process is terminated immediately","The process is given maximum priority","The process is preempted and added to the end of the ready queue","The CPU shuts down to cool off"],ans:2,hints:["Incorrect because terminating an unfinished process causes data loss. The correct answer is C because RR simply preempts the process and places it at the back of the queue to wait for its next turn","Incorrect because RR treats all processes equally without priority. The correct answer is C because it is preempted and added to the ready queue","","Incorrect because the CPU immediately moves to the next process. The correct answer is C because the process is placed at the end of the ready queue"]},
      {q:"In Round Robin, if there are n processes in the ready queue and the time quantum is q , what is the maximum time any process waits until its next turn?",opts:["n×q time units","(n−1)q time units","q/n time units","1/q time units"],ans:1,hints:["Incorrect because the process itself is executing for one of those q units. The correct answer is B because it waits for the other n−1 processes to take their q time slice","","Incorrect because this is a division, not the total wait. The correct answer is B because no process waits more than (n−1)q time units","Incorrect because this is mathematically unrelated to the queue length. The correct answer is B because it waits (n−1)q units"]},
      {q:"In Round Robin scheduling, what is the result if the time quantum ( q ) is extremely large?",opts:["The scheduling algorithm behaves exactly like FCFS","Context switch overhead becomes too high","The CPU overheats from processing too fast","Every process finishes in exactly 1 millisecond"],ans:0,hints:["","Incorrect because context switch overhead is high when q is extremely small. The correct answer is A because a large q allows processes to finish their entire burst, mimicking FCFS","Incorrect because software algorithms don\'t directly control hardware thermals this way. The correct answer is A because large quantums mimic FCFS","Incorrect because process bursts vary in length. The correct answer is A because an infinite quantum makes RR act like First-Come, First-Served"]},
      {q:"In Priority Scheduling, how is priority typically designated mathematically?",opts:["The largest integer represents the highest priority","The smallest integer represents the highest priority","Negative integers are reserved for the operating system","Priority is measured in bytes"],ans:1,hints:["Incorrect because the slides specify the opposite. The correct answer is B because the smallest integer ≡ highest priority","","Incorrect because this convention is not mentioned. The correct answer is B because smallest integer equals highest priority","Incorrect because priority is a relative number, not a memory size. The correct answer is B because the smallest integer indicates the highest priority"]},
      {q:"Which algorithm can be viewed as a specific type of priority scheduling where the priority is the inverse of the predicted next CPU burst time?",opts:["FCFS (First-Come, First-Served)","RR (Round Robin)","SJF (Shortest-Job-First)","UEFI Booting"],ans:2,hints:["Incorrect because FCFS ignores burst times. The correct answer is C because SJF prioritizes based on the shortest predicted burst time","Incorrect because RR treats everyone equally using time slices. The correct answer is C because SJF acts as a priority scheduler based on burst time","","Incorrect because UEFI is firmware, not a CPU scheduler. The correct answer is C because SJF uses the inverse of burst time as its priority"]},
      {q:"What is the major problem associated with Priority Scheduling?",opts:["Starvation – low priority processes may never execute","The Convoy Effect – short processes get stuck behind long ones","High context switch overhead","Race Conditions"],ans:0,hints:["","Incorrect because the Convoy Effect is associated with FCFS. The correct answer is A because high priority processes can continuously preempt, starving low priority processes","Incorrect because high overhead is associated with small quantums in RR. The correct answer is A because starvation is the primary flaw of priority scheduling","Incorrect because race conditions are a concurrency issue. The correct answer is A because low priority processes may suffer from starvation"]},
      {q:"What is the standard solution to resolve the problem of \"Starvation\" in Priority Scheduling?",opts:["Formatting the Ready Queue","Aging – as time progresses, increase the priority of the waiting process","Forcing the CPU to use Round Robin exclusively","Creating an unbounded buffer"],ans:1,hints:["Incorrect because formatting destroys data. The correct answer is B because Aging gradually increases a process\'s priority, ensuring it eventually executes","","Incorrect because this abandons Priority Scheduling entirely. The correct answer is B because Aging is the explicit solution to starvation","Incorrect because buffers are for Inter-Process Communication. The correct answer is B because Aging increases priority over time"]},
      {q:"How is \"Response Time\" calculated according to the CPU Scheduling Criteria?",opts:["Turn Around Time – Burst Time","Completion Time – Arrival Time","First Time Process Gets CPU − Arrival Time","Wait Time + Burst Time"],ans:2,hints:["Incorrect because this calculates Waiting Time. The correct answer is C because Response Time measures the time from arrival until the process first gets the CPU","Incorrect because this calculates Turn Around Time. The correct answer is C because Response Time is First Time Process Gets CPU − Arrival Time","","Incorrect because this is another way to calculate Turn Around Time. The correct answer is C because Response Time is the time to first CPU allocation"]},
      {q:"Based on the Non-preemptive Priority Scheduling example slide (P1=10/pri3, P2=1/pri1, P3=2/pri4, P4=1/pri5, P5=5/pri2), which process executes immediately after P2?",opts:["P1","P3","P4","P5"],ans:3,hints:["Incorrect because P1 has a priority of 3, which is lower than P5\'s priority of 2. The correct answer is D because P5 has the next highest priority (2) after P2 (1)","Incorrect because P3 has a low priority of 4. The correct answer is D because P5 has priority 2","Incorrect because P4 has the lowest priority of 5. The correct answer is D because P5 executes after P2 due to its priority of 2",""]},
      {q:"What causes a process to be preempted in Round Robin (RR) scheduling if it hasn\'t finished its task?",opts:["A higher priority process arrives","The user closes the application","A timer interrupts every quantum to schedule the next process","The CPU overheats"],ans:2,hints:["Incorrect because RR doesn\'t use priorities, it uses time slices. The correct answer is C because a timer interrupts every quantum to preempt the process","Incorrect because this is a manual termination, not an algorithm preemption. The correct answer is C because a timer enforces the time quantum","","Incorrect because hardware thermals do not dictate RR scheduling. The correct answer is C because a timer triggers the quantum interrupt"]},
      {q:"In the SJF example from the slides, if P1(6), P2(8), P3(7), P4(3) all arrive at time 0, what is the order of execution?",opts:["P1 -> P2 -> P3 -> P4","P4 -> P1 -> P3 -> P2","P2 -> P3 -> P1 -> P4","P4 -> P3 -> P2 -> P1"],ans:1,hints:["Incorrect because this is FCFS order. The correct answer is B because SJF executes the shortest bursts first: 3, 6, 7, 8 (P4, P1, P3, P2)","","Incorrect because this executes the longest jobs first. The correct answer is B because it sorts by shortest burst","Incorrect because P3 (7) is longer than P1 (6). The correct answer is B because it executes in ascending order of burst length"]},
      {q:"In Preemptive Priority Scheduling, what triggers a context switch before a process\'s burst is finished?",opts:["When a process with a higher priority (smaller integer) arrives in the ready queue","When the time quantum expires","When the process is 50% complete","When the system is converted to a Basic Disk"],ans:0,hints:["","Incorrect because time quantums belong to Round Robin. The correct answer is A because preemptive priority interrupts the current process if a higher priority process arrives","Incorrect because scheduling isn\'t based on percentage of completion. The correct answer is A because the arrival of a higher priority process triggers the preemption","Incorrect because disk management has nothing to do with CPU scheduling. The correct answer is A because higher priority arrivals cause preemption"]},
      {q:"If a scheduling algorithm\'s goal is to keep the CPU as busy as possible (ranging from 0 to 100 percent), which criteria is it maximizing?",opts:["Throughput","CPU utilization","Turnaround Time","Waiting Time"],ans:1,hints:["Incorrect because Throughput measures processes completed per unit time. The correct answer is B because CPU utilization directly measures how busy the CPU is","","Incorrect because Turnaround time should be minimized. The correct answer is B because CPU utilization measures the busyness percentage","Incorrect because Waiting Time should be minimized. The correct answer is B because CPU utilization is the metric for keeping the CPU busy"]},
      {q:"Which state transition involves the Dispatcher module giving control of the CPU to a process?",opts:["New to Ready","Ready to Running","Running to Terminated","Waiting to Ready"],ans:1,hints:["Incorrect because New to Ready is simply admitting the process to the queue. The correct answer is B because the dispatcher physically moves the process from Ready to Running by switching context and jumping to the user code","","Incorrect because Terminated means the process is deleted. The correct answer is B because the dispatcher hands over the CPU to run the process","Incorrect because this just moves it back to the queue. The correct answer is B because the dispatcher initiates execution (Ready to Running)"]},
      {q:"In the Preemptive Shortest-Remaining-Time-First (SRTF) example, why does P1 (arriving at time 0, burst 8) get preempted at time 1?",opts:["Because its time quantum expired","Because P2 arrived at time 1 with a burst of 4, which is shorter than P1\'s remaining 7","Because P1 requested an I/O operation","Because P1 experienced a segmentation fault"],ans:1,hints:["Incorrect because SRTF does not use time quantums. The correct answer is B because P2 arrives with a shorter remaining time (4) compared to P1\'s remaining time (7), causing a preemption","","Incorrect because the example assumes purely CPU-bound bursts. The correct answer is B because P2\'s burst is shorter than P1\'s remaining time","Incorrect because the process executes normally. The correct answer is B because SRTF evaluates remaining time upon new arrivals"]},
      {q:"If the dispatcher latency is high, how does this affect Round Robin scheduling with a very small time quantum?",opts:["It increases throughput significantly","It makes the scheduling completely optimal","The overhead becomes too high, severely degrading performance","It converts the algorithm to SJF"],ans:2,hints:["Incorrect because high latency slows things down. The correct answer is C because frequent switching (small quantum) combined with high latency means the CPU spends most of its time switching rather than executing","Incorrect because high overhead is the opposite of optimal. The correct answer is C because the system spends too much time doing \"pure overhead\" context switches","","Incorrect because latency doesn\'t change the algorithm type. The correct answer is C because high overhead ruins RR performance with small quantums"]},
      {q:"What is a key difference between internal and external priorities in Priority Scheduling?",opts:["Internal priorities are based on user payment, external are based on burst time","Internal priorities use predicted burst times (like SJF), while external priorities use factors like user importance or memory requirements","Internal priorities operate in the BIOS, external operate in RAM","Internal priorities are for basic disks, external for dynamic disks"],ans:1,hints:["Incorrect because the definitions are swapped. The correct answer is B because internal priorities use measurable OS metrics (like predicted burst), while external use outside factors (like user importance)","","Incorrect because priority scheduling is entirely an OS RAM function. The correct answer is B because internal means algorithmically derived (like SJF)","Incorrect because priority has nothing to do with disk storage types. The correct answer is B because external priorities reflect user/system importance"]}
    ],
    tf:[
      {q:"CPU times are usually much longer than the time of I/O bursts during a process\'s execution cycle",ans:false,hint:"Incorrect. The slides explicitly state that \"CPU times are usually shorter than the time of I/O.\""},
      {q:"The CPU scheduler selects a process from the \"Wait queue\" and allocates the CPU core to it",ans:false,hint:"Incorrect. The CPU scheduler selects from among the processes in the \"Ready queue,\" not the Wait queue (which is for processes waiting for an event like I/O)"},
      {q:"Dispatch latency is defined as the time it takes for the dispatcher to stop one process and start another running",ans:true,hint:"Incorrect. The slides provide exactly this definition for dispatch latency: the time it takes to stop one process and start another running"},
      {q:"One of the primary CPU scheduling criteria is to maximize both CPU Utilization and Throughput",ans:true,hint:"Incorrect. The Scheduling Criteria slide lists CPU Utilization and Throughput under the \"Maximize\" category, as they reflect system efficiency"},
      {q:"Preemptive scheduling means that once the CPU has been allocated to a process, the process keeps the CPU until it releases it voluntarily by terminating or waiting",ans:false,hint:"Incorrect. This is the definition of Nonpreemptive scheduling. Preemptive scheduling allows the OS to interrupt a running process"},
      {q:"The \"Convoy Effect\" is a phenomenon where a short process gets stuck behind a long process, significantly increasing average waiting times in FCFS scheduling",ans:true,hint:"Incorrect. The FCFS slides define the Convoy effect exactly as a short process getting stuck behind a long process, causing poor average waiting times"},
      {q:"Shortest-Job-First (SJF) is considered an optimal scheduling algorithm because it gives the minimum average waiting time for a given set of processes",ans:true,hint:"Incorrect. The slides explicitly state that \"SJF is optimal – gives minimum average waiting time for a given set of processes.\""},
      {q:"In Round Robin scheduling, if the time quantum ( q ) is extremely small, the algorithm behaves exactly like First-Come, First-Served (FCFS)",ans:false,hint:"Incorrect. If the time quantum is large it behaves like FCFS. If it is small, it acts as standard Round Robin, and if it\'s too small, context switch overhead ruins performance"},
      {q:"Starvation is a problem in Priority Scheduling where low priority processes may be constantly preempted and never get a chance to execute",ans:true,hint:"Incorrect. The slides state \"Problem ≡ Starvation – low priority processes may never execute.\""},
      {q:"To solve the problem of starvation, the operating system uses \"Aging,\" which gradually decreases a process\'s priority the longer it waits",ans:false,hint:"Incorrect. Aging gradually increases the priority of the waiting process over time, ensuring that it eventually becomes the highest priority and executes"}
