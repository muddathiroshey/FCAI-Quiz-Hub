  {
    id:6,
    title:"Memory Management Part 1",
    mc:[
      {q:"Which of the following best describes the characteristics of cache memory in a computer\'s memory hierarchy?",opts:["Slow, cheap, and nonvolatile","Medium-speed, medium-price, and volatile","Small amount, very fast, expensive, and volatile","Large capacity, fast, and nonvolatile"],ans:2,hints:["Incorrect because this describes disk storage. The correct answer is C because the slides explicitly describe cache memory as a small amount of very fast, expensive, volatile memory","Incorrect because this describes main memory (RAM). The correct answer is C because cache is the fastest and most expensive tier","","Incorrect because cache is volatile and small. The correct answer is C because cache is small, fast, expensive, and volatile"]},
      {q:"What is the primary job of the operating system\'s memory manager?",opts:["To compile programs into executable binary files","To coordinate memory usage, allocate/deallocate memory, and manage swapping/paging","To format the nonvolatile disk storage to FAT32","To execute mathematical calculations inside the CPU\'s ALU"],ans:1,hints:["Incorrect because compilers handle source code translation. The correct answer is B because the memory manager keeps track of memory, allocates/deallocates it, and manages swapping/paging ,","","Incorrect because disk formatting is a file system task. The correct answer is B because the memory manager coordinates how memory tiers are used by processes ,","Incorrect because the ALU handles calculations. The correct answer is B because the memory manager strictly handles memory allocation and tracking ,"]},
      {q:"Memory management systems can be divided into two basic classes. What defines these two classes?",opts:["Those that use 16-bit addresses and those that use 32-bit addresses","Those that run on Windows and those that run on Linux","Those that use cache and those that use RAM","Those that move processes back and forth between main memory and disk (swapping/paging) and those that do not"],ans:3,hints:["Incorrect because bit architecture does not define the basic memory management classes. The correct answer is D because the slides divide them into systems that use swapping/paging and those that do not ,","Incorrect because OS brand doesn\'t dictate the fundamental memory management theory classes. The correct answer is D because the division is based on swapping/paging usage ,","Incorrect because all modern systems use both. The correct answer is D because the two basic classes are defined by whether they swap/page processes to disk or not ,",""]},
      {q:"What is the simplest possible memory management scheme?",opts:["Multiprogramming with fixed partitions","Monoprogramming without swapping or paging","Virtual memory with demand paging","Relocation with base and limit registers"],ans:1,hints:["Incorrect because multiprogramming is a step up in complexity. The correct answer is B because running just one program at a time (Monoprogramming without swapping or paging) is explicitly called the simplest possible scheme","","Incorrect because virtual memory is highly complex. The correct answer is B because monoprogramming simply shares memory between one program and the OS","Incorrect because hardware registers add complexity for multiprogramming. The correct answer is B because monoprogramming without swapping/paging is the simplest"]},
      {q:"In early computers (before 1980) that used monoprogramming, what kind of memory model was presented to the programmer?",opts:["A complex virtual memory abstraction","A segmented memory hierarchy","Simply physical memory, with no memory abstraction","A strict 64-bit address space"],ans:2,hints:["Incorrect because virtual memory did not exist for these early programs. The correct answer is C because early mainframes and PCs had no memory abstraction, exposing raw physical memory to the program","Incorrect because segmentation is an abstraction. The correct answer is C because programmers saw simply physical memory","","Incorrect because early computers had much smaller addresses (like 8-bit or 16-bit). The correct answer is C because every program simply saw the physical memory"]},
      {q:"What happens in a monoprogramming environment if a second program is loaded and writes a value to physical location 2000?",opts:["The OS safely moves the first program\'s data to the disk","The memory manager triggers a segmentation fault","The second program erases the first program\'s value, causing both to crash","The hardware automatically adds a base offset to protect the first program"],ans:2,hints:["Incorrect because monoprogramming without swapping does not move data to disk. The correct answer is C because the raw absolute addresses overlap, erasing data and crashing both programs","Incorrect because there is no memory protection/abstraction to trigger a fault. The correct answer is C because writing to absolute physical addresses destroys the existing data","","Incorrect because base registers are used in multiprogramming, not simple monoprogramming. The correct answer is C because it causes immediate crashing"]},
      {q:"What is the easiest way to achieve multiprogramming?",opts:["Using base and limit registers","Dividing memory up into n (possibly unequal) fixed partitions","Implementing virtual memory paging","Using the IBM 360 protection keys"],ans:1,hints:["Incorrect because base/limit registers are a hardware solution for relocation, but partitioning is the foundational method. The correct answer is B because the slides explicitly state the easiest way to achieve multiprogramming is dividing memory into fixed partitions","","Incorrect because paging is complex. The correct answer is B because fixed partitions are the simplest multiprogramming method","Incorrect because keys solve protection, not multiprogramming creation itself. The correct answer is B because dividing memory into fixed partitions is the easiest multiprogramming method"]},
      {q:"In a multiprogramming system with fixed partitions, what happens to any space in a partition that is not used by the assigned job?",opts:["It is dynamically reallocated to another partition","It is used by the OS for caching","It is wasted while that job runs","It is swapped to the disk"],ans:2,hints:["Incorrect because the partitions are fixed, so boundaries cannot change dynamically. The correct answer is C because any unused space in a fixed partition is explicitly wasted","Incorrect because the OS does not reclaim it for cache. The correct answer is C because the space is trapped inside the fixed partition and wasted","","Incorrect because swapping moves whole processes, it doesn\'t free up fragmented space in a partition. The correct answer is C because the leftover space is simply wasted"]},
      {q:"What is the main disadvantage of sorting incoming jobs into separate input queues based on partition size?",opts:["Small jobs may have to wait to get into memory even when large partitions are empty and free","Large jobs automatically overwrite the operating system","It requires complex virtual memory page tables","The OS must constantly resize the partitions"],ans:0,hints:["","Incorrect because fixed partitions prevent OS overwriting. The correct answer is A because a queue for small jobs can be full while large partitions sit completely empty","Incorrect because this is a basic scheme without paging. The correct answer is A because small jobs wait unnecessarily if they are restricted to small partition queues","Incorrect because the partitions are fixed and never resized. The correct answer is A because separate queues lead to inefficient waiting when other partitions are free"]},
      {q:"In a single input queue fixed-partition system, what is the drawback of always picking the largest job that fits a newly freed partition?",opts:["It forces the use of base and limit registers","It Discriminates against small jobs, which are often interactive and should get the best service","It causes the CPU to overheat due to calculation delays","It converts the system back into monoprogramming"],ans:1,hints:["Incorrect because job selection algorithms don\'t dictate the hardware relocation method used. The correct answer is B because prioritizing the largest fitting job discriminates against small, interactive jobs","","Incorrect because queue searching is a trivial CPU task. The correct answer is B because small jobs get starved of service","Incorrect because multiple partitions still exist. The correct answer is B because always picking large jobs gives the worst service to small jobs"]},
      {q:"What is a strategy to prevent small jobs from being skipped indefinitely in a single input queue?",opts:["Assigning them a 4-bit protection key","Using a rule where a job gets a point each time it is skipped, and cannot be skipped again after acquiring \'k\' points","Formatting the hard drive to clear the queue","Changing the system to Monoprogramming"],ans:1,hints:["Incorrect because protection keys handle memory security, not scheduling fairness. The correct answer is B because the slides detail a system where skipped jobs accumulate points up to \'k\' to ensure they eventually run","","Incorrect because formatting destroys all data. The correct answer is B because a \'k\' point rule prevents indefinite skipping","Incorrect because monoprogramming reduces efficiency drastically. The correct answer is B because the point system guarantees execution"]},
      {q:"Which historical IBM operating system used the fixed partition model set up by the operator in the morning and not changed thereafter?",opts:["Windows 95","UNIX System V","OS/MFT (Multiprogramming with a Fixed number of Tasks)","MS-DOS"],ans:2,hints:["Incorrect because Windows 95 used dynamic memory/paging. The correct answer is C because OS/MFT on large IBM mainframes used this exact fixed partition system","Incorrect because UNIX used swapping/paging. The correct answer is C because OS/MFT (Multiprogramming with a Fixed number of Tasks) used morning-configured fixed partitions","","Incorrect because DOS was essentially monoprogramming without fixed partitions. The correct answer is C because OS/MFT explicitly used this model"]},
      {q:"What two essential problems must be solved when introducing multiprogramming?",opts:["Formatting and Partitioning","Relocation and Protection","Swapping and Paging","Compiling and Interpreting"],ans:1,hints:["Incorrect because these are disk management tasks. The correct answer is B because multiprogramming introduces the Relocation and Protection problems","","Incorrect because these are advanced memory techniques, not the fundamental problems to solve. The correct answer is B because you must relocate code and protect processes from each other","Incorrect because these are programming language translations. The correct answer is B because Relocation and Protection are the two essential problems"]},
      {q:"Why does the \"Relocation Problem\" occur when a program is loaded into a partition?",opts:["Because the program is too large for the RAM","Because the linker assumes the program begins at absolute address 0, but it might be loaded at 100K or 200K","Because the CPU is running in 16-bit mode","Because the limit register is broken"],ans:1,hints:["Incorrect because size is a capacity issue, not a relocation issue. The correct answer is B because the linker outputs absolute addresses (like jump to 100), which must be adjusted to the partition\'s start address","","Incorrect because bit-mode doesn\'t cause relocation needs. The correct answer is B because linked absolute addresses must be offset by the partition start address","Incorrect because relocation is needed before base/limit registers are even considered. The correct answer is B because the linker assumes address 0"]},
      {q:"What does \"Static Relocation\" do?",opts:["It uses hardware to add a base register value on every memory cycle","It swaps the program to the disk permanently","It actually modifies the instructions (adding the partition offset) on the fly as the program is loaded into memory","It prevents malicious programs from accessing other memory"],ans:2,hints:["Incorrect because this describes dynamic relocation via Base Registers. The correct answer is C because static relocation modifies the program code during the loading phase","Incorrect because swapping is for memory limits. The correct answer is C because it modifies instructions on the fly during load","","Incorrect because static relocation explicitly does not solve the protection problem. The correct answer is C because it alters code as it is loaded"]},
      {q:"Why is Static Relocation considered an incomplete solution?",opts:["It does not solve the protection problem, as a malicious program can still construct a new instruction and jump to it","It requires the operating system to be written in Java","It uses too much of the CPU cache","It only works on MS-DOS"],ans:0,hints:["","Incorrect because OS language is irrelevant. The correct answer is A because modifying addresses on load doesn\'t stop a program from creating a malicious absolute address at runtime","Incorrect because static relocation happens once at load time, not continuously in cache. The correct answer is A because it fails to provide protection","Incorrect because it was used by IBM 360. The correct answer is A because it leaves the memory vulnerable to malicious absolute jumps"]},
      {q:"What extra information must the linker include in the binary program for static relocation to work?",opts:["A complete copy of the OS kernel","A list or bitmap telling the loader which words are addresses to be relocated and which are constants/opcodes","The password to the BIOS","The exact amount of RAM installed on the motherboard"],ans:1,hints:["Incorrect because appending the OS would be massive and unnecessary. The correct answer is B because the loader needs a bitmap to distinguish between addresses (which change) and constants (which don\'t) ,","","Incorrect because BIOS passwords are for boot security. The correct answer is B because the loader must know what to modify and what to leave alone ,","Incorrect because RAM size doesn\'t tell the loader which specific words in the code are addresses. The correct answer is B because a bitmap of addresses is required ,"]},
      {q:"How did the IBM 360 attempt to solve the protection problem?",opts:["By dividing memory into 2-KB blocks and assigning a 4-bit protection key to each block and the PSW","By using a 64-bit encryption algorithm on all data","By physically disconnecting the hard drive during execution","By relying entirely on static relocation"],ans:0,hints:["","Incorrect because encryption protects stored data, not active memory boundaries. The correct answer is A because IBM used 2-KB blocks with 4-bit protection keys","Incorrect because this is a physical impossibility for a running OS. The correct answer is A because IBM utilized 4-bit keys for 2-KB blocks","Incorrect because the slides state static relocation does not solve protection. The correct answer is A because they used 2-KB blocks with 4-bit keys"]},
      {q:"In the IBM 360 protection scheme, how many 4-bit registers were needed for a machine with a 1-MB memory?",opts:["1,024","256","512","8"],ans:2,hints:["Incorrect because 1-MB divided by 2-KB is 512, not 1024. The correct answer is C because 1-MB / 2-KB blocks = 512 registers","Incorrect because 256 is the number of bytes those registers consumed, not the number of registers. The correct answer is C because it requires exactly 512 registers","","Incorrect because 8 is far too small. The correct answer is C because 512 4-bit registers were needed"]},
      {q:"What happened in the IBM 360 if a running process attempted to access memory whose protection code differed from the PSW key?",opts:["The hardware granted access for 1 millisecond","The hardware trapped the attempt to prevent interference","The OS converted the memory to a fixed partition","The CPU rebooted automatically"],ans:1,hints:["Incorrect because granting any access defeats the purpose of protection. The correct answer is B because the 360 hardware actively trapped any unauthorized access attempt","","Incorrect because the partitions are already set; it just stops the access. The correct answer is B because the hardware trapped the attempt","Incorrect because it just traps the process, it doesn\'t reboot the entire machine. The correct answer is B because it triggers a hardware trap"]},
      {q:"In the illustration of the relocation problem (Fig 3-2), what causes the second program to crash when loaded at address 16,384?",opts:["It has the exact same memory key as the first program","It executes a JMP 28 instruction which references absolute physical memory, jumping into the middle of the first program instead of itself","It encounters a segmentation fault from the limit register","It tries to access the BIOS directly"],ans:1,hints:["Incorrect because the example states they have different keys. The correct answer is B because it jumps to absolute physical address 28, which is inside the first program","","Incorrect because this example illustrates the problem before limit registers are used. The correct answer is B because absolute addressing causes it to jump out of its own partition","Incorrect because it\'s just trying to execute its own code. The correct answer is B because the absolute jump lands in the first program\'s space"]},
      {q:"What is the fundamental hardware solution to BOTH the relocation and protection problems?",opts:["Static Relocation","The PSW (Program Status Word) Key","Base and Limit Registers","A single input queue"],ans:2,hints:["Incorrect because static relocation solves only relocation, and does so in software. The correct answer is C because Base and Limit registers elegantly solve both problems in hardware via dynamic relocation","Incorrect because the PSW key only solved protection, not relocation. The correct answer is C because Base and Limit registers solve both","","Incorrect because input queues are scheduling concepts. The correct answer is C because Base and Limit registers provide the hardware solution"]},
      {q:"What does the \"Base Register\" hold when a process is run?",opts:["The physical address where its program begins in memory","The exact length of the program","The 4-bit protection key","The user\'s password"],ans:0,hints:["","Incorrect because the length is held by the Limit Register. The correct answer is A because the base register holds the physical starting address","Incorrect because protection keys are used in the IBM 360 scheme, not the base/limit scheme. The correct answer is A because the base register holds the starting address","Incorrect because passwords are software-level security. The correct answer is A because it stores the physical address where the program begins"]},
      {q:"What does the \"Limit Register\" hold when a process is run?",opts:["The physical address where the program begins","The length of the program","The speed of the CPU","The number of active threads"],ans:1,hints:["Incorrect because the starting address is held by the Base Register. The correct answer is B because the limit register holds the length of the program to ensure access doesn\'t exceed its bounds","","Incorrect because CPU speed is a hardware metric. The correct answer is B because it holds the program\'s length","Incorrect because threads are managed by the OS in PCBs. The correct answer is B because the limit register dictates the memory boundary size"]},
      {q:"How does the CPU hardware use the base register on every memory reference?",opts:["It subtracts the base value from the limit register","It automatically adds the base value to the address generated by the process before sending it to the memory bus","It multiplies the base value by the generated address","It encrypts the base value"],ans:1,hints:["Incorrect because subtracting from the limit doesn\'t provide a physical address. The correct answer is B because the hardware dynamically adds the base to the generated address","","Incorrect because multiplication would generate wildly incorrect addresses. The correct answer is B because it simply offsets the address via addition","Incorrect because no encryption is involved. The correct answer is B because it dynamically adds the base value to the generated address"]},
      {q:"How does the Limit Register provide memory protection?",opts:["It prevents the CPU from executing instructions too quickly","The hardware checks if the offered address is equal to or greater than the value in the limit register, generating a fault if so","It requires a password to bypass","It isolates the CPU from the RAM physically"],ans:1,hints:["Incorrect because it has nothing to do with execution speed. The correct answer is B because it checks if the generated address exceeds the program\'s length, faulting if it does","","Incorrect because it\'s a hardware mathematical check, not a password system. The correct answer is B because any address >= the limit register triggers a fault","Incorrect because physical isolation is impossible for a running system. The correct answer is B because it performs a bounds check"]},
      {q:"What happens in a base/limit register system if a process generates a JMP 28 instruction, and its base register is 16,384?",opts:["The program crashes immediately","The hardware treats it as JMP 16,412","The hardware treats it as JMP 28 and causes a fault","The hardware swaps the program to the disk"],ans:1,hints:["Incorrect because the hardware translates the address dynamically, preventing a crash. The correct answer is B because 16,384 + 28 = 16,412","","Incorrect because the base is automatically added before it accesses memory. The correct answer is B because it safely translates the relative address to the physical address 16,412","Incorrect because swapping is for memory management, not standard instruction execution. The correct answer is B because the hardware performs the addition"]},
      {q:"Who is permitted to modify the base and limit registers in a protected system?",opts:["Only the operating system","Any user process","Only the BIOS","Only the compiler"],ans:0,hints:["","Incorrect because if user processes could change them, they could defeat memory protection. The correct answer is A because only the operating system is allowed to modify them","Incorrect because the BIOS runs before the OS is loaded. The correct answer is A because the OS manages context switching and register loading","Incorrect because the compiler generates code, it doesn\'t run the OS tasks. The correct answer is A because only the OS has the privileges to change them"]},
      {q:"What is a significant disadvantage of using base and limit registers for relocation?",opts:["It requires formatting the hard drive to NTFS","The need to perform an addition on every memory reference is slow due to carry-propagation time","It limits the system to monoprogramming","The comparison operation takes several minutes"],ans:1,hints:["Incorrect because memory relocation has nothing to do with disk file systems. The correct answer is B because hardware addition on every memory cycle is slow due to carry-propagation","","Incorrect because base and limit registers were invented specifically to enable multiprogramming. The correct answer is B because the addition step introduces delay","Incorrect because comparisons are actually very fast; it is the addition that is slow. The correct answer is B because carry-propagation in addition slows down memory access"]},
      {q:"Why are additions generally slower than comparisons in base/limit register hardware?",opts:["Because additions use software instead of hardware","Because additions require network access","Because additions suffer from carry-propagation time unless special circuits are used","Because comparisons skip the CPU entirely"],ans:2,hints:["Incorrect because the addition is done in hardware. The correct answer is C because the slides explicitly note that additions are slow due to carry-propagation time","Incorrect because memory management does not require network access. The correct answer is C because electrical carry-propagation causes a delay","","Incorrect because both occur in the CPU/MMU. The correct answer is C because carry-propagation inherently slows down the addition circuit"]},
      {q:"What type of relocation does modifying instructions with an offset before the program starts running represent?",opts:["Dynamic Relocation","Static Relocation","Virtual Paging","Swapping"],ans:1,hints:["Incorrect because dynamic relocation happens on-the-fly during execution using hardware. The correct answer is B because static relocation modifies the program once during the load phase","","Incorrect because paging maps virtual addresses to frames. The correct answer is B because modifying code at load time is static relocation","Incorrect because swapping moves programs to the disk. The correct answer is B because this defines static relocation"]},
      {q:"What type of relocation does adding a base register to an address during execution represent?",opts:["Static Relocation","Demand Paging","Dynamic Relocation","Fixed Partitioning"],ans:2,hints:["Incorrect because static happens during load time. The correct answer is C because base/limit registers perform \"a particularly simple version of dynamic relocation\"","Incorrect because demand paging brings in pages on fault. The correct answer is C because calculating addresses at runtime is dynamic relocation","","Incorrect because partitioning divides memory, it doesn\'t relocate addresses. The correct answer is C because hardware addition at runtime is dynamic relocation"]},
      {q:"If an instruction is \"MOV REGISTER1, 28\" where 28 is a pure number (constant) and NOT an address, what must a static relocator do?",opts:["Add the partition offset to it anyway","It must not be relocated","Delete the instruction","Throw a protection fault"],ans:1,hints:["Incorrect because adding the offset to a constant changes its mathematical value entirely. The correct answer is B because constants must not be relocated; the loader must know the difference","","Incorrect because deleting it ruins the program. The correct answer is B because only addresses are relocated, not constants","Incorrect because it\'s a legal instruction. The correct answer is B because the relocator must leave constants alone"]},
      {q:"In the fixed partition model shown in Fig 4-2, what determines which input queue a newly arrived job is placed in when using separate queues?",opts:["The job\'s priority level","The smallest partition large enough to hold it","The alphabetical order of the job name","The user\'s password length"],ans:1,hints:["Incorrect because the basic fixed partition model sorts by size, not priority. The correct answer is B because jobs are put into the queue for the smallest partition large enough to hold them","","Incorrect because alphabetical order is irrelevant to memory sizing. The correct answer is B because jobs are sorted by their memory footprint","Incorrect because passwords have nothing to do with memory management. The correct answer is B because the smallest partition that fits the job is chosen"]},
      {q:"If memory is divided into fixed partitions, and a job requiring 150K is placed into a 200K partition, what happens to the remaining 50K?",opts:["It can be used to run a 50K job simultaneously","It is wasted while that job runs","It is given back to the operating system","It is transformed into cache memory"],ans:1,hints:["Incorrect because fixed partitions can only hold one job at a time. The correct answer is B because any space in a partition not used by a job is wasted","","Incorrect because the OS cannot reclaim space inside a fixed partition while it\'s active. The correct answer is B because the leftover space is wasted","Incorrect because RAM cannot magically become CPU cache. The correct answer is B because the space remains unused and wasted"]},
      {q:"Why is a single input queue generally better than separate queues for fixed partitions?",opts:["It completely eliminates external fragmentation","It prevents small jobs from waiting when a large partition is empty and free","It allows the use of 64-bit addresses","It removes the need for the operating system entirely"],ans:1,hints:["Incorrect because fixed partitions suffer from internal waste, not external fragmentation. The correct answer is B because a single queue allows any available partition to pull a job from the queue, preventing unnecessary waiting","","Incorrect because queue structure doesn\'t change address architecture. The correct answer is B because it ensures free partitions are utilized","Incorrect because the OS manages the queue. The correct answer is B because it stops jobs from waiting on a busy queue while other partitions are empty"]},
      {q:"When a program is linked, what happens to the main program, user-written procedures, and library procedures?",opts:["They are permanently encrypted","They are combined into a single address space","They are divided into separate fixed partitions","They are deleted from the disk"],ans:1,hints:["Incorrect because linking doesn\'t encrypt code. The correct answer is B because the linker combines all these components into a single address space, producing a binary file","","Incorrect because a single program goes into one partition. The correct answer is B because the linker merges them into one logical address space","Incorrect because they are saved as a binary executable. The correct answer is B because they form a single address space"]},
      {q:"What does \"PSW\" stand for in the context of IBM 360 memory protection?",opts:["Private Sector Workspace","Program Status Word","Physical Storage Warning","Process Swapping Window"],ans:1,hints:["Incorrect because this is a fabricated term. The correct answer is B because PSW stands for Program Status Word, which contained the 4-bit protection key","","Incorrect because the PSW holds state and keys, not physical warnings. The correct answer is B because it stands for Program Status Word","Incorrect because swapping is a different concept. The correct answer is B because the IBM 360 used the Program Status Word to hold the key"]},
      {q:"How many memory hierarchy tiers are typically mentioned in the slides?",opts:["One: Just RAM","Two: Cache and Disk","Three: Cache, Main Memory (RAM), and Disk Storage","Four: Registers, L1, L2, and L3 cache"],ans:2,hints:["Incorrect because systems use multiple tiers for efficiency. The correct answer is C because the slides list a small amount of cache, hundreds of MB of RAM, and tens/hundreds of GB of disk storage","Incorrect because it ignores the crucial Main Memory tier. The correct answer is C because the hierarchy consists of cache, main memory, and disk","","Incorrect because while true in hardware architecture, the slides summarize it into Cache, Main Memory, and Disk Storage"]},
      {q:"If an application requires 400K of memory, but only an 800K fixed partition is available, and it is loaded there, what is this an example of?",opts:["Optimal memory utilization","A JMP 28 fault","Wasting memory space in a fixed partition","Static Relocation"],ans:2,hints:["Incorrect because leaving 400K unused is the opposite of optimal. The correct answer is C because in a fixed partition scheme, any space not used by the job is wasted","Incorrect because JMP 28 refers to the relocation problem example. The correct answer is C because 400K of the partition is trapped and wasted","","Incorrect because relocation is about addressing, not size mapping. The correct answer is C because the unused partition space is wasted"]}

    tf:[
      {q:"Main memory (RAM) is described as nonvolatile because it does not lose its contents when the electric power fails",ans:false,hint:"Incorrect. The slides explicitly state that main memory (RAM) is volatile, whereas disk storage is nonvolatile and does not lose its contents"},
      {q:"The memory manager\'s job is to keep track of which parts of memory are in use, allocate memory to processes, and manage swapping between main memory and disk",ans:true,hint:"Incorrect. The slides define the memory manager exactly this way: it tracks usage, allocates/deallocates, and manages swapping/paging"},
      {q:"In Monoprogramming without Swapping or Paging, it is completely safe and normal to have two running programs in memory at the same time",ans:false,hint:"Incorrect. The slides note that under these conditions, it was not possible to have two running programs at the same time because one would erase the other\'s absolute memory, crashing both"},
      {q:"In a fixed partition scheme with a single input queue, always picking the largest job that fits a newly freed partition provides the best possible service for small, interactive jobs",ans:false,hint:"Incorrect. The slides state that picking the largest job discriminates against small jobs as being unworthy, giving them the worst service rather than the best"},
      {q:"The IBM 360 solved the memory protection problem by dividing memory into 2-KB blocks and assigning a 4-bit protection key to each block",ans:true,hint:"Incorrect. The slides explicitly detail that IBM protected the 360 by dividing memory into 2-KB blocks and assigning a 4-bit protection code, trapped against a PSW key"},
      {q:"Static relocation is a perfect solution that solves both the relocation problem and the memory protection problem against malicious programs",ans:false,hint:"Incorrect. The slides explicitly state that \"Relocation during loading does not solve the protection problem. A malicious program can always construct a new instruction and jump to it\""},
      {q:"When a process is run using base and limit registers, the limit register is loaded with the physical address where its program begins in memory",ans:false,hint:"Incorrect. The base register is loaded with the physical address where the program begins. The limit register is loaded with the length of the program"},
      {q:"Using base and limit registers provides a simple version of dynamic relocation because the hardware adds the base value to the generated address on every memory reference",ans:true,hint:"Incorrect. The slides confirm that base and limit registers provide a simple version of dynamic relocation, automatically adding the base value to the address on every reference ,"},
      {q:"A major disadvantage of relocation using base and limit registers is that the comparison operation is incredibly slow",ans:false,hint:"Incorrect. The slides specifically note that \"Comparisons can be done fast, but additions are slow due to carry-propagation time\""},
      {q:"In order to perform static relocation during loading, the linker must include a list or bitmap in the binary program telling the loader which words are addresses to be relocated and which are constants",ans:true,hint:"Incorrect. The slides state that to perform static relocation, the linker must include a list or bitmap so the loader knows which words to relocate (addresses) and which not to (constants/opcodes)"}

  {
    id:7,
    title:"Memory Management Part 2",
    mc:[
      {q:"What are the two general approaches developed over the years to deal with memory overload?",opts:["Static Relocation and Base Registers","Formatting and Partitioning","Swapping and Virtual Memory","Compiling and Interpreting"],ans:2,hints:["Incorrect because these solve the relocation and protection problems. The correct answer is C because Swapping and Virtual Memory are the two general approaches to deal with insufficient memory","Incorrect because these are file system and disk management tasks. The correct answer is C because Swapping and Virtual Memory explicitly handle memory overload","","Incorrect because these translate programming code. The correct answer is C because Swapping and Virtual Memory deal with memory overload"]},
      {q:"Which memory management technique consists of bringing a process in its entirety to memory, running it for a while, and then putting it back on the disk?",opts:["Paging","Swapping","Bitmap Allocation","Compaction"],ans:1,hints:["Incorrect because paging allows a process to be only partially in memory. The correct answer is B because swapping involves moving the process in its entirety back and forth","","Incorrect because a bitmap is a way to track free space, not a technique for moving processes. The correct answer is B because swapping brings the entire process in and out","Incorrect because compaction is moving processes closer together to combine free space. The correct answer is B because swapping moves the entire process to disk"]},
      {q:"In contrast to swapping, what does \"Virtual Memory\" allow programs to do?",opts:["Run without an operating system","Run using only the CPU cache","Run even when they are only partially in main memory","Run permanently on the hard disk without RAM"],ans:2,hints:["Incorrect because virtual memory is actively managed by the OS. The correct answer is C because virtual memory allows programs to run even when only partially in main memory","Incorrect because the cache is too small for full virtual memory execution environments. The correct answer is C because virtual memory keeps only the in-use parts in RAM and the rest on disk","","Incorrect because code must be in RAM to execute. The correct answer is C because virtual memory allows partial loading in RAM"]},
      {q:"When a process is swapped back into memory, it may be placed in a different location. How are its addresses handled?",opts:["The program is re-compiled from scratch","It is permanently restricted to 16-bit mode","The OS formats the disk to clear the cache","Addresses are relocated, either by software or by hardware (e.g., base and limit registers)"],ans:3,hints:["Incorrect because compiling is done once before execution. The correct answer is D because the addresses must be relocated using hardware like base and limit registers","Incorrect because architecture mode does not solve relocation. The correct answer is D because hardware registers easily handle the relocation dynamically","Incorrect because formatting destroys data. The correct answer is D because the addresses must be relocated to match the new physical position",""]},
      {q:"What is \"Memory Compaction\"?",opts:["The process of compressing files into a ZIP archive","Moving all processes downward as far as possible to combine multiple holes into one big hole","Deleting all background processes to free up RAM","Splitting a program into small overlays"],ans:1,hints:["Incorrect because this is file data compression. The correct answer is B because memory compaction combines fragmented holes by shifting processes in RAM","","Incorrect because this is process termination. The correct answer is B because compaction involves shifting processes to create one large contiguous free space","Incorrect because overlays are a manual programming technique. The correct answer is B because compaction physically moves processes down in memory"]},
      {q:"Why is memory compaction usually NOT done?",opts:["It deletes the operating system","It causes severe hardware overheating","It requires a lot of CPU time","It violates the 4-bit protection key rule"],ans:2,hints:["Incorrect because the OS is protected in its own partition. The correct answer is C because the slides state that copying all that data in RAM requires a lot of CPU time","Incorrect because it is a software operation. The correct answer is C because compaction uses too much processing overhead","","Incorrect because protection keys do not prevent the OS from reorganizing memory. The correct answer is C because it simply takes too much time"]},
      {q:"According to the slides, roughly how long would it take to compact all of memory on a 16-GB machine that copies 8 bytes in 8 nsec?",opts:["0.001 seconds","1.5 seconds","17.179 seconds","5 minutes"],ans:2,hints:["Incorrect because copying 16-GB is much slower. The correct answer is C because the exact calculation provided in the slides is approximately 17.179 seconds","Incorrect because the math yields a larger number. The correct answer is C because the slides explicitly note it would take about 17.179 sec","","Incorrect because 5 minutes is heavily exaggerated. The correct answer is C because the stated time is 17.179 sec"]},
      {q:"If a process tries to dynamically allocate more memory (grow) but is adjacent to another process, what must the OS do?",opts:["Move the process to a larger hole or swap out another process to create space","Delete the adjacent process permanently","Overwrite the adjacent process\'s memory","Reboot the system"],ans:0,hints:["","Incorrect because deleting active processes causes systemic failures. The correct answer is A because the OS must relocate the growing process or swap others to disk to make a larger hole","Incorrect because this would crash the adjacent process due to memory corruption. The correct answer is A because the OS gracefully moves or swaps processes to accommodate growth","Incorrect because growth is a normal runtime occurrence. The correct answer is A because the process must be moved or space must be cleared"]},
      {q:"What happens if a process needs to grow, but there is no free memory and the swap area on the disk is completely full?",opts:["The CPU creates more virtual pages out of thin air","The process is granted root access","The process will have to be suspended or killed","The system automatically switches to a Linked List memory manager"],ans:2,hints:["Incorrect because pages must map to physical storage somewhere. The correct answer is C because without RAM or disk space, the OS has no choice but to suspend or kill the process","Incorrect because permissions do not create physical storage space. The correct answer is C because lacking physical and swap space results in suspension/killing","","Incorrect because the tracking method doesn\'t change the lack of actual space. The correct answer is C because the process cannot continue operating without required memory"]},
      {q:"Why is it a good idea to allocate a \"little extra memory\" when a process is swapped in?",opts:["To speed up the CPU clock","To reduce the overhead associated with moving or swapping processes if they grow later","To trick the system into running in 32-bit mode","To permanently lock the process in memory"],ans:1,hints:["Incorrect because memory allocation does not change hardware clock speeds. The correct answer is B because giving it room to grow prevents the expensive overhead of having to move it again later","","Incorrect because it has no bearing on processor architecture modes. The correct answer is B because extra space avoids future relocation overhead","Incorrect because the process can still be swapped out if idle. The correct answer is B because allocating extra room handles expected dynamic growth"]},
      {q:"When swapping a process to disk that has extra allocated memory for growth, how much memory should actually be copied to the disk?",opts:["The entire allocated partition","Only the extra room for growth","Only the memory actually in use","None of it"],ans:2,hints:["Incorrect because swapping unused space is wasteful. The correct answer is C because the slides state it is wasteful to swap the extra memory; only the memory actually in use should be swapped","Incorrect because the growth space contains no data yet. The correct answer is C because only the active, in-use memory contains data worth saving","","Incorrect because the active data must be saved to disk. The correct answer is C because only the used memory is swapped"]},
      {q:"In a process with two growing segments (Fig 3-5b), in which directions do the stack and data segments grow?",opts:["Both grow upwards","Both grow downwards","The stack grows downward from the top, and the data segment grows upward from the bottom","The stack grows upward, and the data segment grows downward"],ans:2,hints:["Incorrect because they would immediately collide if they started near each other. The correct answer is C because the stack is placed at the top growing down, and the data at the bottom growing up into the free space between them","Incorrect because they must grow into the shared empty space between them. The correct answer is C because the stack grows downward and data grows upward","","Incorrect because the slides explicitly state the stack grows downward from the top and data grows upward from the program text. The correct answer is C"]},
      {q:"What are the two general ways the operating system keeps track of dynamically assigned memory?",opts:["FAT32 and NTFS","Bitmaps and Free lists","Base registers and Limit registers","Compaction and Swapping"],ans:1,hints:["Incorrect because these are disk file systems. The correct answer is B because the two ways to track memory usage are bitmaps and free lists","","Incorrect because these provide hardware protection/relocation. The correct answer is B because bitmaps and linked lists track which memory segments are free or allocated","Incorrect because these are techniques for handling memory overload, not tracking data structures. The correct answer is B because bitmaps and free lists are the tracking methods"]},
      {q:"In a bitmap memory management system, what does a single bit in the map represent?",opts:["One byte of hard disk storage","A memory allocation unit, indicating if it is free or occupied","A single process control block","The CPU\'s read/write permission flag"],ans:1,hints:["Incorrect because the bitmap tracks RAM, not disk storage. The correct answer is B because each bit corresponds to an allocation unit (e.g., 0 for free, 1 for occupied)","","Incorrect because PCBs are process data structures. The correct answer is B because the bit tracks the availability of a specific memory allocation unit","Incorrect because permission flags are in the Page Table or PSW. The correct answer is B because the bit tracks free/occupied status of a memory unit"]},
      {q:"If the size of the memory \"allocation unit\" is chosen to be very large, what is the primary consequence?",opts:["The bitmap will be much larger and take up more memory","Memory may be wasted in the last unit if the process size is not an exact multiple of the allocation unit","The CPU will execute instructions twice as fast","External fragmentation is completely eliminated"],ans:1,hints:["Incorrect because a larger allocation unit means fewer total units, so the bitmap is actually smaller. The correct answer is B because large units cause internal waste if the process doesn\'t perfectly fill the last unit","","Incorrect because tracking methods do not increase CPU instruction speed. The correct answer is B because large units lead to wasted memory (internal fragmentation)","Incorrect because large units cause internal fragmentation waste. The correct answer is B because the last unit will likely not be completely filled"]},
      {q:"In a system where the allocation unit is as small as 4 bytes (32 bits), what fraction of the total memory does the bitmap itself occupy?",opts:["1/2","1/4","1/8","1/32"],ans:3,hints:["Incorrect because the map is heavily compressed. The correct answer is D because 1 bit represents 32 bits (4 bytes), so the bitmap takes up exactly 1/32 of memory","Incorrect because the ratio is 1 bit per 32 bits of memory. The correct answer is D because the slides specify it takes up 1/32 of memory","Incorrect because this would be true for an 8-bit allocation unit. The correct answer is D because 32 bits of memory require 1 map bit, making it 1/32",""]},
      {q:"What is the main problem or argument against using bitmaps for memory management?",opts:["They cannot track more than 1 MB of RAM","Searching a bitmap for a run of \'k\' consecutive 0 bits to find a hole is a slow operation","They require a constant internet connection to update","They force the operating system to use monoprogramming"],ans:1,hints:["Incorrect because bitmaps can scale to any RAM size. The correct answer is B because the memory manager has to slowly scan the bits to find a contiguous block of \'k\' zeros","","Incorrect because memory management is entirely local hardware/OS. The correct answer is B because searching for consecutive zeros is computationally slow","Incorrect because bitmaps track multiple processes for multiprogramming. The correct answer is B because the search time is the primary drawback"]},
      {q:"In a memory management linked list, what does each entry specify?",opts:["Only the process ID","The disk track, sector, and cluster","Whether it\'s a hole (H) or process (P), starting address, length, and a pointer to the next item","The Base and Limit register values in binary"],ans:2,hints:["Incorrect because it must track the physical memory boundaries. The correct answer is C because the slides list these four exact components for each entry","Incorrect because these refer to hard disk architecture. The correct answer is C because a list entry specifies H/P, start address, length, and the next pointer","","Incorrect because while related to boundaries, the list itself uses the OS\'s tracking variables. The correct answer is C because it tracks H/P, start, length, and pointer"]},
      {q:"What is a major advantage of keeping the linked list of memory segments sorted by address?",opts:["It makes the CPU run cooler","It encrypts the data automatically","When a process terminates, updating the list and merging adjacent holes is straightforward","It completely prevents race conditions"],ans:2,hints:["Incorrect because software tracking doesn\'t affect thermals directly. The correct answer is C because sorting by address allows the OS to easily check adjacent list nodes to see if they are holes that can be merged","Incorrect because sorting is an organizational tool, not cryptography. The correct answer is C because sorting by address makes merging terminating processes with adjacent holes easy","","Incorrect because race conditions are a synchronization problem. The correct answer is C because it simplifies updating the list upon termination"]},
      {q:"According to Fig 3-7, if a terminating process \'X\' is located between two holes, what happens to the linked list?",opts:["Process X is replaced by an \'H\', leaving three separate holes","Three entries are merged into one large hole, and two items are removed from the list","The system crashes because holes cannot touch each other","Process X is swapped to the disk permanently"],ans:1,hints:["Incorrect because the OS optimizes by coalescing adjacent holes. The correct answer is B because the terminating process and its two adjacent holes merge into a single list entry, making the list two items shorter","","Incorrect because holes are meant to be merged. The correct answer is B because the three contiguous free spaces merge into one large hole","Incorrect because a terminating process is deleted, not swapped. The correct answer is B because the adjacent holes are merged together"]},
      {q:"Why is it more convenient to use a doubly-linked list rather than a singly-linked list for memory management?",opts:["Because doubly-linked lists take up half the memory","Because it makes it easier to find the previous entry to check if a merge is possible when a process terminates","Because it automatically writes data to the hard disk","Because single-linked lists are not supported by Linux"],ans:1,hints:["Incorrect because doubly-linked lists actually take more memory (two pointers instead of one). The correct answer is B because having a pointer to the previous node makes checking the left neighbor for a merge operation very fast","","Incorrect because linked lists only track RAM allocation. The correct answer is B because the previous pointer aids in merging operations","Incorrect because Linux supports all data structures. The correct answer is B because it allows easy backward traversal to find previous entries"]},
      {q:"Which memory allocation algorithm scans the list from the beginning and takes the very first hole that is big enough?",opts:["Best fit","Worst fit","First fit","Next fit"],ans:2,hints:["Incorrect because Best fit scans the whole list looking for the smallest adequate hole. The correct answer is C because First fit stops at the first hole large enough to satisfy the request","Incorrect because Worst fit takes the largest available hole. The correct answer is C because First fit simply takes the first adequate one it finds","","Incorrect because Next fit starts from where it left off, not the beginning. The correct answer is C because First fit scans from the beginning"]},
      {q:"Why is the \"First fit\" algorithm considered a fast algorithm?",opts:["Because it bypasses the CPU cache","Because it searches as little as possible before making an allocation","Because it uses a 64-bit encryption key","Because it deletes the remaining hole"],ans:1,hints:["Incorrect because memory tracking utilizes the CPU cache normally. The correct answer is B because it stops searching the moment it finds a big enough hole, minimizing search time","","Incorrect because cryptography has nothing to do with allocation speed. The correct answer is B because it searches as little as possible","Incorrect because deleting the remaining free space would be disastrous. The correct answer is B because it stops searching as soon as it finds a fit"]},
      {q:"How does the \"Next fit\" algorithm differ from \"First fit\"?",opts:["It always picks the largest hole instead of the first one","It keeps track of where it left off and starts searching from there the next time","It scans the list backward from the end","It converts the linked list into a bitmap"],ans:1,hints:["Incorrect because that describes the Worst fit algorithm. The correct answer is B because Next fit remembers its last position and resumes searching from there rather than starting at the beginning","","Incorrect because it still scans forward, just from a different starting point. The correct answer is B because it remembers its last location","Incorrect because it still uses a linked list. The correct answer is B because it resumes searching from where it last left off"]},
      {q:"Which memory allocation algorithm searches the entire list to find the smallest hole that is adequate for the request?",opts:["Best fit","First fit","Next fit","Worst fit"],ans:0,hints:["","Incorrect because First fit stops at the first hole that is big enough. The correct answer is A because Best fit checks every hole to find the tightest fit","Incorrect because Next fit takes the first adequate hole from its current position. The correct answer is A because Best fit looks for the smallest hole that works","Incorrect because Worst fit looks for the largest hole. The correct answer is A because Best fit finds the smallest adequate hole"]},
      {q:"In the Fig 3-6 example, if a block of size 2 is needed, which hole will the \"First fit\" algorithm allocate?",opts:["The hole at 5 (length 3)","The hole at 18 (length 2)","The hole at 29 (length 3)","It will create a new hole at 0"],ans:0,hints:["","Incorrect because while this is a perfect fit, First fit takes the first one it encounters that is large enough. The correct answer is A because the hole at 5 is the first one encountered that can hold size 2","Incorrect because First fit stops before reaching the end of the list. The correct answer is A because the hole at 5 is the first adequate one","Incorrect because address 0 is occupied by Process P. The correct answer is A because hole 5 is the first adequate space"]},
      {q:"In the Fig 3-6 example, if a block of size 2 is needed, which hole will the \"Best fit\" algorithm allocate?",opts:["The hole at 5 (length 3)","The hole at 18 (length 2)","The hole at 29 (length 3)","It will fail and cause a crash"],ans:1,hints:["Incorrect because Best fit scans the whole list to find the tightest match. The correct answer is B because the hole at 18 has a length of 2, which is an exact (best) fit","","Incorrect because there is a better fit (length 2) earlier in the list. The correct answer is B because the hole at 18 perfectly matches the size 2 request","Incorrect because adequate holes exist. The correct answer is B because the hole at 18 is the tightest fit"]},
      {q:"What is the primary drawback of the \"Best fit\" algorithm compared to \"First fit\"?",opts:["It causes the computer to reboot frequently","It is slower because it must search the entire list every time it is called","It wastes the largest amount of memory possible","It cannot be used with a linked list"],ans:1,hints:["Incorrect because algorithms don\'t cause random reboots. The correct answer is B because scanning the entire list is a slow, O(N) operation compared to First fit\'s early exit","","Incorrect because Best fit actually tries to waste the least amount of memory in a given hole. The correct answer is B because it is slower","Incorrect because it is explicitly designed for linked lists. The correct answer is B because searching the entire list is slow"]},
      {q:"What does the \"Worst fit\" algorithm do?",opts:["It always takes the smallest available hole","It always takes the largest available hole","It intentionally places data in the OS partition","It uses a bitmap instead of a linked list"],ans:1,hints:["Incorrect because this describes Best fit. The correct answer is B because Worst fit always takes the largest available hole, aiming to leave a leftover hole big enough to be useful","","Incorrect because this would cause a protection fault. The correct answer is B because it seeks the largest hole","Incorrect because Worst fit is a linked list algorithm. The correct answer is B because it selects the largest available hole"]},
      {q:"According to simulations mentioned in the slides, how does \"Worst fit\" compare to \"First fit\" and \"Best fit\"?",opts:["Worst fit is significantly better than both","Worst fit provides the best storage utilization but is the slowest","Worst fit is not a very good idea; First and Best fit are better","They all perform exactly the same"],ans:2,hints:["Incorrect because simulations proved it is worse. The correct answer is C because the slides state simulations have shown that both first fit and best fit are better than worst fit","Incorrect because it decreases storage utilization. The correct answer is C because First and Best fit outperform Worst fit","","Incorrect because they have distinct performance differences. The correct answer is C because Worst fit is explicitly called \"not a very good idea\""]},
      {q:"Between \"First fit\" and \"Best fit\", which is generally faster?",opts:["Best fit","First fit","They take the exact same amount of time","It depends entirely on the size of the hard drive"],ans:1,hints:["Incorrect because Best fit must scan the entire list. The correct answer is B because First fit stops searching as soon as it finds a fit, making it generally faster","","Incorrect because Best fit performs a full O(N) scan. The correct answer is B because First fit searches as little as possible","Incorrect because RAM allocation speed depends on the data structure, not the hard drive size. The correct answer is B because First fit exits the search loop early"]},
      {q:"What specific type of memory fragmentation do the First fit and Best fit strategies suffer from?",opts:["Internal fragmentation","External fragmentation","Paging fragmentation","Cache fragmentation"],ans:1,hints:["Incorrect because internal fragmentation happens within fixed partitions. The correct answer is B because dynamic list allocations break free memory into many small, noncontiguous holes (external fragmentation)","","Incorrect because paging actually solves this type of fragmentation. The correct answer is B because they suffer from external fragmentation","Incorrect because this is a fabricated term. The correct answer is B because as processes are loaded and removed, free space is broken into little pieces externally"]},
      {q:"Which of the following defines \"External Fragmentation\"?",opts:["When a process is larger than the total RAM installed","When the space inside a fixed partition is unused by the job","When there is enough total memory space to satisfy a request, but the available spaces are not contiguous (broken into small holes)","When the hard drive is physically damaged"],ans:2,hints:["Incorrect because this is an absolute memory limit issue. The correct answer is C because external fragmentation means the total free space is sufficient, but it is scattered in tiny noncontiguous holes","Incorrect because this defines Internal Fragmentation. The correct answer is C because external fragmentation involves noncontiguous free space scattered across memory","","Incorrect because this is a hardware failure. The correct answer is C because it describes noncontiguous fragmented storage"]},
      {q:"What is one possible solution to the external-fragmentation problem?",opts:["Forcing all processes to use only 16-bit addresses","Allowing the logical address space of processes to be noncontiguous","Switching to the Worst fit algorithm","Physically upgrading the CPU"],ans:1,hints:["Incorrect because addressing architecture limits do not solve fragmentation. The correct answer is B because permitting a noncontiguous logical address space allows a process to be split across multiple available physical holes","","Incorrect because Worst fit also suffers from fragmentation. The correct answer is B because allowing noncontiguous logical spaces solves the issue","Incorrect because the CPU hardware does not fix software memory layout fragmentation. The correct answer is B because allowing noncontiguous memory allocation fixes it"]},
      {q:"What is the most common memory-management technique used today to allow processes to have a noncontiguous logical address space?",opts:["Swapping","Fixed Partitioning","Paging","Monoprogramming"],ans:2,hints:["Incorrect because swapping moves whole contiguous processes. The correct answer is C because the slides state that Paging is the strategy used to allow noncontiguous logical address spaces","Incorrect because fixed partitions are contiguous and suffer from internal waste. The correct answer is C because Paging is the most common technique for this","","Incorrect because monoprogramming uses one giant contiguous block. The correct answer is C because Paging splits the logical address space"]},
      {q:"When a hole is selected by the First fit algorithm and the required size is smaller than the hole, what happens to the remaining unused memory in that hole?",opts:["It is permanently assigned to the operating system","It is broken up into a new, smaller hole piece in the linked list","It is swapped to the disk","It is added to the process\'s stack segment"],ans:1,hints:["Incorrect because the OS only takes what it needs during boot. The correct answer is B because the hole is broken into two pieces: one for the process, and one for the remaining unused memory (a new hole)","","Incorrect because empty RAM is not swapped to disk. The correct answer is B because the list updates to reflect the process and the newly downsized hole","Incorrect because the stack segment is inside the process\'s allocated area. The correct answer is B because the leftover space remains an available hole"]},
      {q:"If it is expected that a process will NOT grow, how should its memory be allocated when swapped in?",opts:["Allocate double its current size just in case","Allocate exactly what is needed, no more and no less","Allocate the entire remaining free RAM","Allocate zero memory and run it from disk"],ans:1,hints:["Incorrect because this wastes memory if the process is fixed size. The correct answer is B because the slides state if a process size never changes, the OS allocates exactly what is needed, no more and no less","","Incorrect because this would prevent any other process from running. The correct answer is B because fixed-size processes get exact allocations","Incorrect because execution requires RAM. The correct answer is B because exact allocation is used for non-growing processes"]},
      {q:"What is the main structural difference between the linked list entry of a Process (P) and a Hole (H)?",opts:["A process entry has a starting address, but a hole entry does not","A hole entry does not have a length field","There is no structural difference; both contain a type flag, start address, length, and next pointer","Hole entries are stored on the hard drive"],ans:2,hints:["Incorrect because holes must have a known starting address to be allocated. The correct answer is C because both entries in the linked list contain the exact same fields: Type (H/P), start, length, and a next pointer","Incorrect because the OS must know how big the hole is. The correct answer is C because the structure is identical, only the type flag differs","","Incorrect because the list is kept in RAM. The correct answer is C because they use the same node structure"]},
      {q:"In the context of terminating a process, what does \"coalesced\" mean in Fig 3-7?",opts:["The process is copied to the disk","The memory is encrypted for security","Adjacent holes are merged together into a single, larger hole","The process is duplicated"],ans:2,hints:["Incorrect because swapping copies to disk. The correct answer is C because coalescing means merging adjacent free segments (holes) into one contiguous free segment","Incorrect because this is a memory management term, not cryptography. The correct answer is C because coalescing merges the adjacent holes","","Incorrect because terminating means it is ending. The correct answer is C because coalescing combines the free space"]},
      {q:"If a process requires a data segment for dynamic variables (heap) and a stack segment for local variables, where are they typically placed within the allocated memory?",opts:["They are both placed at the exact bottom of the memory block","The stack is at the top growing down, and the data is at the bottom growing up","They are placed outside the allocated memory in the OS partition","They are both placed at the top growing upwards"],ans:1,hints:["Incorrect because they need room to grow without immediately colliding. The correct answer is B because the stack is placed at the top growing downward, and the data at the bottom growing upward into the empty middle space","","Incorrect because processes cannot access the OS partition. The correct answer is B because they grow towards each other from opposite ends of the allocation","Incorrect because memory boundaries block upward growth from the top. The correct answer is B because they are placed at opposite ends and grow inward"]}
    ],
    tf:[
      {q:"Keeping all processes in memory all the time is always possible and is the standard way modern computers handle large applications",ans:false,hint:"Incorrect. The slides explicitly state that keeping all processes in memory all the time requires a huge amount of memory and cannot be done if there is insufficient memory, which led to Swapping and Virtual Memory"},
      {q:"Swapping consists of bringing each process in its entirety into memory, running it for a while, and then putting it entirely back on the disk",ans:true,hint:"Incorrect. The slides define swapping exactly as bringing in each process in its entirety, running it, and putting it back on the disk"},
      {q:"Memory compaction is a highly efficient operation that is frequently used because it requires very little CPU time",ans:false,hint:"Incorrect. The slides state that memory compaction is usually not done specifically because it requires a lot of CPU time (e.g., 17+ seconds for 16-GB)"},
      {q:"When swapping a process back to disk, the operating system should swap out the entire allocated space, including the unused extra memory reserved for future growth",ans:false,hint:"Incorrect. The slides specifically note that only the memory actually in use should be swapped; it is wasteful to swap the extra empty memory as well"},
      {q:"With a bitmap memory manager, searching for a run of a given length of consecutive 0 bits is a fast and efficient operation",ans:false,hint:"Incorrect. The slides explicitly state that searching a bitmap for a run of a given length is a slow operation, and this is the main argument against using bitmaps"},
      {q:"In a linked list memory manager sorted by address, if a terminating process has holes on both its top and bottom sides, all three entries are merged into a single hole",ans:true,hint:"Incorrect. Figure 3-7(d) and the accompanying text explicitly state that when a process terminates between two holes, three entries are merged and two items are removed from the list"},
      {q:"The Best fit allocation algorithm is generally faster than the First fit algorithm because it always finds the perfect match immediately",ans:false,hint:"Incorrect. The slides state that Best fit is slower than First fit because it must search the entire list from beginning to end every time it is called"},
      {q:"External fragmentation exists when there is enough total memory space to satisfy a request, but the available spaces are scattered in noncontiguous holes",ans:true,hint:"Incorrect. The slides provide exactly this definition for external fragmentation: enough total space exists, but it is fragmented into a large number of small, noncontiguous holes"},
      {q:"The Next fit algorithm works by searching the entire list from beginning to end and intentionally taking the largest available hole",ans:false,hint:"Incorrect. Searching for the largest available hole is the definition of the Worst fit algorithm. Next fit simply works like First fit but starts searching from where it left off last time"},
      {q:"The most common strategy used to solve the external-fragmentation problem is Paging, which allows the logical address space of processes to be noncontiguous",ans:true,hint:"Incorrect. The slides explicitly state that allowing logical addresses to be noncontiguous solves external fragmentation, and this is the strategy used in paging, the most common memory-management technique"}
    ]
